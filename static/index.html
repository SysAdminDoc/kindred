</div>
<div id="ws-reconnect-banner" class="ws-reconnect-banner" role="status">Reconnecting...</div>
<div id="notif-panel" style="display:none;position:fixed;top:52px;right:16px;width:340px;max-height:400px;overflow-y:auto;background:var(--base);border:1px solid var(--surface0);border-radius:var(--radius);box-shadow:var(--shadow);z-index:200;padding:12px"></div>
<div class="container" id="app" role="main"></div>
<div class="toast-container" id="toastContainer" role="status" aria-live="polite"></div>

<script>
const API='';
let Q=null, activeProfile=null, authToken=null, currentUser=null;

// ─── Safe localStorage helpers ───
function safeGet(k,d){try{return localStorage.getItem(k)||d}catch(e){return d}}
function safeSet(k,v){try{localStorage.setItem(k,v)}catch(e){}}

// ─── Auth helpers ───
function authHeaders(extra={}){
    const h={'Content-Type':'application/json',...extra};
    if(authToken) h['Authorization']='Bearer '+authToken;
    return h;
}
async function authFetch(url,opts={}){
    if(authToken&&!opts.headers) opts.headers=authHeaders();
    else if(authToken&&opts.headers) opts.headers={...opts.headers,'Authorization':'Bearer '+authToken};
    return fetch(url,opts);
}

// ─── WebSocket ───
let ws=null, wsReconnectTimer=null;
function connectWS(){
    if(!activeProfile||ws)return;
    const proto=location.protocol==='https:'?'wss:':'ws:';
    ws=new WebSocket(proto+'//'+location.host+'/ws/'+activeProfile+'?token='+(safeGet('kindred_token','')));
    ws.onmessage=(e)=>{
        try{
            const msg=JSON.parse(e.data);
            if(msg.type==='message'){
                playNotifSound();
                // Show toast for incoming message
                toast(msg.from_name+': '+msg.content.slice(0,60),'success');
                // If chat is open with this person, reload it
                const chatOpen=document.getElementById('msgs');
                if(chatOpen&&window._chatPartner===msg.from) openChat(activeProfile,msg.from);
                // Refresh notification count
                pollNotifications();
            } else if(msg.type==='group_message'){
                toast('New message in '+msg.group_name,'info');
                const gcEl=document.getElementById('group-msgs');
                if(gcEl&&window._activeGroupChat===msg.group_id) loadGroupChat(msg.group_id);
            } else if(msg.type==='typing'){
                const ti=document.getElementById('typing-indicator');
                if(ti&&window._chatPartner===msg.from){
                    ti.textContent='typing...';
                    clearTimeout(window._typingTimeout);
                    window._typingTimeout=setTimeout(()=>{if(ti)ti.textContent='';},3000);
                }
            }
        }catch(err){}
    };
    ws.onclose=()=>{ws=null;wsReconnectTimer=setTimeout(connectWS,5000);window._wsReconnectTimeout=wsReconnectTimer;};
    ws.onerror=()=>{ws?.close();};
    // Heartbeat every 30s
    const wsHB=setInterval(()=>{if(ws&&ws.readyState===1)ws.send(JSON.stringify({type:'heartbeat'}));else clearInterval(wsHB);},30000);
}
function disconnectWS(){
    if(wsReconnectTimer){clearTimeout(wsReconnectTimer);wsReconnectTimer=null;}
    if(ws){ws.close();ws=null;}
}
function wsSendTyping(to){
    if(ws&&ws.readyState===1)ws.send(JSON.stringify({type:'typing',to}));
}

// ─── Form data ───
let F={name:'',age:'',gender:'',seeking:'',big_five_answers:{},attachment_answers:{},values:{},love_language:'',dealbreakers:[],open_ended:{},scenario_answers:{},tradeoffs:{},behavioral_answers:{},self_disclosure:{},communication_style:{},financial_values:{},dating_energy:'',dating_pace:'',relationship_intent:'',weight_prefs:{},invite_code:''};

// ─── Question flow state ───
let questions=[], qi=0;

const TABS_LOGGEDOUT=[
    {id:'welcome',label:'Welcome'},
];
const TABS_LOGGEDIN=[
    {id:'myprofile',label:'My Profile'},
    {id:'matches',label:'Matches'},
    {id:'likedme',label:'Liked You'},
    {id:'messages',label:'Messages'},
    {id:'feed',label:'Feed'},
    {id:'discover',label:'Discover'},
    {id:'groups',label:'Groups'},
    {id:'events',label:'Events'},
    {id:'calendar',label:'Calendar'},
];

// ─── Build flat question array from API response ───
function buildQuestions(Q){
    const qs=[];
    // Basics
    qs.push({id:'_name',cat:'Basics',type:'text',text:'What should we call you?',hint:'First name or nickname',field:'name',placeholder:'Enter your name'});
    qs.push({id:'_age',cat:'Basics',type:'number',text:'How old are you?',hint:'Must be 18+',field:'age',min:18,max:99});
    qs.push({id:'_gender',cat:'Basics',type:'choice',text:'I am a...',options:['Man','Woman'],field:'gender'});
    qs.push({id:'_seeking',cat:'Basics',type:'choice',text:'Looking for a...',options:['Man','Woman'],field:'seeking'});
    qs.push({id:'_invite',cat:'Basics',type:'text',text:'Do you have an invite code?',hint:'Leave blank if you don\'t have one',field:'invite_code',placeholder:'Enter invite code',optional:true});

    // Self-disclosure
    for(const sd of Q.self_disclosure){
        qs.push({id:'sd_'+sd.id,cat:'Self-Disclosure',type:'choice',text:sd.text,options:sd.options,field:'self_disclosure',key:sd.id});
    }

    // Big Five
    for(const i of Q.big_five){
        qs.push({id:'bf_'+i.id,cat:'Personality',type:'likert',text:i.text,field:'big_five_answers',key:i.id,optional:true});
    }

    // Scenarios
    for(const s of Q.scenarios){
        qs.push({id:'sc_'+s.id,cat:'Scenarios',type:'scenario',text:s.text,options:s.options,field:'scenario_answers',key:s.id});
    }

    // Behavioral
    for(const b of Q.behavioral){
        qs.push({id:'bh_'+b.id,cat:'Behavioral',type:'choice',text:b.text,options:b.options,field:'behavioral_answers',key:b.id});
    }

    // Values
    for(const v of Q.values){
        if(v.type==='scale'){
            qs.push({id:'val_'+v.id,cat:'Values',type:'likert_labeled',text:v.text,labels:v.labels,field:'values',key:v.id});
        } else {
            qs.push({id:'val_'+v.id,cat:'Values',type:'choice',text:v.text,options:v.options,field:'values',key:v.id});
        }
    }

    // Tradeoffs
    for(const t of Q.tradeoffs){
        qs.push({id:'to_'+t.id,cat:'Trade-offs',type:'tradeoff',text:t.text,option_a:t.option_a,option_b:t.option_b,field:'tradeoffs',key:t.id});
    }

    // Communication
    for(const c of Q.communication){
        qs.push({id:'comm_'+c.id,cat:'Communication',type:'choice',text:c.text,options:c.options,field:'communication_style',key:c.id});
    }

    // Financial
    for(const f of Q.financial){
        qs.push({id:'fin_'+f.id,cat:'Financial',type:'choice',text:f.text,options:f.options,field:'financial_values',key:f.id});
    }

    // Attachment
    for(const i of Q.attachment){
        qs.push({id:'at_'+i.id,cat:'Attachment',type:'likert',text:i.text,field:'attachment_answers',key:i.id,optional:true});
    }

    // Love language
    qs.push({id:'_love_lang',cat:'Heart',type:'choice',text:'What is your primary love language?',hint:'How do you most feel loved?',options:Q.love_languages,field:'love_language'});

    // Dealbreakers
    qs.push({id:'_dealbreakers',cat:'Heart',type:'multi_select',text:'What are your deal-breakers?',hint:'Select all that apply',options:Q.dealbreakers,field:'dealbreakers'});

    // Open-ended
    for(const p of Q.open_ended){
        qs.push({id:'oe_'+p.id,cat:'Open-Ended',type:'textarea',text:p.text,hint:'Take your time...',field:'open_ended',key:p.id,optional:true});
    }

    // Energy questions
    for(const e of Q.energy){
        const fieldMap={dating_energy:'dating_energy',dating_pace:'dating_pace',relationship_intent:'relationship_intent'};
        qs.push({id:'en_'+e.id,cat:'Energy & Intent',type:'choice',text:e.text,options:e.options,field:fieldMap[e.id]||e.id});
    }

    // Settings (weight sliders as a single page)
    qs.push({id:'_weights',cat:'Settings',type:'weights',text:'Customize your matching priorities',hint:'Adjust how much each dimension matters to you. Weights are normalized automatically.'});

    // Review
    qs.push({id:'_review',cat:'Review',type:'review',text:'Review your answers',hint:'Make sure everything looks right before submitting.'});

    return qs;
}

// ─── Get answer for a question ───
function getAnswer(q){
    if(q.field==='name') return F.name;
    if(q.field==='age') return F.age;
    if(q.field==='gender') return F.gender;
    if(q.field==='seeking') return F.seeking;
    if(q.field==='invite_code') return F.invite_code;
    if(q.field==='love_language') return F.love_language;
    if(q.field==='dealbreakers') return F.dealbreakers;
    if(q.field==='dating_energy') return F.dating_energy;
    if(q.field==='dating_pace') return F.dating_pace;
    if(q.field==='relationship_intent') return F.relationship_intent;
    if(q.key){
        const obj=F[q.field];
        return obj?obj[q.key]:undefined;
    }
    return undefined;
}

// ─── Set answer for a question ───
function setAnswer(q,val){
    if(q.field==='name'){F.name=val;return;}
    if(q.field==='age'){F.age=parseInt(val)||'';return;}
    if(q.field==='gender'){F.gender=val;return;}
    if(q.field==='seeking'){F.seeking=val;return;}
    if(q.field==='invite_code'){F.invite_code=val;return;}
    if(q.field==='love_language'){F.love_language=val;return;}
    if(q.field==='dating_energy'){F.dating_energy=val;return;}
    if(q.field==='dating_pace'){F.dating_pace=val;return;}
    if(q.field==='relationship_intent'){F.relationship_intent=val;return;}
    if(q.key){
        if(!F[q.field])F[q.field]={};
        F[q.field][q.key]=val;
    }
}

// ─── Init ───
async function init(){
    try{ const r=await fetch(API+'/api/questionnaire'); Q=await r.json(); }
    catch(e){ document.getElementById('app').innerHTML='<div class="empty"><h3>Cannot connect to server</h3><p>Make sure the backend is running on port 8000</p></div>'; return; }
    questions=buildQuestions(Q);
    // Restore auth session
    const savedToken=safeGet('kindred_token','');
    if(savedToken){
        authToken=savedToken;
        try{
            const r=await authFetch(API+'/api/auth/me');
            if(r.ok){
                currentUser=await r.json();
                activeProfile=currentUser.profile_id;
            } else { authToken=null; try{localStorage.removeItem('kindred_token')}catch(e){} }
        }catch(e){ authToken=null; try{localStorage.removeItem('kindred_token')}catch(ex){} }
    }
    renderNav();
    if(activeProfile) showView('myprofile');
    else if(authToken&&!activeProfile){loadProgress().then(()=>showView('questionnaire'));}
    else showView('welcome');
    if(authToken) pollNotifications();
    if(activeProfile) connectWS();
}

// ─── Notification polling ───
let notifInterval=null;
async function pollNotifications(){
    if(!authToken)return;
    try{
        const r=await authFetch(API+'/api/notifications');
        if(r.ok){
            const d=await r.json();
            const bell=document.getElementById('notif-bell');
            const countEl=document.getElementById('notif-count');
            if(bell) bell.style.display='block';
            if(d.unread>0){ countEl.style.display='block'; countEl.textContent=d.unread; }
            else { countEl.style.display='none'; }
            window._notifData=d.notifications;
        }
    }catch(e){}
    if(!notifInterval) notifInterval=setInterval(pollNotifications,30000);
}

async function toggleNotifications(){
    const panel=document.getElementById('notif-panel');
    if(panel.style.display==='block'){ panel.style.display='none'; return; }
    // Mark all read
    await authFetch(API+'/api/notifications/read',{method:'POST'});
    document.getElementById('notif-count').style.display='none';
    const notifs=window._notifData||[];
    if(!notifs.length){ panel.innerHTML='<div style="text-align:center;color:var(--overlay0);padding:20px;font-size:13px">No notifications</div>'; }
    else {
        panel.innerHTML=notifs.slice(0,20).map(n=>`<div style="padding:10px;border-bottom:1px solid var(--surface0);cursor:pointer;opacity:${n.read?'0.6':'1'}" onclick="handleNotifClick('${n.link||''}')"><div style="font-size:13px;font-weight:${n.read?'400':'600'};color:var(--text)">${escHtml(n.title)}</div>${n.body?`<div style="font-size:12px;color:var(--overlay0);margin-top:2px">${escHtml(n.body).slice(0,80)}</div>`:''}<div style="font-size:10px;color:var(--surface2);margin-top:4px">${new Date(n.created_at).toLocaleString()}</div></div>`).join('');
    }
    panel.style.display='block';
    // Close on outside click
    setTimeout(()=>document.addEventListener('click',closeNotifPanel,{once:true}),10);
}
function closeNotifPanel(e){
    const panel=document.getElementById('notif-panel');
    if(panel&&!panel.contains(e.target)&&e.target.id!=='notif-bell') panel.style.display='none';
}
function handleNotifClick(link){
    document.getElementById('notif-panel').style.display='none';
    if(!link)return;
    // Simple routing from notification links
    if(link.startsWith('/messages/')){ const parts=link.split('/'); openChat(activeProfile,parts[2]); }
    else if(link.startsWith('/profile/')){ const pid=link.split('/')[2]; viewProfilePage(pid,activeProfile); }
}

function renderNav(){
    const loggedIn=authToken&&(activeProfile||currentUser);
    const tabs=loggedIn?(activeProfile?TABS_LOGGEDIN:[{id:'questionnaire',label:'Create Profile'}]):TABS_LOGGEDOUT;
    let navHtml=tabs.map(t=>`<button class="nav-tab" data-v="${t.id}" onclick="showView('${t.id}')">${t.label}</button>`).join('');
    if(loggedIn) navHtml+=`<button class="nav-tab" onclick="logout()" style="color:var(--red)">Log Out</button>`;
    document.getElementById('nav').innerHTML=navHtml;
    // Show/hide notification bell
    const bell=document.getElementById('notif-bell');
    if(bell) bell.style.display=loggedIn?'block':'none';
}

function showView(v){
    document.querySelectorAll('.nav-tab').forEach(t=>t.classList.toggle('active',t.dataset.v===v));
    document.getElementById('app').className='container';
    if(v==='welcome')renderWelcome();
    else if(v==='questionnaire')renderQuestion();
    else if(v==='myprofile'){document.getElementById('app').className='container wide';viewProfilePage(activeProfile,activeProfile);}
    else if(v==='matches')renderMyMatches();
    else if(v==='messages')renderInbox();
    else if(v==='feed')renderFeed();
    else if(v==='discover')renderDiscover();
    else if(v==='groups')renderGroups();
    else if(v==='events')renderEvents();
    else if(v==='likedme')renderWhoLikedMe();
    else if(v==='calendar')renderEventsCalendar();
}

function loginAs(id){
    activeProfile=id;
    renderNav();
    showView('myprofile');
    if(authToken) pollNotifications();
    connectWS();
}

function logout(){
    activeProfile=null;
    authToken=null;
    currentUser=null;
    try{localStorage.removeItem('kindred_token')}catch(e){}
    if(notifInterval){clearInterval(notifInterval);notifInterval=null;}
    if(window._heartbeatInterval){clearInterval(window._heartbeatInterval);window._heartbeatInterval=null;}
    if(window._wsReconnectTimeout){clearTimeout(window._wsReconnectTimeout);window._wsReconnectTimeout=null;}
    document.getElementById('notif-panel').style.display='none';
    disconnectWS();
    renderNav();
    showView('welcome');
}

            <button class="btn btn-secondary" onclick="showAuthForm('register')" id="auth-reg-tab">Create Account</button>

function showAuthForm(mode){

            <div class="form-group"><label>Password</label><input type="password" id="auth-pass" placeholder="Your password" onkeydown="if(event.key==='Enter')doLogin()"></div>

async function doLogin(){
    const email=document.getElementById('auth-email')?.value?.trim();
    const pass=document.getElementById('auth-pass')?.value;
    const errEl=document.getElementById('auth-error');
    if(!email||!pass){errEl.textContent='Email and password required';return;}
    try{
        const r=await fetch(API+'/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pass})});
        const d=await r.json();
        if(!r.ok){errEl.textContent=d.detail||'Login failed';return;}
        authToken=d.token;
        currentUser={user_id:d.user_id,profile_id:d.profile_id,display_name:d.display_name};
        safeSet('kindred_token',authToken);
        toast('Welcome back, '+d.display_name+'!','success');
        if(d.profile_id){loginAs(d.profile_id);}
        else{renderNav();showView('questionnaire');}
    }catch(e){errEl.textContent='Connection error';}
}

async function doRegister(){
    const name=document.getElementById('auth-name')?.value?.trim()||'';
    const email=document.getElementById('auth-email')?.value?.trim();
    const pass=document.getElementById('auth-pass')?.value;
    const errEl=document.getElementById('auth-error');
    if(!email||!pass){errEl.textContent='Email and password required';return;}
    if(pass.length<6){errEl.textContent='Password must be at least 6 characters';return;}
    try{
        const r=await fetch(API+'/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pass,display_name:name})});
        const d=await r.json();
        if(!r.ok){errEl.textContent=d.detail||'Registration failed';return;}
        authToken=d.token;
        currentUser={user_id:d.user_id,profile_id:null,display_name:d.display_name};
        safeSet('kindred_token',authToken);
        toast('Account created! Now build your profile.','success');
        renderNav();
        showView('questionnaire');
    }catch(e){errEl.textContent='Connection error';}
}

// ─── One Question Per Screen ───
function renderQuestion(){
    const q=questions[qi];
    const total=questions.length;
    const pct=(qi/(total-1))*100;
    const app=document.getElementById('app');

    let html=`<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div class="progress-label"><span class="cat">${q.cat}</span><span class="count">${qi+1} / ${total}</span></div>
        <div class="card"><div class="q-card">`;

    if(q.type==='review') html+=renderReview();
    else if(q.type==='weights') html+=renderWeights(q);
    else html+=renderQuestionBody(q);

    html+=`</div><div class="btn-row">
        <button class="btn btn-secondary" ${qi===0?'disabled':''} onclick="prevQ()">Back</button>
        ${q.type==='review'?'<button class="btn btn-primary" onclick="submitProfile()">Submit Profile</button>':'<button class="btn btn-primary" onclick="nextQ()">Continue</button>'}
    </div></div>`;

    app.innerHTML=html;
    window.scrollTo(0,0);

    // Enter key advances on text/number/textarea
    const inp=app.querySelector('input[type="text"],input[type="number"],textarea');
    if(inp){
        inp.focus();
        inp.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();nextQ();}});
    }
}

function autoAdvance(){setTimeout(nextQ,250);}

// ─── Questionnaire Progress Persistence ───
async function saveProgress(){
    if(!authToken)return;
    try{
        await authFetch(API+'/api/questionnaire/progress',{method:'PUT',headers:authHeaders(),body:JSON.stringify({progress:F,index:qi})});
    }catch(e){}
}
async function loadProgress(){
    if(!authToken)return false;
    try{
        const r=await authFetch(API+'/api/questionnaire/progress');
        if(r.ok){
            const d=await r.json();
            if(d.progress){
                Object.assign(F,d.progress);
                qi=d.index||0;
                return true;
            }
        }
    }catch(e){}
    return false;
}

function renderQuestionBody(q){
    let h=`<div class="q-text">${q.text}</div>`;
    if(q.hint) h+=`<div class="q-hint">${q.hint}</div>`;
    const ans=getAnswer(q);

    switch(q.type){
        case 'text':
            h+=`<input type="text" value="${ans||''}" oninput="setAnswer(questions[qi],this.value)" placeholder="${q.placeholder||''}">`;
            break;
        case 'number':
            h+=`<input type="number" value="${ans||''}" oninput="setAnswer(questions[qi],this.value)" min="${q.min||0}" max="${q.max||999}">`;
            break;
        case 'choice':
            h+=`<div class="choice-grid${q.options.length>4?' style="grid-template-columns:1fr"':''}">`;
            for(const o of q.options){
                h+=`<div class="choice-card ${ans===o?'selected':''}" onclick="setAnswer(questions[qi],'${esc(o)}');autoAdvance()">${o}</div>`;
            }
            h+=`</div>`;
            break;
        case 'likert':
            h+=`<div class="likert-opts">${[1,2,3,4,5].map(v=>`<div class="likert-opt"><input type="radio" name="lk" id="lk_${v}" ${ans===v?'checked':''} onchange="setAnswer(questions[qi],${v});autoAdvance()"><label for="lk_${v}">${['Strongly\nDisagree','Disagree','Neutral','Agree','Strongly\nAgree'][v-1]}</label></div>`).join('')}</div>`;
            break;
        case 'likert_labeled':
            h+=`<div class="likert-opts">${q.labels.map((l,i)=>`<div class="likert-opt"><input type="radio" name="lk" id="lk_${i+1}" ${ans==(i+1)?'checked':''} onchange="setAnswer(questions[qi],${i+1});autoAdvance()"><label for="lk_${i+1}">${l}</label></div>`).join('')}</div>`;
            break;
        case 'scenario':
            h+=`<div class="scenario-opts">${q.options.map((o,i)=>`<div class="scenario-opt ${ans===i?'selected':''}" onclick="setAnswer(questions[qi],${i});autoAdvance()">${o}</div>`).join('')}</div>`;
            break;
        case 'tradeoff':
            h+=`<div class="tradeoff-opts"><div class="tradeoff-card ${ans===q.option_a?'selected':''}" onclick="setAnswer(questions[qi],'${esc(q.option_a)}');autoAdvance()">${q.option_a}</div><div class="tradeoff-card ${ans===q.option_b?'selected':''}" onclick="setAnswer(questions[qi],'${esc(q.option_b)}');autoAdvance()">${q.option_b}</div></div>`;
            break;
        case 'multi_select':
            h+=`<div class="multi-grid">${q.options.map(o=>`<div class="multi-opt ${(ans||[]).includes(o)?'selected':''}" onclick="toggleMulti('${esc(o)}')">${o}</div>`).join('')}</div>`;
            break;
        case 'textarea':
            h+=`<textarea placeholder="${q.hint||''}" oninput="setAnswer(questions[qi],this.value)">${ans||''}</textarea>`;
            break;
    }
    return h;
}

function renderWeights(q){
    const w=Q.default_weights;
    const labels={personality:'Personality Match',values:'Values Alignment',communication:'Communication Style',financial:'Financial Values',attachment:'Attachment Style',tradeoffs:'Priority Alignment',semantic:'Written Expression',dealbreaker:'Dealbreaker Alignment'};
    let h=`<div class="q-text">${q.text}</div>`;
    if(q.hint) h+=`<div class="q-hint">${q.hint}</div>`;
    for(const k of Object.keys(w)){
        const v=F.weight_prefs[k]||w[k];
        h+=`<div class="weight-slider"><label>${labels[k]||k}</label><input type="range" min="0" max="100" value="${Math.round(v*100)}" oninput="F.weight_prefs['${k}']=this.value/100;this.nextElementSibling.textContent=this.value+'%'"><span class="wval">${Math.round(v*100)}%</span></div>`;
    }
    return h;
}

function renderReview(){
    let h=`<div class="q-text">Review your answers</div><div class="q-hint">Tap any category header to jump back and edit.</div>`;

    const cats={};
    for(let i=0;i<questions.length;i++){
        const q=questions[i];
        if(q.type==='review'||q.type==='weights')continue;
        if(!cats[q.cat])cats[q.cat]={items:[],startIdx:i};
        const a=getAnswer(q);
        let display='--';
        if(a!==undefined&&a!==''&&a!==null){
            if(Array.isArray(a)) display=a.length?a.join(', '):'None';
            else if(q.type==='likert') display=['SD','D','N','A','SA'][a-1]||a;
            else if(q.type==='likert_labeled'&&q.labels) display=q.labels[(a||1)-1]||a;
            else if(q.type==='scenario'&&q.options) display=q.options[a]||a;
            else display=String(a);
        }
        cats[q.cat].items.push({label:q.text.replace(/<[^>]*>/g,'').slice(0,60),value:display});
    }

    for(const [cat,data] of Object.entries(cats)){
        const answered=data.items.filter(i=>i.value!=='--').length;
        h+=`<div class="review-group"><div class="review-group-header" onclick="qi=${data.startIdx};renderQuestion()"><h3>${cat}</h3><span class="edit-link">${answered}/${data.items.length} answered - Edit</span></div>`;
        for(const item of data.items){
            h+=`<div class="review-item"><span class="rk">${item.label}</span><span class="rv">${item.value}</span></div>`;
        }
        h+=`</div>`;
    }
    return h;
}

function nextQ(){ if(qi<questions.length-1){ qi++; saveProgress(); renderQuestion(); }}
function prevQ(){ if(qi>0){ qi--; renderQuestion(); }}
function jumpTo(idx){ qi=idx; renderQuestion(); }

function toggleMulti(val){
    const i=F.dealbreakers.indexOf(val);
    if(i>=0) F.dealbreakers.splice(i,1); else F.dealbreakers.push(val);
    renderQuestion();
}

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ─── Submit ───
async function submitProfile(){
    if(!F.name||!F.age||!F.gender||!F.seeking){toast('Complete the basics first','error');return;}
    const btn=document.querySelector('.btn-primary:last-child');
    if(btn){btn.disabled=true;btn.textContent='Processing...';}

function renderEmbed(url){
    // YouTube
    let m=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]+)/);
    if(m) return `<div class="ms-embed"><iframe width="100%" height="200" src="https://www.youtube.com/embed/${m[1]}" allowfullscreen></iframe></div>`;
    // Spotify track
    m=url.match(/open\.spotify\.com\/(track|album|playlist)\/([a-zA-Z0-9]+)/);
    if(m) return `<div class="ms-embed"><iframe src="https://open.spotify.com/embed/${m[1]}/${m[2]}?theme=0" width="100%" height="${m[1]==='track'?80:160}" allowfullscreen allow="encrypted-media"></iframe></div>`;
    // SoundCloud - use oEmbed
    if(url.includes('soundcloud.com')) return `<div class="ms-embed"><iframe width="100%" height="166" scrolling="no" src="https://w.soundcloud.com/player/?url=${encodeURIComponent(url)}&color=%23cba6f7&auto_play=false&hide_related=true&show_comments=false&show_user=true&show_reposts=false&show_teaser=false" allowfullscreen></iframe></div>`;
    // Bandcamp
    if(url.includes('bandcamp.com')) return `<div class="ms-embed"><a href="${url}" style="color:var(--mauve);font-size:13px" target="_blank">${url}</a></div>`;
    // Generic link
    return `<div class="ms-embed"><a href="${url}" style="color:var(--mauve);font-size:13px" target="_blank">${url}</a></div>`;
}

// Profile page actions
async function addFriend(from,to){
    await fetch(API+'/api/profile/'+from+'/friend/'+to,{method:'POST'});
    toast('Friend request sent!','success');
    viewProfilePage(to,from);
}
async function removeFriend(from,to){
    await fetch(API+'/api/profile/'+from+'/friend/'+to,{method:'DELETE'});
    toast('Friend removed','success');
    viewProfilePage(to,from);
}
async function acceptFriend(pid,fromId){
    await fetch(API+'/api/profile/'+pid+'/friend/'+fromId,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({accept:true})});
    toast('Friend accepted!','success');
    viewProfilePage(pid,pid);
}
async function declineFriend(pid,fromId){
    await fetch(API+'/api/profile/'+pid+'/friend/'+fromId,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({accept:false})});
    toast('Request declined','success');
    viewProfilePage(pid,pid);
}

async function postComment(profileId,fromId){
    const inp=document.getElementById('comment-input');
    const txt=inp?.value?.trim();if(!txt)return;
    inp.value='';
    await fetch(API+'/api/profile/'+profileId+'/comments',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({from_id:fromId,content:txt})});
    viewProfilePage(profileId,fromId);
}
async function deleteComment(commentId,profileId){
    await fetch(API+'/api/comment/'+commentId+'?profile_id='+profileId,{method:'DELETE'});
    toast('Comment deleted','success');
    viewProfilePage(profileId,activeProfile);
}

async function showMatchesFor(pid){
    const c=document.getElementById('matches-area')||document.getElementById('mres')||document.getElementById('app');
    c.innerHTML='<div class="loading"><div class="spinner"></div>Computing compatibility...</div>';
    try{
        const r=await fetch(API+'/api/matches/'+pid);const d=await r.json();
        if(!d.matches||!d.matches.length){c.innerHTML='<div class="empty"><h3>No compatible matches found</h3><p>No profiles match the seeking criteria, or dealbreaker conflicts exist.</p></div>';return;}
        c.innerHTML=d.matches.map((m,i)=>{
            const s=m.compatibility.total;
            const sc=m.compatibility.dealbreaker_conflict?'score-fail':s>=70?'score-high':s>=45?'score-mid':'score-low';
            const photo=m.photo&&!m.photo_locked?`<img src="/uploads/${m.photo}" class="photo-thumb">`:'<div class="photo-locked">'+(m.photo_locked?'&#128274;':'?')+'</div>';
            const badges=[];
            if(m.verified) badges.push('<span class="badge-verified">V</span>');
            if(m.dating_energy) badges.push(`<span class="badge-energy">${escHtml(m.dating_energy)}</span>`);
            if(m.relationship_intent) badges.push(`<span class="badge-intent">${escHtml(m.relationship_intent)}</span>`);
            if(m.super_liked_you) badges.push('<span class="super-liked-badge">&#11088;</span>');
            const expiryHtml=getExpiryBadgeHtml(m);
            const isExpired=expiryHtml.includes('Expired')&&!expiryHtml.includes('Expires in');
            return `<div class="match-card${isExpired?' expired':''} match-reveal" style="animation-delay:${i*.06}s" onclick="showDetail('${pid}','${m.profile_id}')">
                ${photo}<div class="match-score ${sc}">${m.compatibility.dealbreaker_conflict?'X':s+'%'}</div>
                <div class="match-info"><h3>${escHtml(m.name)}${badges.join('')}</h3><div class="meta">${m.age?m.age+' yrs':''}${expiryHtml?' &bull; ':''}<span style="font-size:11px">${expiryHtml}</span></div></div>
                <div class="match-tags">${Object.entries(m.compatibility.breakdown).map(([k,v])=>`<span class="match-tag">${k.slice(0,4)}: ${v}%</span>`).join('')}</div></div>`;
        }).join('');
        staggerListItems(c);
        if(d.matches.length>0&&typeof triggerConfetti==='function')triggerConfetti();
    }catch(e){c.innerHTML='<div class="empty"><h3>Error</h3></div>';}
}

async function showDetail(a,b){
    const app=document.getElementById('app');
    app.innerHTML='<div class="loading"><div class="spinner"></div>Loading details...</div>';
    try{
        const [cr,ar,br]=await Promise.all([fetch(API+'/api/compatibility/'+a+'/'+b),fetch(API+'/api/profile/'+a),fetch(API+'/api/profile/'+b)]);
        const comp=await cr.json(),pa=await ar.json(),pb=await br.json();
        const s=comp.total,sc=comp.dealbreaker_conflict?'score-fail':s>=70?'score-high':s>=45?'score-mid':'score-low';
        const bc=(v)=>v>=70?'var(--green)':v>=45?'var(--yellow)':'var(--peach)';

        let html=`<div class="card">`;
        if(comp.dealbreaker_conflict){
            html+=`<div class="conflict-banner"><h3>Dealbreaker Conflict</h3><ul>${comp.conflicts.map(c=>`<li>${escHtml(c)}</li>`).join('')}</ul></div>`;
        }
        html+=`<div style="text-align:center;margin-bottom:20px"><div style="font-size:13px;color:var(--overlay0)">Compatibility</div><div style="font-size:48px;font-weight:800" class="${sc}">${comp.dealbreaker_conflict?'Incompatible':s+'%'}</div><div style="font-size:15px;color:var(--subtext1)">${escHtml(pa.name)} & ${escHtml(pb.name)}</div><div id="mutual-detail-${b}" style="margin-top:6px;display:flex;justify-content:center"></div></div>`;

        // Photos
        if(comp.photo_a||comp.photo_b){
            html+=`<div style="display:flex;justify-content:center;gap:24px;margin-bottom:20px">`;
            if(comp.photo_a) html+=`<img src="/uploads/${comp.photo_a}" class="photo-thumb" style="width:64px;height:64px">`;
            if(comp.photo_b) html+=`<img src="/uploads/${comp.photo_b}" class="photo-thumb" style="width:64px;height:64px">`;
            html+=`</div>`;
        } else if(!comp.dealbreaker_conflict&&s<comp.photo_threshold){
            html+=`<p style="text-align:center;font-size:12px;color:var(--overlay0);margin-bottom:16px">Photos unlock at ${comp.photo_threshold}% compatibility</p>`;
        }

        // Compatibility Radar Chart
        html+=`<div class="compat-radar-container"><canvas id="compat-radar-main" width="320" height="320"></canvas></div>`;

        // Breakdown grid
        html+=`<div class="breakdown">${Object.entries(comp.breakdown).map(([k,v])=>`<div class="bd-item"><div class="label">${k}</div><div class="bd-bar"><div class="bd-fill" style="width:${v}%;background:${bc(v)}"></div></div><div class="value" style="color:${bc(v)}">${v}%</div></div>`).join('')}</div></div>`;

        // Coaching tips
        if(comp.coaching_tips&&comp.coaching_tips.length){
            html+=`<div class="card" style="animation-delay:.08s"><h2>Relationship Coaching</h2><p class="subtitle">Tips based on your compatibility profile</p>${comp.coaching_tips.map(t=>`<div class="coaching-tip">${escHtml(t)}</div>`).join('')}</div>`;
        }

        // Narrative
        html+=`<div class="card" style="animation-delay:.12s"><h2>Compatibility Insight</h2><div class="narrative" id="narrative-text">${escHtml(comp.narrative||'Generating insight...')}</div></div>`;

        // Icebreakers
        if(comp.icebreakers&&comp.icebreakers.length){
            html+=`<div class="card" style="animation-delay:.16s"><h2>Conversation Starters</h2><p class="subtitle">Click to copy</p>${comp.icebreakers.map(ib=>`<div class="icebreaker" onclick="navigator.clipboard.writeText(this.textContent);toast('Copied!','success')">${escHtml(ib)}</div>`).join('')}</div>`;
        }

        // Communication & Financial comparison
        if(pa.communication_style||pb.communication_style||pa.financial_values||pb.financial_values){
            html+=`<div class="card" style="animation-delay:.2s"><h2>Style Comparison</h2>`;
            if(pa.communication_style&&pb.communication_style){
                html+=`<div class="comp-section"><h4>Communication Style</h4>`;
                const ckeys=new Set([...Object.keys(pa.communication_style||{}),...Object.keys(pb.communication_style||{})]);
                for(const k of ckeys){
                    const av=pa.communication_style[k]||'--';
                    const bv=pb.communication_style[k]||'--';
                    const match=av===bv?'var(--green)':'var(--overlay0)';
                    html+=`<div class="comp-row"><span class="cl">${escHtml(av)}</span><span class="cm" style="color:${match}">${k.replace(/_/g,' ')}</span><span class="cr">${escHtml(bv)}</span></div>`;
                }
                html+=`</div>`;
            }
            if(pa.financial_values&&pb.financial_values){
                html+=`<div class="comp-section"><h4>Financial Values</h4>`;
                const fkeys=new Set([...Object.keys(pa.financial_values||{}),...Object.keys(pb.financial_values||{})]);
                for(const k of fkeys){
                    const av=pa.financial_values[k]||'--';
                    const bv=pb.financial_values[k]||'--';
                    const match=av===bv?'var(--green)':'var(--overlay0)';
                    html+=`<div class="comp-row"><span class="cl">${escHtml(av)}</span><span class="cm" style="color:${match}">${k.replace(/_/g,' ')}</span><span class="cr">${escHtml(bv)}</span></div>`;
                }
                html+=`</div>`;
            }
            html+=`</div>`;
        }

        // Profile comparison with radar charts
        html+=`<div class="card" style="animation-delay:.24s"><h2>Profile Comparison</h2><div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:12px"><div><h3 style="color:var(--mauve);margin-bottom:8px">${escHtml(pa.name)}</h3><div class="radar-container"><canvas id="radar-a" width="200" height="200"></canvas></div>${profileSummary(pa)}</div><div><h3 style="color:var(--pink);margin-bottom:8px">${escHtml(pb.name)}</h3><div class="radar-container"><canvas id="radar-b" width="200" height="200"></canvas></div>${profileSummary(pb)}</div></div></div>`;

        // Date suggestion / plans
        if(comp.suggest_date||comp.date_plans?.length){
            html+=`<div class="card" style="animation-delay:.28s"><h2>Date Plans</h2>`;
            if(comp.suggest_date&&(!comp.date_plans||!comp.date_plans.length)){
                html+=`<div class="date-banner"><span class="db-text">You've exchanged ${comp.message_count}+ messages! Ready to meet?</span><button class="btn btn-primary" onclick="showDatePlanForm('${a}','${b}')">Suggest a Date</button></div>`;
            }
            if(comp.date_plans&&comp.date_plans.length){
                for(const dp of comp.date_plans){
                    html+=`<div class="date-plan"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><strong>${escHtml(dp.suggestion)}</strong><span class="dp-status dp-${dp.status}">${dp.status}</span></div>`;
                    if(dp.proposed_time) html+=`<div style="font-size:12px;color:var(--overlay0)">Time: ${escHtml(dp.proposed_time)}</div>`;
                    if(dp.status==='proposed'){
                        html+=`<div style="margin-top:8px;display:flex;gap:6px"><button class="btn-sm btn-match" onclick="updatePlan('${dp.id}','accepted')">Accept</button><button class="btn-sm btn-delete" onclick="updatePlan('${dp.id}','declined')">Decline</button></div>`;
                    }
                    if(dp.status==='accepted'){
                        html+=`<div style="margin-top:8px"><button class="btn-sm btn-match" onclick="updatePlan('${dp.id}','completed')">Mark Completed</button></div>`;
                    }
                    html+=`</div>`;
                }
            }
            html+=`<div id="date-plan-form"></div></div>`;
        }

        // Music Compatibility
        html+=`<div class="card" style="animation-delay:.32s"><h2>Music Compatibility</h2><p class="subtitle">How your music tastes align</p><div id="music-compat" data-a="${a}" data-b="${b}"><div class="loading"><div class="spinner"></div></div></div></div>`;

        // Compatibility Game
        html+=`<div class="card" style="animation-delay:.36s"><h2>Compatibility Game</h2><p class="subtitle">"This or That" - See how well you match!</p><div id="compat-game" data-a="${a}" data-b="${b}"><div class="loading"><div class="spinner"></div>Loading game...</div></div></div>`;

        html+=`<div class="btn-row"><button class="btn btn-secondary" onclick="showView('matches')">Back</button><button class="btn btn-primary" onclick="startChatWith('${a}','${b}')">Send Message</button><button class="btn btn-report" onclick="showReportModal('${a}','${b}')">Report</button></div>`;
        app.innerHTML=html;

        // Load mutual friends
        loadMutualFriends(b,'mutual-detail-'+b);

        // Draw compatibility radar chart
        if(comp.breakdown&&Object.keys(comp.breakdown).length)drawCompatRadar('compat-radar-main',comp.breakdown);

        // Draw personality radar charts
        if(pa.big_five)drawRadar('radar-a',pa.big_five,'rgba(203,166,247,');
        if(pb.big_five)drawRadar('radar-b',pb.big_five,'rgba(245,194,231,');

        // Narrative via Puter.js
        generateAINarrative(pa,pb,comp);

        // Load music compatibility
        loadMusicCompat(a,b);
        // Load compatibility game
        loadCompatGame(a,b);

        // Log behavioral event
        logEvent(a,'profile_view',b);
    }catch(e){app.innerHTML='<div class="empty"><h3>Error loading details</h3></div>';}
}

    if(p.attachment)h+=`<div style="margin-top:4px;font-size:12px;color:var(--overlay0)">Attachment: <strong style="color:var(--text)">${escHtml(typeof p.attachment==='string'?p.attachment:JSON.stringify(p.attachment))}</strong></div>`;

// ─── Compatibility Games ───
async function loadCompatGame(a,b){
    const el=document.getElementById('compat-game');
    if(!el)return;
    try{
        const r=await fetch(API+'/api/games/'+a+'/'+b);const d=await r.json();
        const score=d.score||{total:0,matched:0,pct:0};
        let html='';
        if(score.total>0){
            const ringColor=score.pct>=70?'var(--green)':score.pct>=40?'var(--yellow)':'var(--peach)';
            html+=`<div class="game-score"><div class="score-ring" style="border-color:${ringColor};color:${ringColor}">${score.pct}%</div><div><div style="font-size:14px;font-weight:600">${score.matched}/${score.total} matched</div><div style="font-size:12px;color:var(--overlay0)">answers in common</div></div></div>`;
        }
        if(d.complete){
            html+=`<div style="text-align:center;padding:16px;color:var(--green)">All questions answered! You matched on ${score.pct}% of topics.</div>`;
            html+=`<button class="btn btn-secondary" onclick="showGameHistory('${a}','${b}')" style="display:block;margin:0 auto">View History</button>`;
        } else if(d.game){
            const g=d.game;
            const parts=g.question.split(' or ');
            const choiceA=parts[0]?.replace('?','').trim()||'Option A';
            const choiceB=parts[1]?.replace('?','').trim()||'Option B';
            // Check if user already answered
            const myAnswer=(a===g.profile_a)?g.answer_a:g.answer_b;
            if(myAnswer){
                html+=`<div class="game-question">${escHtml(g.question)}</div>`;
                html+=`<div style="text-align:center;color:var(--overlay0);padding:12px">You chose <strong style="color:var(--mauve)">${escHtml(myAnswer)}</strong>. Waiting for their answer...</div>`;
            } else {
                html+=`<div class="game-question">${escHtml(g.question)}</div>`;
                html+=`<div class="game-choices"><div class="game-choice" onclick="submitGameAnswer('${g.id}','${a}','${choiceA}',this)">${choiceA}</div><div class="game-choice" onclick="submitGameAnswer('${g.id}','${a}','${choiceB}',this)">${choiceB}</div></div>`;
            }
        }
        html+=`<div id="game-history"></div>`;
        el.innerHTML=html;
    }catch(e){el.innerHTML='<div style="color:var(--overlay0);text-align:center">Could not load game</div>';}
}

async function submitGameAnswer(gameId,profileId,answer,btn){
    btn.classList.add('selected');
    btn.parentElement.querySelectorAll('.game-choice').forEach(c=>{if(c!==btn)c.style.pointerEvents='none';c.style.opacity=c===btn?'1':'0.5';});
    try{
        const r=await fetch(API+'/api/games/'+gameId+'/answer/'+profileId,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({answer})});
        const d=await r.json();
        if(d.game&&d.game.answer_a&&d.game.answer_b){
            // Both answered - show result
            const matched=d.game.matched;
            btn.parentElement.querySelectorAll('.game-choice').forEach(c=>{
                c.style.opacity='1';c.style.pointerEvents='none';
                if(c.textContent===answer) c.className='game-choice '+(matched?'matched':'mismatched');
            });
            toast(matched?'You both chose the same!':'Different choices - variety is fun!',matched?'success':'');
            // Reload after a moment
            const el=document.getElementById('compat-game');
            const a=el?.dataset?.a;const b=el?.dataset?.b;
            if(a&&b) setTimeout(()=>loadCompatGame(a,b),2000);
        } else {
            toast('Answer submitted! Waiting for their turn...','success');
        }
    }catch(e){toast('Error submitting answer','error');}
}

// ─── Radar Chart ───
function drawRadar(canvasId,bf,colorBase){
    const c=document.getElementById(canvasId);if(!c)return;
    const ctx=c.getContext('2d'),cx=100,cy=100,r=75;
    const traits=Object.keys(bf),vals=Object.values(bf),n=traits.length;
    if(!n)return;
    ctx.clearRect(0,0,200,200);
    for(let ring=0.25;ring<=1;ring+=0.25){
        ctx.beginPath();
        for(let i=0;i<=n;i++){const a=(Math.PI*2/n)*i-Math.PI/2;ctx.lineTo(cx+r*ring*Math.cos(a),cy+r*ring*Math.sin(a));}
        ctx.closePath();ctx.strokeStyle='rgba(69,71,90,0.5)';ctx.stroke();
    }
    ctx.font='10px system-ui';ctx.fillStyle='#a6adc8';ctx.textAlign='center';
    for(let i=0;i<n;i++){const a=(Math.PI*2/n)*i-Math.PI/2;const lx=cx+(r+14)*Math.cos(a),ly=cy+(r+14)*Math.sin(a);ctx.fillText(traits[i].slice(0,4),lx,ly+3);}
    ctx.beginPath();
    for(let i=0;i<=n;i++){const idx=i%n;const a=(Math.PI*2/n)*idx-Math.PI/2;const v=vals[idx];ctx.lineTo(cx+r*v*Math.cos(a),cy+r*v*Math.sin(a));}
    ctx.closePath();ctx.fillStyle=colorBase+'0.2)';ctx.fill();ctx.strokeStyle=colorBase+'0.8)';ctx.lineWidth=2;ctx.stroke();
    for(let i=0;i<n;i++){const a=(Math.PI*2/n)*i-Math.PI/2;const v=vals[i];ctx.beginPath();ctx.arc(cx+r*v*Math.cos(a),cy+r*v*Math.sin(a),3,0,Math.PI*2);ctx.fillStyle=colorBase+'1)';ctx.fill();}
}

function timeAgo(ts){
    const d=new Date(ts),now=new Date(),diff=Math.floor((now-d)/1000);
    if(diff<60)return 'just now';
    if(diff<3600)return Math.floor(diff/60)+'m ago';
    if(diff<86400)return Math.floor(diff/3600)+'h ago';
    return Math.floor(diff/86400)+'d ago';
}

async function doSearch(){
    const el=document.getElementById('search-results');if(!el)return;
    el.innerHTML='<div class="loading"><div class="spinner"></div>Searching...</div>';
    const params=new URLSearchParams();
    const q=document.getElementById('s-query')?.value?.trim();if(q)params.set('query',q);
    const g=document.getElementById('s-gender')?.value;if(g)params.set('gender',g);
    const sk=document.getElementById('s-seeking')?.value;if(sk)params.set('seeking',sk);
    const amin=document.getElementById('s-age-min')?.value;if(amin)params.set('age_min',amin);
    const amax=document.getElementById('s-age-max')?.value;if(amax)params.set('age_max',amax);
    const loc=document.getElementById('s-location')?.value?.trim();if(loc)params.set('location',loc);
    try{
        const r=await fetch(API+'/api/search?'+params.toString());const d=await r.json();
        if(!d.results.length){el.innerHTML='<div class="empty" style="padding:24px"><h3>No results found</h3><p>Try broadening your search criteria</p></div>';return;}
        el.innerHTML='<div class="search-results">'+d.results.filter(p=>p.id!==activeProfile).map((p,i)=>`<div class="search-card" style="animation-delay:${i*.04}s" onclick="viewProfilePage('${p.id}')">

            <div id="mutual-sc-${p.id}"></div>
            ${p.photo?`<img src="/uploads/${p.photo}">`:'<div class="sc-placeholder">?</div>'}
            <h3>${escHtml(p.name)}</h3>
            <div class="sc-meta">${p.age?p.age+' yrs':''} ${p.location?'&bull; '+escHtml(p.location):''}</div>
            ${p.headline?`<div class="sc-headline">"${escHtml(p.headline)}"</div>`:''}
            ${p.dating_energy?`<span class="badge-energy">${escHtml(p.dating_energy)}</span>`:''}
            ${p.relationship_intent?`<span class="badge-intent">${escHtml(p.relationship_intent)}</span>`:''}
        </div>`).join('')+'</div>';

async function viewGroup(gid){
    const app=document.getElementById('app');
    app.innerHTML='<div class="loading"><div class="spinner"></div>Loading group...</div>';
    try{
        const r=await fetch(API+'/api/groups/'+gid+'?viewer='+activeProfile);const g=await r.json();
        let html=`<div class="card"><button class="btn btn-secondary" onclick="renderGroups()" style="margin-bottom:12px;font-size:12px;padding:6px 12px">Back to Groups</button>
        <h2>${escHtml(g.name)}</h2><p class="subtitle">${escHtml(g.description||'')}</p>
        <div style="margin-bottom:12px;font-size:12px;color:var(--overlay0)">${g.member_count} members &bull; ${g.privacy}</div>`;
        if(!g.is_member) html+=`<button class="btn btn-primary" onclick="joinGroupAction('${gid}')" style="margin-bottom:16px">Join Group</button>`;
        else html+=`<button class="btn btn-secondary" onclick="leaveGroupAction('${gid}')" style="margin-bottom:16px;font-size:12px;padding:6px 12px">Leave Group</button>`;

        // Tabs: Posts | Chat
        if(g.is_member){
            html+=`<div class="group-tabs"><button class="group-tab active" onclick="switchGroupTab('posts','${gid}')">Posts</button><button class="group-tab" onclick="switchGroupTab('chat','${gid}')">Chat</button></div>`;
        }

        html+=`<div id="group-posts-tab">`;
        // Post form for members
        if(g.is_member){
            html+=`<div style="display:flex;gap:8px;margin-bottom:8px"><input type="text" id="gp-input" placeholder="Write something to the group..." style="flex:1" onkeydown="if(event.key==='Enter')postToGroup('${gid}')"><button class="btn btn-primary" onclick="postToGroup('${gid}')" style="padding:8px 16px">Post</button><button class="btn btn-secondary" onclick="showPollForm('${gid}')" style="padding:8px 12px;font-size:13px" title="Create Poll">&#128202; Poll</button></div>`;
            html+=`<div id="poll-form-area"></div>`;
        }

        // Polls
        if(g.polls&&g.polls.length){
            for(const poll of g.polls){
                html+=renderPollHtml(poll,gid);
            }
        }

        // Posts
        if(g.posts&&g.posts.length){
            for(const p of g.posts){
                html+=`<div class="status-card"><div class="status-header">${p.photo?`<img src="/uploads/${p.photo}">`:'<div style="width:36px;height:36px;border-radius:50%;background:var(--surface0);display:flex;align-items:center;justify-content:center;color:var(--overlay0)">?</div>'}<span class="name" onclick="viewProfilePage('${p.profile_id}')">${escHtml(p.name)}</span><span class="time">${timeAgo(p.created_at)}</span></div><div class="status-body">${escHtml(p.content)}</div>${p.profile_id===activeProfile?`<div class="status-actions"><span onclick="deleteGroupPostAction('${gid}','${p.id}')">Delete</span></div>`:''}</div>`;
            }
        } else if(!g.polls||!g.polls.length) {
            html+=`<div style="color:var(--overlay0);font-size:13px;padding:12px">No posts yet. Start the conversation!</div>`;
        }
        html+=`</div>`;

        // Group Chat tab (hidden by default)
        html+=`<div id="group-chat-tab" style="display:none"><div class="group-chat-messages" id="group-msgs"><div class="loading"><div class="spinner"></div>Loading chat...</div></div><div style="display:flex;gap:8px;margin-top:8px"><input type="text" id="gc-input" placeholder="Type a message..." style="flex:1" onkeydown="if(event.key==='Enter')sendGroupMsg('${gid}')"><button class="btn btn-primary" onclick="sendGroupMsg('${gid}')" style="padding:8px 16px">Send</button></div></div>`;

        // Members
        html+=`<h3 style="font-size:14px;color:var(--subtext1);margin:16px 0 8px">Members (${g.member_count})</h3><div class="ms-friends-grid">`;
        for(const m of g.members.slice(0,12)){
            html+=`<div class="ms-friend" onclick="viewProfilePage('${m.profile_id}')">${m.photo?`<img src="/uploads/${m.photo}">`:'<div class="ms-friend-placeholder">?</div>'}<div class="name">${escHtml(m.name)}${m.role==='admin'?' (Admin)':''}</div></div>`;
        }
        html+=`</div></div>`;
        app.innerHTML=html;
    }catch(e){app.innerHTML='<div class="empty"><h3>Error loading group</h3></div>';}
}

let calYear,calMonth,calSelectedDay=null;
async function renderEventsCalendar(){
    if(!activeProfile){showView('welcome');return;}
    const now=new Date();
    calYear=calYear||now.getFullYear();
    calMonth=calMonth!==undefined?calMonth:now.getMonth();
    calSelectedDay=null;
    const app=document.getElementById('app');
    app.innerHTML=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><div><h2>Events Calendar</h2><p class="subtitle">View events by date</p></div><div class="view-toggle"><button class="active" onclick="renderEventsCalendar()">Calendar</button><button onclick="showView('events')">List</button></div></div><div id="cal-area"><div class="loading"><div class="spinner"></div></div></div><div id="cal-day-events"></div></div>`;
    try{
        const r=await fetch(API+'/api/events');const d=await r.json();
        buildCalendar(d.events||[]);
    }catch(e){document.getElementById('cal-area').innerHTML='<div class="empty"><h3>Could not load events</h3></div>';}
}

function buildCalendar(events){
    const el=document.getElementById('cal-area');if(!el)return;
    const now=new Date();
    const firstDay=new Date(calYear,calMonth,1).getDay();
    const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
    const prevDays=new Date(calYear,calMonth,0).getDate();
    const monthNames=['January','February','March','April','May','June','July','August','September','October','November','December'];

    // Parse event dates for this month
    const eventDays=new Set();
    const eventsByDay={};
    for(const ev of events){
        if(!ev.event_date)continue;
        const ed=new Date(ev.event_date+'T00:00:00');
        if(ed.getFullYear()===calYear&&ed.getMonth()===calMonth){
            const day=ed.getDate();
            eventDays.add(day);
            if(!eventsByDay[day])eventsByDay[day]=[];
            eventsByDay[day].push(ev);
        }
    }
    window._calEventsByDay=eventsByDay;

    let html=`<div class="calendar-header"><button onclick="calNav(-1)">&larr; Prev</button><h3>${monthNames[calMonth]} ${calYear}</h3><button onclick="calNav(1)">Next &rarr;</button></div>`;
    html+=`<div class="calendar-day-labels"><span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span></div>`;
    html+=`<div class="calendar-grid">`;

    // Previous month trailing days
    for(let i=firstDay-1;i>=0;i--){
        html+=`<div class="calendar-day other-month">${prevDays-i}</div>`;
    }
    // Current month days
    for(let d=1;d<=daysInMonth;d++){
        const isToday=d===now.getDate()&&calMonth===now.getMonth()&&calYear===now.getFullYear();
        const hasEvent=eventDays.has(d);
        html+=`<div class="calendar-day${isToday?' today':''}${hasEvent?' has-event':''}" onclick="selectCalDay(${d})">${d}</div>`;
    }
    // Next month leading days
    const totalCells=firstDay+daysInMonth;
    const remaining=totalCells%7===0?0:7-(totalCells%7);
    for(let i=1;i<=remaining;i++){
        html+=`<div class="calendar-day other-month">${i}</div>`;
    }
    html+=`</div>`;
    el.innerHTML=html;
}

function calNav(dir){
    calMonth+=dir;
    if(calMonth>11){calMonth=0;calYear++;}
    if(calMonth<0){calMonth=11;calYear--;}
    renderEventsCalendar();
}

function selectCalDay(day){
    calSelectedDay=day;
    document.querySelectorAll('.calendar-day:not(.other-month)').forEach(el=>{
        el.classList.toggle('selected',parseInt(el.textContent)===day);
    });
    const evEl=document.getElementById('cal-day-events');if(!evEl)return;
    const dayEvents=window._calEventsByDay?.[day];
    if(!dayEvents||!dayEvents.length){
        evEl.innerHTML=`<div style="color:var(--overlay0);font-size:13px;padding:16px;text-align:center">No events on this day</div>`;
        return;
    }
    evEl.innerHTML='<h3 style="font-size:14px;color:var(--subtext1);margin:16px 0 10px">Events on '+day+'</h3><div class="event-grid">'+dayEvents.map((e,i)=>`<div class="event-card" style="animation-delay:${i*.04}s" onclick="viewEvent('${e.id}')"><h3>${escHtml(e.title)}</h3>${e.event_date?`<div class="ec-date">${e.event_date}${e.event_time?' at '+e.event_time:''}</div>`:''}<div class="ec-loc">${escHtml(e.location||'No location set')}</div><div class="ec-meta">${e.attendee_count||0} attending</div></div>`).join('')+'</div>';
}

// ─── Guided Onboarding Tour ───
const onboardingSteps=[
    {target:'nav',text:'Welcome to Kindred! Start by completing your questionnaire to get matched.',title:'Welcome!'},
    {target:'nav',tabId:'matches',text:'Once you have a profile, find your most compatible matches here.',title:'Your Matches'},
    {target:'nav',tabId:'messages',text:'Message your matches and start meaningful conversations.',title:'Messages'},
    {target:'nav',tabId:'groups',text:'Join groups and attend events to meet like-minded people.',title:'Groups & Events'},
    {target:'nav',tabId:'myprofile',text:'Customize your profile page, add photos, and manage your settings.',title:'Your Profile'},
];
let onboardingStep=0;

function startOnboarding(){
    if(safeGet('kindred_onboarded',''))return;
    onboardingStep=0;
    showOnboardingStep();
}

function showOnboardingStep(){
    // Remove previous
    document.querySelectorAll('.onboarding-overlay,.onboarding-tooltip').forEach(e=>e.remove());
    document.querySelectorAll('.onboarding-highlight').forEach(e=>e.classList.remove('onboarding-highlight'));

    if(onboardingStep>=onboardingSteps.length){
        finishOnboarding();
        return;
    }

    const step=onboardingSteps[onboardingStep];
    // Overlay
    const overlay=document.createElement('div');
    overlay.className='onboarding-overlay';
    document.body.appendChild(overlay);

    // Find target element
    let targetEl=null;
    if(step.tabId){
        targetEl=document.querySelector(`.nav-tab[data-v="${step.tabId}"]`);
    }
    if(!targetEl) targetEl=document.getElementById(step.target);
    if(targetEl) targetEl.classList.add('onboarding-highlight');

    // Tooltip
    const tooltip=document.createElement('div');
    tooltip.className='onboarding-tooltip';
    tooltip.innerHTML=`<div class="ob-step">Step ${onboardingStep+1} of ${onboardingSteps.length}</div><h3>${step.title}</h3><p>${step.text}</p><div class="ob-actions"><button class="btn btn-secondary" onclick="finishOnboarding()" style="padding:6px 14px;font-size:12px">Skip</button><button class="btn btn-primary" onclick="nextOnboardingStep()" style="padding:6px 14px;font-size:12px">${onboardingStep===onboardingSteps.length-1?'Finish':'Next'}</button></div>`;

    // Position tooltip
    if(targetEl){
        const rect=targetEl.getBoundingClientRect();
        tooltip.style.top=(rect.bottom+12)+'px';
        tooltip.style.left=Math.max(12,Math.min(rect.left,window.innerWidth-340))+'px';
    } else {
        tooltip.style.top='50%';tooltip.style.left='50%';tooltip.style.transform='translate(-50%,-50%)';
    }
    document.body.appendChild(tooltip);
}

function nextOnboardingStep(){
    onboardingStep++;
    showOnboardingStep();
}

function finishOnboarding(){
    document.querySelectorAll('.onboarding-overlay,.onboarding-tooltip').forEach(e=>e.remove());
    document.querySelectorAll('.onboarding-highlight').forEach(e=>e.classList.remove('onboarding-highlight'));
    safeSet('kindred_onboarded','1');
    authFetch(API+'/api/onboarding/complete',{method:'POST',headers:authHeaders()}).catch(()=>{});
    toast('You\'re all set! Enjoy Kindred.','success');
}

// ─── Web Push Notifications ───
async function checkPushStatus(){
    const btn=document.getElementById('push-toggle-btn');
    const status=document.getElementById('push-status');
    if(!btn)return;
    if(!('serviceWorker' in navigator)||!('PushManager' in window)){
        btn.style.display='none';
        if(status) status.innerHTML='<div style="color:var(--overlay0);font-size:12px;margin-bottom:8px">Push notifications are not supported in this browser.</div>';
        return;
    }
    try{
        const reg=await navigator.serviceWorker.ready;
        const sub=await reg.pushManager.getSubscription();
        if(sub){
            btn.textContent='Disable Push Notifications';
            btn.className='btn btn-danger';
            if(status) status.innerHTML='<div style="color:var(--green);font-size:12px;margin-bottom:8px;font-weight:500">Push notifications are enabled.</div>';
        }
    }catch(e){}
}

async function togglePushNotifications(){
    if(!('serviceWorker' in navigator)||!('PushManager' in window)){toast('Push not supported','error');return;}
    try{
        const reg=await navigator.serviceWorker.ready;
        const existing=await reg.pushManager.getSubscription();
        if(existing){
            await existing.unsubscribe();
            await authFetch(API+'/api/push/unsubscribe',{method:'POST',headers:authHeaders()});
            toast('Push notifications disabled','success');
            checkPushStatus();
            return;
        }
        // Get VAPID key
        const kr=await authFetch(API+'/api/push/vapid-key');
        if(!kr.ok){toast('Could not get push key','error');return;}
        const kd=await kr.json();
        const sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:kd.public_key});
        await authFetch(API+'/api/push/subscribe',{method:'POST',headers:authHeaders(),body:JSON.stringify(sub.toJSON())});
        toast('Push notifications enabled!','success');
        checkPushStatus();
    }catch(e){toast('Could not enable push notifications','error');}
}

let _notifSoundsEnabled=safeGet('kindred_notif_sounds','')==='1';
function playNotifSound(){
    if(!_notifSoundsEnabled)return;
    try{
        const ctx=new(window.AudioContext||window.webkitAudioContext)();
        const t0=ctx.currentTime;
        [440,660].forEach((freq,i)=>{
            const osc=ctx.createOscillator();const gain=ctx.createGain();
            osc.connect(gain);gain.connect(ctx.destination);
            osc.type='sine';osc.frequency.value=freq;
            gain.gain.setValueAtTime(0.15,t0+i*0.12);
            gain.gain.exponentialRampToValueAtTime(0.001,t0+i*0.12+0.18);
            osc.start(t0+i*0.12);osc.stop(t0+i*0.12+0.2);
        });
    }catch(e){}
}

    _notifSoundsEnabled=enabled;

// ─── FEATURE: Voice Messages (Feature 1) ───
// ══════════════════════════════════════════════
let _mediaRecorder=null, _audioChunks=[], _recTimerInterval=null, _recStartTime=0;

function toggleVoiceRecord(meId,themId){
    if(_mediaRecorder&&_mediaRecorder.state==='recording'){
        _mediaRecorder.stop();
    } else {
        startVoiceRecord(meId,themId);
    }
}

async function startVoiceRecord(meId,themId){
    try{
        const stream=await navigator.mediaDevices.getUserMedia({audio:true});
        _audioChunks=[];
        _mediaRecorder=new MediaRecorder(stream,{mimeType:MediaRecorder.isTypeSupported('audio/webm')?'audio/webm':'audio/ogg'});
        _mediaRecorder.ondataavailable=e=>{if(e.data.size>0)_audioChunks.push(e.data);};
        _mediaRecorder.onstop=()=>{
            stream.getTracks().forEach(t=>t.stop());
            clearInterval(_recTimerInterval);
            const recBtn=document.getElementById('voice-rec-btn');
            const recInd=document.getElementById('rec-indicator');
            if(recBtn){recBtn.classList.remove('recording');recBtn.innerHTML='&#127908;';}
            if(recInd)recInd.style.display='none';
            const blob=new Blob(_audioChunks,{type:_mediaRecorder.mimeType||'audio/webm'});
            sendVoiceMessage(meId,themId,blob);
            _mediaRecorder=null;
        };
        _mediaRecorder.start();
        _recStartTime=Date.now();
        const recBtn=document.getElementById('voice-rec-btn');
        const recInd=document.getElementById('rec-indicator');
        if(recBtn){recBtn.classList.add('recording');recBtn.innerHTML='&#9632;';}
        if(recInd){recInd.style.display='flex';}
        _recTimerInterval=setInterval(()=>{
            const el=document.getElementById('rec-timer');
            if(el){const s=Math.floor((Date.now()-_recStartTime)/1000);el.textContent=Math.floor(s/60)+':'+(s%60<10?'0':'')+s%60;}
        },500);
    }catch(e){toast('Microphone access denied','error');}
}

async function sendVoiceMessage(from,to,blob){
    const fd=new FormData();fd.append('file',blob,'voice.webm');fd.append('from_id',from);fd.append('to_id',to);
    try{
        const r=await authFetch(API+'/api/messages/voice',{method:'POST',body:fd});
        if(r.ok){openChat(from,to);}
        else toast('Failed to send voice message','error');
    }catch(e){toast('Send failed','error');}
}

// ══════════════════════════════════════════════
function getExpiryBadgeHtml(match){
    if(!match.matched_at)return '';
    const matchedMs=new Date(match.matched_at).getTime();
    const nowMs=Date.now();
    const daysSince=Math.floor((nowMs-matchedMs)/(1000*60*60*24));
    const hasMessaged=match.message_count>0;
    if(hasMessaged)return '';
    const daysLeft=7-daysSince;
    if(daysLeft<=0)return '<span class="expiry-badge expiry-expired">Expired</span>';
    if(daysLeft<=2)return `<span class="expiry-badge expiry-danger">Expires in ${daysLeft}d</span>`;
    if(daysLeft<=4)return `<span class="expiry-badge expiry-warn">Expires in ${daysLeft}d</span>`;
    return '';
}

// ─── FEATURE: Compatibility Radar Chart (Feature 13) ───
// ══════════════════════════════════════════════
function drawCompatRadar(canvasId, scores){
    const c=document.getElementById(canvasId);if(!c)return;
    const ctx=c.getContext('2d'),cx=160,cy=160,r=110;
    const dims=['personality','values','communication','financial','attachment','tradeoffs','semantic','dealbreaker'];
    const n=dims.length;
    ctx.clearRect(0,0,320,320);
    // Grid rings
    for(let ring=0.25;ring<=1;ring+=0.25){
        ctx.beginPath();
        for(let i=0;i<=n;i++){const a=(Math.PI*2/n)*i-Math.PI/2;ctx.lineTo(cx+r*ring*Math.cos(a),cy+r*ring*Math.sin(a));}
        ctx.closePath();ctx.strokeStyle='rgba(69,71,90,0.6)';ctx.lineWidth=1;ctx.stroke();
    }
    // Spokes
    for(let i=0;i<n;i++){const a=(Math.PI*2/n)*i-Math.PI/2;ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));ctx.strokeStyle='rgba(69,71,90,0.4)';ctx.stroke();}
    // Labels
    ctx.font='11px system-ui';ctx.fillStyle='#a6adc8';ctx.textAlign='center';
    for(let i=0;i<n;i++){const a=(Math.PI*2/n)*i-Math.PI/2;const lx=cx+(r+18)*Math.cos(a),ly=cy+(r+18)*Math.sin(a);ctx.fillText(dims[i].slice(0,5),lx,ly+4);}
    // Score polygon
    ctx.beginPath();
    for(let i=0;i<=n;i++){const idx=i%n;const a=(Math.PI*2/n)*idx-Math.PI/2;const v=(scores[dims[idx]]||0)/100;ctx.lineTo(cx+r*v*Math.cos(a),cy+r*v*Math.sin(a));}
    ctx.closePath();ctx.fillStyle='rgba(203,166,247,0.2)';ctx.fill();ctx.strokeStyle='rgba(203,166,247,0.85)';ctx.lineWidth=2;ctx.stroke();
    // Dots + score labels
    ctx.font='10px system-ui';ctx.fillStyle='var(--mauve)';
    for(let i=0;i<n;i++){const a=(Math.PI*2/n)*i-Math.PI/2;const v=(scores[dims[i]]||0)/100;const px=cx+r*v*Math.cos(a),py=cy+r*v*Math.sin(a);ctx.beginPath();ctx.arc(px,py,4,0,Math.PI*2);ctx.fillStyle='rgba(203,166,247,1)';ctx.fill();ctx.fillStyle='#a6adc8';ctx.fillText((scores[dims[i]]||0)+'%',px,py-7);}
}

// ─── FEATURE: Image Cropping (Feature 15) ───
// ══════════════════════════════════════════════
let _cropState={img:null,x:0,y:0,scale:1,rotation:0,dragging:false,startX:0,startY:0,imgX:0,imgY:0};

function showCropOverlay(file,onCropDone){
    const reader=new FileReader();
    reader.onload=e=>{
        const overlay=document.createElement('div');
        overlay.className='crop-overlay';
        overlay.id='crop-overlay';
        overlay.innerHTML=`
        <div style="color:white;font-size:16px;font-weight:600;margin-bottom:8px">Crop Photo</div>
        <div class="crop-wrapper" id="crop-wrap">
            <img id="crop-img" src="${e.target.result}" draggable="false">
            <div class="crop-frame"></div>
        </div>
        <div class="crop-controls">
            <button class="btn btn-secondary" style="font-size:13px;padding:6px 12px" onclick="cropRotate(-90)">&#8634; -90</button>
            <button class="btn btn-secondary" style="font-size:13px;padding:6px 12px" onclick="cropRotate(90)">&#8635; +90</button>
            <input type="range" id="crop-zoom" min="0.5" max="3" step="0.05" value="1" style="width:120px;accent-color:var(--mauve)" oninput="cropZoom(parseFloat(this.value))">
            <span style="color:white;font-size:12px">Zoom</span>
        </div>
        <div style="display:flex;gap:10px">
            <button class="btn btn-secondary" onclick="document.getElementById('crop-overlay').remove()">Cancel</button>
            <button class="btn btn-primary" onclick="applyCrop()">Use Photo</button>
        </div>`;
        document.body.appendChild(overlay);
        _cropState={x:0,y:0,scale:1,rotation:0,dragging:false,startX:0,startY:0,imgX:0,imgY:0,onDone:onCropDone,file};
        const img=document.getElementById('crop-img');
        img.onload=()=>{applyTransform();setupCropDrag();};
    };
    reader.readAsDataURL(file);
}

function applyTransform(){
    const img=document.getElementById('crop-img');if(!img)return;
    img.style.transform=`translate(calc(-50% + ${_cropState.x}px), calc(-50% + ${_cropState.y}px)) rotate(${_cropState.rotation}deg) scale(${_cropState.scale})`;
    img.style.left='50%';img.style.top='50%';
}

function cropRotate(deg){_cropState.rotation+=deg;applyTransform();}
function cropZoom(val){_cropState.scale=val;applyTransform();}

function setupCropDrag(){
    const wrap=document.getElementById('crop-wrap');
    const img=document.getElementById('crop-img');
    if(!wrap||!img)return;
    const onDown=e=>{e.preventDefault();_cropState.dragging=true;const p=e.touches?e.touches[0]:e;_cropState.startX=p.clientX;_cropState.startY=p.clientY;_cropState.imgX=_cropState.x;_cropState.imgY=_cropState.y;};
    const onMove=e=>{if(!_cropState.dragging)return;e.preventDefault();const p=e.touches?e.touches[0]:e;_cropState.x=_cropState.imgX+(p.clientX-_cropState.startX);_cropState.y=_cropState.imgY+(p.clientY-_cropState.startY);applyTransform();};
    const onUp=()=>{_cropState.dragging=false;document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);document.removeEventListener('touchmove',onMove);document.removeEventListener('touchend',onUp);};
    img.addEventListener('mousedown',onDown);document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onUp);
    img.addEventListener('touchstart',onDown,{passive:false});document.addEventListener('touchmove',onMove,{passive:false});document.addEventListener('touchend',onUp);
}

function applyCrop(){
    const img=document.getElementById('crop-img');
    if(!img){return;}
    const SIZE=300;
    const canvas=document.createElement('canvas');canvas.width=SIZE;canvas.height=SIZE;
    const ctx=canvas.getContext('2d');
    ctx.save();
    ctx.translate(SIZE/2,SIZE/2);
    ctx.rotate((_cropState.rotation*Math.PI)/180);
    ctx.scale(_cropState.scale,_cropState.scale);
    ctx.drawImage(img,-img.naturalWidth/2+_cropState.x/_cropState.scale,-img.naturalHeight/2+_cropState.y/_cropState.scale);
    ctx.restore();
    canvas.toBlob(blob=>{
        document.getElementById('crop-overlay')?.remove();
        if(_cropState.onDone)_cropState.onDone(blob);
    },'image/jpeg',0.92);
}

async function savePrompts(pid){
    const prompts=[];
    for(let i=0;i<3;i++){
        const q=document.getElementById('prompt-q-'+i)?.value;
        const a=document.getElementById('prompt-a-'+i)?.value?.trim();
        if(q&&a)prompts.push({question:q,answer:a});
    }
    if(!prompts.length){toast('Add at least one answer','error');return;}
    try{
        const r=await authFetch(API+'/api/profile/'+pid+'/prompts',{method:'PUT',headers:authHeaders(),body:JSON.stringify({prompts})});
        if(r.ok){toast('Prompts saved!','success');loadProfilePrompts(pid,true);}
        else toast('Save failed','error');
    }catch(e){toast('Error','error');}
}

async function loadStoriesBar(){
    const el=document.getElementById('stories-bar');if(!el)return;

async function viewStory(profileId, idx){
    try{
        const r=await authFetch(API+'/api/stories/'+profileId);
        if(!r.ok){toast('No stories available','info');return;}
        const d=await r.json();
        const stories=d.stories||[];
        if(!stories.length){toast('No stories to show','info');return;}
        showStoryOverlay(stories,0,profileId,d.profile_name,d.profile_photo);
    }catch(e){toast('Could not load story','error');}
}

function showStoryOverlay(stories,idx,profileId,profileName,profilePhoto){
    document.getElementById('story-overlay-el')?.remove();
    const story=stories[idx];if(!story)return;
    const overlay=document.createElement('div');
    overlay.className='story-overlay';overlay.id='story-overlay-el';
    const timerWidth=(idx+1)/stories.length*100;
    let contentHtml='';
    if(story.photo){contentHtml=`<img src="/uploads/${story.photo}" alt="Story">`;}
    else{contentHtml=`<div class="story-text-slide">${escHtml(story.text||'')}</div>`;}
    overlay.innerHTML=`
        <div class="story-timer-bar"><div class="story-timer-fill" id="story-tfill" style="width:0%"></div></div>
        <div class="story-author">
            ${profilePhoto?`<img src="/uploads/${profilePhoto}" style="width:32px;height:32px;border-radius:50%;object-fit:cover;border:2px solid var(--mauve)">`:''}
            <span>${escHtml(profileName||'')}</span>
            <span style="font-size:11px;opacity:.7">${timeAgo(story.created_at)}</span>
        </div>
        <button class="story-close" onclick="closeStory()">&#10005;</button>
        <div class="story-content">${contentHtml}</div>
        ${idx>0?`<button onclick="showStoryOverlay(window._currentStories,${idx-1},'${profileId}',${JSON.stringify(profileName)},${JSON.stringify(profilePhoto)})" style="position:absolute;left:12px;top:50%;background:rgba(255,255,255,.1);border:none;color:white;font-size:22px;width:40px;height:40px;border-radius:50%;cursor:pointer;transform:translateY(-50%)">&#8249;</button>`:''}
        ${idx<stories.length-1?`<button onclick="showStoryOverlay(window._currentStories,${idx+1},'${profileId}',${JSON.stringify(profileName)},${JSON.stringify(profilePhoto)})" style="position:absolute;right:12px;top:50%;background:rgba(255,255,255,.1);border:none;color:white;font-size:22px;width:40px;height:40px;border-radius:50%;cursor:pointer;transform:translateY(-50%)">&#8250;</button>`:''}`;
    document.body.appendChild(overlay);
    window._currentStories=stories;
    // Animate timer
    const fill=document.getElementById('story-tfill');
    clearTimeout(_storyTimer);
    if(fill){
        let pct=0;const dur=5000;const step=50;
        const iv=setInterval(()=>{pct+=step/dur*100;fill.style.width=pct+'%';if(pct>=100){clearInterval(iv);}},step);
        _storyTimer=setTimeout(()=>{
            if(idx<stories.length-1) showStoryOverlay(stories,idx+1,profileId,profileName,profilePhoto);
            else closeStory();
        },dur);
    }
    // Mark as viewed
    authFetch(API+'/api/stories/'+story.id+'/view',{method:'POST',headers:authHeaders()}).catch(()=>{});
}

function closeStory(){
    clearTimeout(_storyTimer);
    document.getElementById('story-overlay-el')?.remove();
}

function showStoryCreate(){
    const overlay=document.createElement('div');
    overlay.className='modal-overlay';
    overlay.innerHTML=`<div class="modal"><h2>Add a Story</h2><p class="subtitle">Share a moment — it expires in 24 hours</p>
        <div style="display:flex;gap:8px;margin-bottom:12px">
            <button class="btn btn-secondary" id="sc-text-btn" onclick="document.getElementById('sc-text-area').style.display='block';document.getElementById('sc-photo-area').style.display='none';this.className='btn btn-primary';document.getElementById('sc-photo-btn').className='btn btn-secondary'">Text</button>
            <button class="btn btn-secondary" id="sc-photo-btn" onclick="document.getElementById('sc-photo-area').style.display='block';document.getElementById('sc-text-area').style.display='none';this.className='btn btn-primary';document.getElementById('sc-text-btn').className='btn btn-secondary'">Photo</button>
        </div>
        <div id="sc-text-area"><textarea id="sc-text-input" placeholder="What's on your mind?" style="min-height:100px;width:100%"></textarea></div>
        <div id="sc-photo-area" style="display:none"><label class="btn btn-secondary" style="cursor:pointer;display:inline-block">Choose Photo<input type="file" accept="image/*" style="display:none" id="sc-photo-file" onchange="document.getElementById('sc-photo-preview').src=URL.createObjectURL(this.files[0]);document.getElementById('sc-photo-preview').style.display='block'"></label><br><img id="sc-photo-preview" style="max-width:100%;margin-top:8px;border-radius:8px;display:none"></div>
        <div class="btn-row" style="margin-top:12px"><button class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">Cancel</button><button class="btn btn-primary" onclick="submitStory(this)">Post Story</button></div>

async function submitStory(btn){
    btn.disabled=true;btn.textContent='Posting...';
    const text=document.getElementById('sc-text-input')?.value?.trim();
    const photoFile=document.getElementById('sc-photo-file')?.files?.[0];
    try{
        let r;
        if(photoFile){
            const fd=new FormData();fd.append('file',photoFile);if(text)fd.append('text',text);
            r=await authFetch(API+'/api/stories',{method:'POST',body:fd});
        } else {
            if(!text){toast('Add text or a photo','error');btn.disabled=false;btn.textContent='Post Story';return;}
            r=await authFetch(API+'/api/stories',{method:'POST',headers:authHeaders(),body:JSON.stringify({text})});
        }
        if(r.ok){btn.closest('.modal-overlay').remove();toast('Story posted!','success');loadStoriesBar();}
        else{const d=await r.json();toast(d.detail||'Failed','error');btn.disabled=false;btn.textContent='Post Story';}
    }catch(e){toast('Error','error');btn.disabled=false;btn.textContent='Post Story';}
}

function addPollOption(){

async function submitPoll(gid){
    const q=document.getElementById('poll-q')?.value?.trim();
    if(!q){toast('Poll question required','error');return;}
    const opts=[...document.querySelectorAll('.poll-opt-input')].map(i=>i.value.trim()).filter(Boolean);
    if(opts.length<2){toast('Need at least 2 options','error');return;}
    try{
        const r=await authFetch(API+'/api/groups/'+gid+'/polls',{method:'POST',headers:authHeaders(),body:JSON.stringify({question:q,options:opts})});
        if(r.ok){toast('Poll created!','success');document.getElementById('poll-form-area').innerHTML='';viewGroup(gid);}
        else toast('Failed to create poll','error');
    }catch(e){toast('Error','error');}
