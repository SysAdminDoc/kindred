<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kindred v1.3.0 - Find Your Match</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<script src="https://js.puter.com/v2/"></script>
<style>
:root {
    --base: #1e1e2e; --mantle: #181825; --crust: #11111b;
    --surface0: #313244; --surface1: #45475a; --surface2: #585b70;
    --overlay0: #6c7086; --overlay1: #7f849c;
    --text: #cdd6f4; --subtext0: #a6adc8; --subtext1: #bac2de;
    --lavender: #b4befe; --blue: #89b4fa; --sapphire: #74c7ec;
    --green: #a6e3a1; --peach: #fab387; --red: #f38ba8;
    --mauve: #cba6f7; --pink: #f5c2e7; --yellow: #f9e2af;
    --rosewater: #f5e0dc; --flamingo: #f2cdcd; --teal: #94e2d5;
    --radius: 12px; --shadow: 0 8px 32px rgba(0,0,0,0.4);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',system-ui,-apple-system,sans-serif; background:var(--crust); color:var(--text); min-height:100vh; }
::-webkit-scrollbar { width:8px; }
::-webkit-scrollbar-track { background:var(--mantle); }
::-webkit-scrollbar-thumb { background:var(--surface2); border-radius:4px; }

.header { background:var(--mantle); border-bottom:1px solid var(--surface0); padding:12px 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
.header h1 { font-size:22px; font-weight:700; background:linear-gradient(135deg,var(--mauve),var(--pink),var(--flamingo)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.header .ver { color:var(--overlay0); font-size:11px; margin-left:8px; }
.nav-tabs { display:flex; gap:4px; flex-wrap:wrap; }
.nav-tab { background:var(--surface0); border:1px solid var(--surface1); color:var(--subtext0); padding:7px 14px; border-radius:var(--radius); cursor:pointer; font-size:13px; transition:all .2s; position:relative; }
.nav-tab:hover { background:var(--surface1); color:var(--text); }
.nav-tab.active { background:var(--mauve); color:var(--crust); border-color:var(--mauve); font-weight:600; }
.nav-tab .badge { position:absolute; top:-4px; right:-4px; background:var(--red); color:var(--crust); font-size:10px; font-weight:700; padding:2px 5px; border-radius:10px; }

.container { max-width:760px; margin:0 auto; padding:24px 16px; }
.container.wide { max-width:960px; }
.card { background:var(--base); border:1px solid var(--surface0); border-radius:var(--radius); padding:28px; margin-bottom:20px; box-shadow:var(--shadow); animation:fadeUp .4s ease forwards; opacity:0; transform:translateY(16px); }
@keyframes fadeUp { to { opacity:1; transform:translateY(0); } }
.card h2 { font-size:18px; margin-bottom:6px; color:var(--lavender); }
.card .subtitle { color:var(--overlay0); font-size:13px; margin-bottom:20px; }

.progress-bar { width:100%; height:4px; background:var(--surface0); border-radius:2px; margin-bottom:8px; }
.progress-fill { height:100%; background:linear-gradient(90deg,var(--mauve),var(--pink)); border-radius:2px; transition:width .5s ease; }
.progress-label { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
.progress-label .cat { font-size:12px; color:var(--mauve); font-weight:600; text-transform:uppercase; letter-spacing:.5px; }
.progress-label .count { font-size:12px; color:var(--overlay0); }

.form-group { margin-bottom:16px; }
.form-group label { display:block; font-size:13px; font-weight:500; color:var(--subtext1); margin-bottom:6px; }
input[type="text"],input[type="number"],select { width:100%; padding:10px 14px; background:var(--mantle); border:1px solid var(--surface1); border-radius:8px; color:var(--text); font-size:14px; outline:none; transition:border-color .2s; }
input:focus,select:focus,textarea:focus { border-color:var(--mauve); }
select option { background:var(--mantle); color:var(--text); }

/* Question card - one per screen */
.q-card { min-height:200px; display:flex; flex-direction:column; }
.q-text { font-size:18px; color:var(--text); margin-bottom:20px; line-height:1.5; font-weight:500; }
.q-hint { font-size:13px; color:var(--overlay0); margin-bottom:16px; }

/* Likert - horizontal scale */
.likert-opts { display:flex; gap:6px; justify-content:space-between; }
.likert-opt { flex:1; text-align:center; }
.likert-opt input[type="radio"] { display:none; }
.likert-opt label { display:block; padding:12px 4px; border-radius:8px; cursor:pointer; font-size:12px; color:var(--subtext0); background:var(--surface0); border:2px solid transparent; transition:all .2s; }
.likert-opt label:hover { background:var(--surface1); }
.likert-opt input:checked+label { background:var(--mauve); color:var(--crust); font-weight:600; border-color:var(--lavender); transform:scale(1.05); }

/* Choice cards */
.choice-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.choice-card { padding:14px 16px; background:var(--surface0); border:2px solid transparent; border-radius:10px; cursor:pointer; font-size:14px; color:var(--subtext0); text-align:center; transition:all .2s; }
.choice-card:hover { background:var(--surface1); color:var(--text); }
.choice-card.selected { background:rgba(203,166,247,.15); border-color:var(--mauve); color:var(--mauve); font-weight:500; }

/* Multi-select */
.multi-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.multi-opt { padding:12px 14px; background:var(--surface0); border:2px solid transparent; border-radius:10px; cursor:pointer; font-size:13px; color:var(--subtext0); transition:all .2s; }
.multi-opt:hover { background:var(--surface1); }
.multi-opt.selected { background:rgba(243,139,168,.12); border-color:var(--red); color:var(--red); font-weight:500; }

textarea { width:100%; min-height:120px; padding:14px; background:var(--mantle); border:1px solid var(--surface1); border-radius:8px; color:var(--text); font-size:14px; font-family:inherit; resize:vertical; outline:none; line-height:1.5; }
textarea::placeholder { color:var(--surface2); }

/* Tradeoff cards - side by side */
.tradeoff-opts { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.tradeoff-card { padding:20px 16px; background:var(--surface0); border:2px solid transparent; border-radius:10px; cursor:pointer; font-size:14px; color:var(--subtext0); text-align:center; transition:all .2s; line-height:1.4; display:flex; align-items:center; justify-content:center; min-height:80px; }
.tradeoff-card:hover { background:var(--surface1); }
.tradeoff-card.selected { background:rgba(203,166,247,.15); border-color:var(--mauve); color:var(--mauve); }

/* Scenario options - stacked */
.scenario-opts { display:grid; gap:8px; }
.scenario-opt { padding:14px 16px; background:var(--surface0); border:2px solid transparent; border-radius:10px; cursor:pointer; font-size:14px; color:var(--subtext0); transition:all .2s; line-height:1.4; }
.scenario-opt:hover { background:var(--surface1); }
.scenario-opt.selected { background:rgba(203,166,247,.15); border-color:var(--mauve); color:var(--mauve); }

/* Navigation buttons */
.btn-row { display:flex; justify-content:space-between; gap:10px; margin-top:24px; }
.btn { padding:10px 28px; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; border:none; transition:all .2s; }
.btn:active { transform:scale(.97); }
.btn-primary { background:linear-gradient(135deg,var(--mauve),var(--pink)); color:var(--crust); }
.btn-primary:hover { filter:brightness(1.1); }
.btn-secondary { background:var(--surface0); color:var(--subtext1); border:1px solid var(--surface1); }
.btn-secondary:hover { background:var(--surface1); }
.btn:disabled { opacity:.4; cursor:not-allowed; }
.btn-danger { background:rgba(243,139,168,.15); color:var(--red); border:1px solid var(--red); }
.btn-danger:hover { background:rgba(243,139,168,.25); }

/* Weight sliders */
.weight-slider { display:flex; align-items:center; gap:12px; margin-bottom:14px; }
.weight-slider label { min-width:110px; font-size:13px; color:var(--subtext0); }
.weight-slider input[type="range"] { flex:1; accent-color:var(--mauve); }
.weight-slider .wval { min-width:40px; text-align:right; font-size:13px; color:var(--text); font-weight:500; }

/* Review screen */
.review-group { margin-bottom:16px; }
.review-group-header { display:flex; justify-content:space-between; align-items:center; padding:10px 14px; background:var(--mantle); border-radius:8px; margin-bottom:6px; cursor:pointer; }
.review-group-header h3 { font-size:14px; color:var(--lavender); }
.review-group-header .edit-link { font-size:12px; color:var(--mauve); }
.review-item { display:flex; justify-content:space-between; padding:8px 14px; font-size:13px; border-bottom:1px solid var(--surface0); }
.review-item .rk { color:var(--overlay0); }
.review-item .rv { color:var(--text); font-weight:500; text-align:right; max-width:60%; }

/* Match cards */
.match-card { background:var(--base); border:1px solid var(--surface0); border-radius:var(--radius); padding:16px 20px; margin-bottom:10px; display:flex; align-items:center; gap:16px; cursor:pointer; transition:all .25s; animation:fadeUp .4s ease forwards; opacity:0; }
.match-card:hover { border-color:var(--mauve); transform:translateY(-2px); box-shadow:0 4px 20px rgba(203,166,247,.1); }
.match-score { font-size:26px; font-weight:700; min-width:70px; text-align:center; }
.score-high { color:var(--green); } .score-mid { color:var(--yellow); } .score-low { color:var(--peach); } .score-fail { color:var(--red); }
.match-info h3 { font-size:15px; margin-bottom:2px; }
.match-info .meta { color:var(--overlay0); font-size:12px; }
.match-tags { margin-left:auto; display:flex; gap:4px; flex-wrap:wrap; }
.match-tag { background:var(--surface0); padding:3px 8px; border-radius:12px; font-size:11px; color:var(--subtext0); }

/* Badges */
.badge-verified { display:inline-block; background:var(--green); color:var(--crust); font-size:10px; font-weight:700; padding:2px 6px; border-radius:4px; margin-left:6px; vertical-align:middle; }
.badge-energy { display:inline-block; background:var(--surface0); color:var(--subtext0); font-size:10px; padding:2px 6px; border-radius:4px; margin-left:4px; }
.badge-intent { display:inline-block; background:rgba(203,166,247,.15); color:var(--mauve); font-size:10px; padding:2px 6px; border-radius:4px; margin-left:4px; }
.badge-turn { display:inline-block; background:var(--peach); color:var(--crust); font-size:10px; font-weight:700; padding:2px 6px; border-radius:4px; margin-left:6px; }

/* Photo */
.photo-thumb { width:48px; height:48px; border-radius:50%; object-fit:cover; border:2px solid var(--surface1); }
.photo-locked { width:48px; height:48px; border-radius:50%; background:var(--surface0); display:flex; align-items:center; justify-content:center; font-size:18px; color:var(--overlay0); border:2px solid var(--surface1); }

/* Breakdown */
.breakdown { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:16px; }
.bd-item { background:var(--mantle); border-radius:8px; padding:14px; }
.bd-item .label { font-size:11px; color:var(--overlay0); text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px; }
.bd-bar { width:100%; height:5px; background:var(--surface0); border-radius:3px; margin-bottom:4px; }
.bd-fill { height:100%; border-radius:3px; transition:width .8s ease; }
.bd-item .value { font-size:18px; font-weight:700; }

/* Radar chart */
.radar-container { display:flex; justify-content:center; margin:16px 0; }

/* Messages */
.msg-list { max-height:400px; overflow-y:auto; padding:8px 0; }
.msg-bubble { max-width:75%; padding:10px 14px; border-radius:12px; margin-bottom:6px; font-size:14px; line-height:1.4; }
.msg-mine { background:var(--mauve); color:var(--crust); margin-left:auto; border-bottom-right-radius:4px; }
.msg-theirs { background:var(--surface0); color:var(--text); border-bottom-left-radius:4px; }
.msg-time { font-size:10px; color:var(--overlay0); margin-top:2px; }
.msg-input-row { display:flex; gap:8px; margin-top:12px; }
.msg-input-row input { flex:1; }

/* Convo list */
.convo-item { display:flex; align-items:center; gap:12px; padding:12px 16px; background:var(--base); border:1px solid var(--surface0); border-radius:8px; margin-bottom:6px; cursor:pointer; transition:all .2s; }
.convo-item:hover { border-color:var(--surface2); }
.convo-unread { background:var(--red); color:var(--crust); font-size:11px; font-weight:700; padding:2px 7px; border-radius:10px; margin-left:auto; }
.online-dot { width:8px; height:8px; border-radius:50%; background:var(--green); display:inline-block; flex-shrink:0; box-shadow:0 0 6px var(--green); }
.offline-dot { width:8px; height:8px; border-radius:50%; background:var(--surface2); display:inline-block; flex-shrink:0; }
.profile-completeness { height:4px; background:var(--surface0); border-radius:2px; overflow:hidden; margin-top:8px; }
.profile-completeness-fill { height:100%; background:linear-gradient(90deg,var(--red),var(--peach),var(--green)); border-radius:2px; transition:width .5s ease; }
.game-question { font-size:18px; font-weight:600; text-align:center; color:var(--text); margin:16px 0; }
.game-choices { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:16px 0; }
.game-choice { padding:20px; background:var(--surface0); border:2px solid transparent; border-radius:var(--radius); cursor:pointer; text-align:center; font-size:15px; font-weight:500; color:var(--subtext1); transition:all .2s; }
.game-choice:hover { background:var(--surface1); color:var(--text); transform:translateY(-2px); }
.game-choice.selected { border-color:var(--mauve); background:rgba(203,166,247,.12); color:var(--mauve); }
.game-choice.matched { border-color:var(--green); background:rgba(166,227,161,.12); color:var(--green); }
.game-choice.mismatched { border-color:var(--peach); background:rgba(250,179,135,.12); color:var(--peach); }
.game-score { display:flex; align-items:center; justify-content:center; gap:12px; margin:12px 0; }
.game-score .score-ring { width:60px; height:60px; border-radius:50%; border:4px solid var(--surface1); display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:700; }
.game-history-item { display:flex; align-items:center; gap:12px; padding:8px 12px; background:var(--mantle); border-radius:8px; margin-bottom:4px; font-size:13px; }
.verify-badge { display:inline-flex; align-items:center; gap:4px; padding:4px 10px; border-radius:6px; font-size:12px; font-weight:600; }
.verify-pending { background:rgba(249,226,175,.15); color:var(--yellow); }
.verify-approved { background:rgba(166,227,161,.15); color:var(--green); }
.verify-none { background:var(--surface0); color:var(--subtext0); cursor:pointer; }
.video-intro-container { position:relative; border-radius:var(--radius); overflow:hidden; background:var(--mantle); margin-bottom:12px; }
.video-intro-container video { width:100%; max-height:300px; display:block; }
.music-list { display:flex; flex-direction:column; gap:6px; }
.music-item { display:flex; align-items:center; gap:12px; padding:10px 14px; background:var(--mantle); border-radius:8px; transition:all .2s; }
.music-item:hover { background:var(--surface0); }
.music-note { font-size:18px; color:var(--mauve); }
.music-info { flex:1; }
.music-info .title { font-size:14px; font-weight:500; color:var(--text); }
.music-info .artist { font-size:12px; color:var(--overlay0); }
.music-genre-tag { font-size:10px; padding:2px 8px; background:rgba(203,166,247,.12); color:var(--mauve); border-radius:4px; }
.music-compat { display:flex; align-items:center; gap:12px; padding:14px; background:var(--mantle); border-radius:8px; margin-top:12px; }
.music-compat-score { font-size:24px; font-weight:700; }
.music-add-form { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:8px; }
.music-add-form input { font-size:13px; padding:8px 10px; }

/* Coaching tips */
.coaching-tip { background:var(--mantle); border-left:3px solid var(--sapphire); padding:12px 16px; border-radius:0 8px 8px 0; margin-bottom:8px; font-size:13px; line-height:1.5; color:var(--subtext1); }

/* Narrative */
.narrative { background:var(--mantle); border-left:3px solid var(--mauve); padding:16px; border-radius:0 8px 8px 0; margin:16px 0; font-size:14px; line-height:1.6; color:var(--subtext1); font-style:italic; }

/* Icebreakers */
.icebreaker { background:var(--mantle); padding:10px 14px; border-radius:8px; margin-bottom:6px; font-size:13px; color:var(--subtext1); cursor:pointer; transition:all .2s; border:1px solid var(--surface0); }
.icebreaker:hover { border-color:var(--sapphire); color:var(--text); }

/* Date plan */
.date-plan { background:var(--mantle); border:1px solid var(--surface0); border-radius:8px; padding:14px; margin-bottom:8px; }
.date-plan .dp-status { font-size:11px; font-weight:600; text-transform:uppercase; padding:2px 8px; border-radius:4px; }
.dp-proposed { background:rgba(249,226,175,.15); color:var(--yellow); }
.dp-accepted { background:rgba(166,227,161,.15); color:var(--green); }
.dp-declined { background:rgba(243,139,168,.15); color:var(--red); }
.dp-completed { background:rgba(203,166,247,.15); color:var(--mauve); }

/* Conflict banner */
.conflict-banner { background:rgba(243,139,168,.1); border:1px solid var(--red); border-radius:8px; padding:16px; margin-bottom:16px; }
.conflict-banner h3 { color:var(--red); font-size:15px; margin-bottom:8px; }
.conflict-banner li { color:var(--subtext0); font-size:13px; margin-left:16px; margin-bottom:4px; }

/* Admin */
.stat-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
.stat-card { background:var(--mantle); border-radius:8px; padding:16px; text-align:center; }
.stat-card .num { font-size:28px; font-weight:700; color:var(--lavender); }
.stat-card .label { font-size:12px; color:var(--overlay0); margin-top:4px; }

/* Profile list */
.profile-item { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; background:var(--base); border:1px solid var(--surface0); border-radius:8px; margin-bottom:6px; transition:all .2s; }
.profile-item:hover { border-color:var(--surface2); }
.profile-item .actions { display:flex; gap:6px; }
.btn-sm { padding:5px 12px; font-size:12px; border-radius:6px; cursor:pointer; border:none; font-weight:500; transition:all .2s; }
.btn-match { background:var(--mauve); color:var(--crust); }
.btn-match:hover { filter:brightness(1.1); }
.btn-msg { background:var(--blue); color:var(--crust); }
.btn-delete { background:var(--surface0); color:var(--red); }
.btn-delete:hover { background:rgba(243,139,168,.15); }
.btn-report { background:var(--surface0); color:var(--peach); font-size:11px; }

.loading { text-align:center; padding:40px; color:var(--overlay0); }
.spinner { width:28px; height:28px; border:3px solid var(--surface1); border-top-color:var(--mauve); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 12px; }
@keyframes spin { to { transform:rotate(360deg); } }
.empty { text-align:center; padding:48px 24px; color:var(--overlay0); }
.empty h3 { color:var(--subtext0); margin-bottom:6px; }

.toast-container { position:fixed; bottom:20px; right:20px; z-index:1000; display:flex; flex-direction:column-reverse; gap:8px; }
.toast { padding:12px 20px; background:var(--surface0); border:1px solid var(--surface1); border-radius:8px; color:var(--text); font-size:13px; box-shadow:var(--shadow); transform:translateY(80px); opacity:0; transition:all .3s; pointer-events:auto; }
.toast.show { transform:translateY(0); opacity:1; }
.toast.success { border-color:var(--green); }
.toast.error { border-color:var(--red); }
.toast.info { border-color:var(--blue); }

/* Loading skeleton */
.skeleton { background:linear-gradient(90deg, var(--surface0) 25%, var(--surface1) 50%, var(--surface0) 75%); background-size:200% 100%; animation:shimmer 1.5s infinite; border-radius:8px; }
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
.skeleton-card { height:120px; margin-bottom:16px; border-radius:var(--radius); }
.skeleton-line { height:14px; margin-bottom:10px; border-radius:4px; }
.skeleton-line.short { width:60%; }
.skeleton-avatar { width:48px; height:48px; border-radius:50%; }

/* Empty state */
.empty-state { text-align:center; padding:48px 24px; color:var(--overlay0); }
.empty-state .empty-icon { font-size:48px; margin-bottom:16px; opacity:.5; }
.empty-state .empty-title { font-size:18px; color:var(--subtext0); margin-bottom:8px; }
.empty-state .empty-desc { font-size:14px; margin-bottom:20px; line-height:1.5; }
.empty-state .btn { display:inline-block; }

.section-head { font-size:14px; color:var(--subtext1); margin:20px 0 10px; font-weight:500; }

/* Date suggest banner */
.date-banner { background:linear-gradient(135deg,rgba(203,166,247,.1),rgba(245,194,231,.1)); border:1px solid var(--mauve); border-radius:8px; padding:14px 16px; margin:12px 0; display:flex; align-items:center; justify-content:space-between; }
.date-banner .db-text { font-size:13px; color:var(--subtext1); }

/* Safety report modal */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:500; display:flex; align-items:center; justify-content:center; }
.modal { background:var(--base); border:1px solid var(--surface0); border-radius:var(--radius); padding:28px; max-width:420px; width:90%; box-shadow:var(--shadow); }
.modal h2 { color:var(--red); margin-bottom:12px; }

/* Comparison section */
.comp-section { background:var(--mantle); border-radius:8px; padding:14px; margin-bottom:12px; }
.comp-section h4 { font-size:13px; color:var(--overlay0); text-transform:uppercase; letter-spacing:.5px; margin-bottom:8px; }
.comp-row { display:flex; justify-content:space-between; font-size:13px; margin-bottom:4px; }
.comp-row .cl { color:var(--mauve); } .comp-row .cr { color:var(--pink); }

/* Photo lightbox */
.lightbox { position:fixed; inset:0; background:rgba(0,0,0,.85); z-index:500; display:flex; align-items:center; justify-content:center; cursor:pointer; }

/* Groups */

.group-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:12px; }

/* Events */
.event-card { background:var(--base); border:1px solid var(--surface0); border-radius:var(--radius); padding:16px; cursor:pointer; transition:all .25s; animation:fadeUp .4s ease forwards; opacity:0; }

.event-card .ec-loc { font-size:12px; color:var(--overlay0); margin-bottom:6px; }
.event-card .ec-meta { font-size:11px; color:var(--subtext0); }
.event-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:12px; }

/* Activity item */

/* Profile themes */

<body>
<div class="header">
    <div style="display:flex;align-items:baseline"><h1>Kindred</h1><span class="ver">v1.2.0</span></div>
    <div style="display:flex;align-items:center;gap:8px">
        <div id="notif-bell" style="display:none;position:relative;cursor:pointer" onclick="toggleNotifications()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--subtext0)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            <span id="notif-count" style="display:none;position:absolute;top:-6px;right:-6px;background:var(--red);color:var(--crust);font-size:10px;font-weight:700;padding:1px 5px;border-radius:10px"></span>
        </div>
        <div class="nav-tabs" id="nav"></div>
    </div>
</div>
<div id="notif-panel" style="display:none;position:fixed;top:52px;right:16px;width:340px;max-height:400px;overflow-y:auto;background:var(--base);border:1px solid var(--surface0);border-radius:var(--radius);box-shadow:var(--shadow);z-index:200;padding:12px"></div>
<div class="container" id="app"></div>
<div class="toast-container" id="toastContainer"></div>

<script>
const API='';
let Q=null, activeProfile=null, authToken=null, currentUser=null;

// ─── Auth helpers ───
function authHeaders(extra={}){
    const h={'Content-Type':'application/json',...extra};
    if(authToken) h['Authorization']='Bearer '+authToken;
    return h;
}
async function authFetch(url,opts={}){
    if(authToken&&!opts.headers) opts.headers=authHeaders();
    else if(authToken&&opts.headers) opts.headers={...opts.headers,'Authorization':'Bearer '+authToken};
    return fetch(url,opts);
}

// ─── WebSocket ───
let ws=null, wsReconnectTimer=null;
function connectWS(){
    if(!activeProfile||ws)return;
    const proto=location.protocol==='https:'?'wss:':'ws:';
    ws=new WebSocket(proto+'//'+location.host+'/ws/'+activeProfile);
    ws.onmessage=(e)=>{
        try{
            const msg=JSON.parse(e.data);
            if(msg.type==='message'){
                // Show toast for incoming message
                toast(msg.from_name+': '+msg.content.slice(0,60),'success');
                // If chat is open with this person, reload it
                const chatOpen=document.getElementById('msgs');
                if(chatOpen&&window._chatPartner===msg.from) openChat(activeProfile,msg.from);
                // Refresh notification count
                pollNotifications();
            } else if(msg.type==='typing'){
                const ti=document.getElementById('typing-indicator');
                if(ti&&window._chatPartner===msg.from){
                    ti.textContent='typing...';
                    clearTimeout(window._typingTimeout);
                    window._typingTimeout=setTimeout(()=>{if(ti)ti.textContent='';},3000);
                }
            }
        }catch(err){}
    };
    ws.onclose=()=>{ws=null;wsReconnectTimer=setTimeout(connectWS,5000);};
    ws.onerror=()=>{ws?.close();};
    // Heartbeat every 30s
    const wsHB=setInterval(()=>{if(ws&&ws.readyState===1)ws.send(JSON.stringify({type:'heartbeat'}));else clearInterval(wsHB);},30000);
}
function disconnectWS(){
    if(wsReconnectTimer){clearTimeout(wsReconnectTimer);wsReconnectTimer=null;}
    if(ws){ws.close();ws=null;}
}
function wsSendTyping(to){
    if(ws&&ws.readyState===1)ws.send(JSON.stringify({type:'typing',to}));
}

// ─── Form data ───
let F={name:'',age:'',gender:'',seeking:'',big_five_answers:{},attachment_answers:{},values:{},love_language:'',dealbreakers:[],open_ended:{},scenario_answers:{},tradeoffs:{},behavioral_answers:{},self_disclosure:{},communication_style:{},financial_values:{},dating_energy:'',dating_pace:'',relationship_intent:'',weight_prefs:{},invite_code:''};

// ─── Question flow state ───
let questions=[], qi=0;

const TABS_LOGGEDOUT=[
    {id:'welcome',label:'Welcome'},
];
const TABS_LOGGEDIN=[
    {id:'myprofile',label:'My Profile'},
    {id:'matches',label:'Matches'},
    {id:'messages',label:'Messages'},
    {id:'feed',label:'Feed'},
    {id:'discover',label:'Discover'},
    {id:'groups',label:'Groups'},
    {id:'events',label:'Events'},
];

// ─── Build flat question array from API response ───
function buildQuestions(Q){
    const qs=[];
    // Basics
    qs.push({id:'_name',cat:'Basics',type:'text',text:'What should we call you?',hint:'First name or nickname',field:'name',placeholder:'Enter your name'});
    qs.push({id:'_age',cat:'Basics',type:'number',text:'How old are you?',hint:'Must be 18+',field:'age',min:18,max:99});
    qs.push({id:'_gender',cat:'Basics',type:'choice',text:'I am a...',options:['Man','Woman'],field:'gender'});
    qs.push({id:'_seeking',cat:'Basics',type:'choice',text:'Looking for a...',options:['Man','Woman'],field:'seeking'});
    qs.push({id:'_invite',cat:'Basics',type:'text',text:'Do you have an invite code?',hint:'Leave blank if you don\'t have one',field:'invite_code',placeholder:'Enter invite code',optional:true});

    // Self-disclosure
    for(const sd of Q.self_disclosure){
        qs.push({id:'sd_'+sd.id,cat:'Self-Disclosure',type:'choice',text:sd.text,options:sd.options,field:'self_disclosure',key:sd.id});
    }

    // Big Five
    for(const i of Q.big_five){
        qs.push({id:'bf_'+i.id,cat:'Personality',type:'likert',text:i.text,field:'big_five_answers',key:i.id,optional:true});
    }

    // Scenarios
    for(const s of Q.scenarios){
        qs.push({id:'sc_'+s.id,cat:'Scenarios',type:'scenario',text:s.text,options:s.options,field:'scenario_answers',key:s.id});
    }

    // Behavioral
    for(const b of Q.behavioral){
        qs.push({id:'bh_'+b.id,cat:'Behavioral',type:'choice',text:b.text,options:b.options,field:'behavioral_answers',key:b.id});
    }

    // Values
    for(const v of Q.values){
        if(v.type==='scale'){
            qs.push({id:'val_'+v.id,cat:'Values',type:'likert_labeled',text:v.text,labels:v.labels,field:'values',key:v.id});
        } else {
            qs.push({id:'val_'+v.id,cat:'Values',type:'choice',text:v.text,options:v.options,field:'values',key:v.id});
        }
    }

    // Tradeoffs
    for(const t of Q.tradeoffs){
        qs.push({id:'to_'+t.id,cat:'Trade-offs',type:'tradeoff',text:t.text,option_a:t.option_a,option_b:t.option_b,field:'tradeoffs',key:t.id});
    }

    // Communication
    for(const c of Q.communication){
        qs.push({id:'comm_'+c.id,cat:'Communication',type:'choice',text:c.text,options:c.options,field:'communication_style',key:c.id});
    }

    // Financial
    for(const f of Q.financial){
        qs.push({id:'fin_'+f.id,cat:'Financial',type:'choice',text:f.text,options:f.options,field:'financial_values',key:f.id});
    }

    // Attachment
    for(const i of Q.attachment){
        qs.push({id:'at_'+i.id,cat:'Attachment',type:'likert',text:i.text,field:'attachment_answers',key:i.id,optional:true});
    }

    // Love language
    qs.push({id:'_love_lang',cat:'Heart',type:'choice',text:'What is your primary love language?',hint:'How do you most feel loved?',options:Q.love_languages,field:'love_language'});

    // Dealbreakers
    qs.push({id:'_dealbreakers',cat:'Heart',type:'multi_select',text:'What are your deal-breakers?',hint:'Select all that apply',options:Q.dealbreakers,field:'dealbreakers'});

    // Open-ended
    for(const p of Q.open_ended){
        qs.push({id:'oe_'+p.id,cat:'Open-Ended',type:'textarea',text:p.text,hint:'Take your time...',field:'open_ended',key:p.id,optional:true});
    }

    // Energy questions
    for(const e of Q.energy){
        const fieldMap={dating_energy:'dating_energy',dating_pace:'dating_pace',relationship_intent:'relationship_intent'};
        qs.push({id:'en_'+e.id,cat:'Energy & Intent',type:'choice',text:e.text,options:e.options,field:fieldMap[e.id]||e.id});
    }

    // Settings (weight sliders as a single page)
    qs.push({id:'_weights',cat:'Settings',type:'weights',text:'Customize your matching priorities',hint:'Adjust how much each dimension matters to you. Weights are normalized automatically.'});

    // Review
    qs.push({id:'_review',cat:'Review',type:'review',text:'Review your answers',hint:'Make sure everything looks right before submitting.'});

    return qs;
}

// ─── Get answer for a question ───
function getAnswer(q){
    if(q.field==='name') return F.name;
    if(q.field==='age') return F.age;
    if(q.field==='gender') return F.gender;
    if(q.field==='seeking') return F.seeking;
    if(q.field==='invite_code') return F.invite_code;
    if(q.field==='love_language') return F.love_language;
    if(q.field==='dealbreakers') return F.dealbreakers;
    if(q.field==='dating_energy') return F.dating_energy;
    if(q.field==='dating_pace') return F.dating_pace;
    if(q.field==='relationship_intent') return F.relationship_intent;
    if(q.key){
        const obj=F[q.field];
        return obj?obj[q.key]:undefined;
    }
    return undefined;
}

// ─── Set answer for a question ───
function setAnswer(q,val){
    if(q.field==='name'){F.name=val;return;}
    if(q.field==='age'){F.age=parseInt(val)||'';return;}
    if(q.field==='gender'){F.gender=val;return;}
    if(q.field==='seeking'){F.seeking=val;return;}
    if(q.field==='invite_code'){F.invite_code=val;return;}
    if(q.field==='love_language'){F.love_language=val;return;}
    if(q.field==='dating_energy'){F.dating_energy=val;return;}
    if(q.field==='dating_pace'){F.dating_pace=val;return;}
    if(q.field==='relationship_intent'){F.relationship_intent=val;return;}
    if(q.key){
        if(!F[q.field])F[q.field]={};
        F[q.field][q.key]=val;
    }
}

// ─── Init ───
async function init(){
    try{ const r=await fetch(API+'/api/questionnaire'); Q=await r.json(); }
    catch(e){ document.getElementById('app').innerHTML='<div class="empty"><h3>Cannot connect to server</h3><p>Make sure the backend is running on port 8000</p></div>'; return; }
    questions=buildQuestions(Q);
    // Restore auth session
    const savedToken=localStorage.getItem('kindred_token');
    if(savedToken){
        authToken=savedToken;
        try{
            const r=await authFetch(API+'/api/auth/me');
            if(r.ok){
                currentUser=await r.json();
                activeProfile=currentUser.profile_id;
            } else { authToken=null; localStorage.removeItem('kindred_token'); }
        }catch(e){ authToken=null; localStorage.removeItem('kindred_token'); }
    }
    renderNav();
    if(activeProfile) showView('myprofile');
    else if(authToken&&!activeProfile) showView('questionnaire');
    else showView('welcome');
    if(authToken) pollNotifications();
    if(activeProfile) connectWS();
}

// ─── Notification polling ───
let notifInterval=null;
async function pollNotifications(){
    if(!authToken)return;
    try{
        const r=await authFetch(API+'/api/notifications');
        if(r.ok){
            const d=await r.json();
            const bell=document.getElementById('notif-bell');
            const countEl=document.getElementById('notif-count');
            if(bell) bell.style.display='block';
            if(d.unread>0){ countEl.style.display='block'; countEl.textContent=d.unread; }
            else { countEl.style.display='none'; }
            window._notifData=d.notifications;
        }
    }catch(e){}
    if(!notifInterval) notifInterval=setInterval(pollNotifications,30000);
}

async function toggleNotifications(){
    const panel=document.getElementById('notif-panel');
    if(panel.style.display==='block'){ panel.style.display='none'; return; }
    // Mark all read
    await authFetch(API+'/api/notifications/read',{method:'POST'});
    document.getElementById('notif-count').style.display='none';
    const notifs=window._notifData||[];
    if(!notifs.length){ panel.innerHTML='<div style="text-align:center;color:var(--overlay0);padding:20px;font-size:13px">No notifications</div>'; }
    else {
        panel.innerHTML=notifs.slice(0,20).map(n=>`<div style="padding:10px;border-bottom:1px solid var(--surface0);cursor:pointer;opacity:${n.read?'0.6':'1'}" onclick="handleNotifClick('${n.link||''}')"><div style="font-size:13px;font-weight:${n.read?'400':'600'};color:var(--text)">${escHtml(n.title)}</div>${n.body?`<div style="font-size:12px;color:var(--overlay0);margin-top:2px">${escHtml(n.body).slice(0,80)}</div>`:''}<div style="font-size:10px;color:var(--surface2);margin-top:4px">${new Date(n.created_at).toLocaleString()}</div></div>`).join('');
    }
    panel.style.display='block';
    // Close on outside click
    setTimeout(()=>document.addEventListener('click',closeNotifPanel,{once:true}),10);
}
function closeNotifPanel(e){
    const panel=document.getElementById('notif-panel');
    if(panel&&!panel.contains(e.target)&&e.target.id!=='notif-bell') panel.style.display='none';
}
function handleNotifClick(link){
    document.getElementById('notif-panel').style.display='none';
    if(!link)return;
    // Simple routing from notification links
    if(link.startsWith('/messages/')){ const parts=link.split('/'); openChat(activeProfile,parts[2]); }
    else if(link.startsWith('/profile/')){ const pid=link.split('/')[2]; viewProfilePage(pid,activeProfile); }
}

function renderNav(){
    const loggedIn=authToken&&(activeProfile||currentUser);
    const tabs=loggedIn?(activeProfile?TABS_LOGGEDIN:[{id:'questionnaire',label:'Create Profile'}]):TABS_LOGGEDOUT;
    let navHtml=tabs.map(t=>`<button class="nav-tab" data-v="${t.id}" onclick="showView('${t.id}')">${t.label}</button>`).join('');
    if(loggedIn) navHtml+=`<button class="nav-tab" onclick="logout()" style="color:var(--red)">Log Out</button>`;
    document.getElementById('nav').innerHTML=navHtml;
    // Show/hide notification bell
    const bell=document.getElementById('notif-bell');
    if(bell) bell.style.display=loggedIn?'block':'none';
}

function showView(v){
    document.querySelectorAll('.nav-tab').forEach(t=>t.classList.toggle('active',t.dataset.v===v));
    document.getElementById('app').className='container';
    if(v==='welcome')renderWelcome();
    else if(v==='questionnaire')renderQuestion();
    else if(v==='myprofile'){document.getElementById('app').className='container wide';viewProfilePage(activeProfile,activeProfile);}
    else if(v==='matches')renderMyMatches();
    else if(v==='messages')renderInbox();
    else if(v==='feed')renderFeed();
    else if(v==='discover')renderDiscover();
    else if(v==='groups')renderGroups();
    else if(v==='events')renderEvents();
}

function loginAs(id){
    activeProfile=id;
    renderNav();
    showView('myprofile');
    if(authToken) pollNotifications();
    connectWS();
}

function logout(){
    activeProfile=null;
    authToken=null;
    currentUser=null;
    localStorage.removeItem('kindred_token');
    if(notifInterval){clearInterval(notifInterval);notifInterval=null;}
    document.getElementById('notif-panel').style.display='none';
    disconnectWS();
    renderNav();
    showView('welcome');
}

async function doLogin(){
    const email=document.getElementById('auth-email')?.value?.trim();
    const pass=document.getElementById('auth-pass')?.value;
    const errEl=document.getElementById('auth-error');
    if(!email||!pass){errEl.textContent='Email and password required';return;}
    try{
        const r=await fetch(API+'/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pass})});
        const d=await r.json();
        if(!r.ok){errEl.textContent=d.detail||'Login failed';return;}
        authToken=d.token;
        currentUser={user_id:d.user_id,profile_id:d.profile_id,display_name:d.display_name};

        if(d.profile_id){loginAs(d.profile_id);}

async function doRegister(){
    const name=document.getElementById('auth-name')?.value?.trim()||'';
    const email=document.getElementById('auth-email')?.value?.trim();
    const pass=document.getElementById('auth-pass')?.value;
    const errEl=document.getElementById('auth-error');
    if(!email||!pass){errEl.textContent='Email and password required';return;}
    if(pass.length<6){errEl.textContent='Password must be at least 6 characters';return;}
    try{
        const r=await fetch(API+'/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pass,display_name:name})});
        const d=await r.json();
        if(!r.ok){errEl.textContent=d.detail||'Registration failed';return;}
        authToken=d.token;
        currentUser={user_id:d.user_id,profile_id:null,display_name:d.display_name};

        toast('Account created! Now build your profile.','success');
        renderNav();
        showView('questionnaire');
    }catch(e){errEl.textContent='Connection error';}
}

// ─── One Question Per Screen ───
function renderQuestion(){
    const q=questions[qi];
    const total=questions.length;
    const pct=(qi/(total-1))*100;
    const app=document.getElementById('app');

    let html=`<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div class="progress-label"><span class="cat">${q.cat}</span><span class="count">${qi+1} / ${total}</span></div>
        <div class="card"><div class="q-card">`;

    if(q.type==='review') html+=renderReview();
    else if(q.type==='weights') html+=renderWeights(q);
    else html+=renderQuestionBody(q);

    html+=`</div><div class="btn-row">
        <button class="btn btn-secondary" ${qi===0?'disabled':''} onclick="prevQ()">Back</button>
        ${q.type==='review'?'<button class="btn btn-primary" onclick="submitProfile()">Submit Profile</button>':'<button class="btn btn-primary" onclick="nextQ()">Continue</button>'}
    </div></div>`;

    app.innerHTML=html;
    window.scrollTo(0,0);

    // Enter key advances on text/number/textarea
    const inp=app.querySelector('input[type="text"],input[type="number"],textarea');
    if(inp){
        inp.focus();
        inp.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();nextQ();}});
    }
}

function autoAdvance(){setTimeout(nextQ,250);}

function renderQuestionBody(q){
    let h=`<div class="q-text">${q.text}</div>`;
    if(q.hint) h+=`<div class="q-hint">${q.hint}</div>`;
    const ans=getAnswer(q);

    switch(q.type){
        case 'text':
            h+=`<input type="text" value="${ans||''}" oninput="setAnswer(questions[qi],this.value)" placeholder="${q.placeholder||''}">`;
            break;
        case 'number':
            h+=`<input type="number" value="${ans||''}" oninput="setAnswer(questions[qi],this.value)" min="${q.min||0}" max="${q.max||999}">`;
            break;
        case 'choice':
            h+=`<div class="choice-grid${q.options.length>4?' style="grid-template-columns:1fr"':''}">`;
            for(const o of q.options){
                h+=`<div class="choice-card ${ans===o?'selected':''}" onclick="setAnswer(questions[qi],'${esc(o)}');autoAdvance()">${o}</div>`;
            }
            h+=`</div>`;
            break;
        case 'likert':
            h+=`<div class="likert-opts">${[1,2,3,4,5].map(v=>`<div class="likert-opt"><input type="radio" name="lk" id="lk_${v}" ${ans===v?'checked':''} onchange="setAnswer(questions[qi],${v});autoAdvance()"><label for="lk_${v}">${['Strongly\nDisagree','Disagree','Neutral','Agree','Strongly\nAgree'][v-1]}</label></div>`).join('')}</div>`;
            break;
        case 'likert_labeled':
            h+=`<div class="likert-opts">${q.labels.map((l,i)=>`<div class="likert-opt"><input type="radio" name="lk" id="lk_${i+1}" ${ans==(i+1)?'checked':''} onchange="setAnswer(questions[qi],${i+1});autoAdvance()"><label for="lk_${i+1}">${l}</label></div>`).join('')}</div>`;
            break;
        case 'scenario':
            h+=`<div class="scenario-opts">${q.options.map((o,i)=>`<div class="scenario-opt ${ans===i?'selected':''}" onclick="setAnswer(questions[qi],${i});autoAdvance()">${o}</div>`).join('')}</div>`;
            break;
        case 'tradeoff':
            h+=`<div class="tradeoff-opts"><div class="tradeoff-card ${ans===q.option_a?'selected':''}" onclick="setAnswer(questions[qi],'${esc(q.option_a)}');autoAdvance()">${q.option_a}</div><div class="tradeoff-card ${ans===q.option_b?'selected':''}" onclick="setAnswer(questions[qi],'${esc(q.option_b)}');autoAdvance()">${q.option_b}</div></div>`;
            break;
        case 'multi_select':
            h+=`<div class="multi-grid">${q.options.map(o=>`<div class="multi-opt ${(ans||[]).includes(o)?'selected':''}" onclick="toggleMulti('${esc(o)}')">${o}</div>`).join('')}</div>`;
            break;
        case 'textarea':
            h+=`<textarea placeholder="${q.hint||''}" oninput="setAnswer(questions[qi],this.value)">${ans||''}</textarea>`;
            break;
    }
    return h;
}

function renderWeights(q){
    const w=Q.default_weights;
    const labels={personality:'Personality Match',values:'Values Alignment',communication:'Communication Style',financial:'Financial Values',attachment:'Attachment Style',tradeoffs:'Priority Alignment',semantic:'Written Expression',dealbreaker:'Dealbreaker Alignment'};
    let h=`<div class="q-text">${q.text}</div>`;
    if(q.hint) h+=`<div class="q-hint">${q.hint}</div>`;
    for(const k of Object.keys(w)){
        const v=F.weight_prefs[k]||w[k];
        h+=`<div class="weight-slider"><label>${labels[k]||k}</label><input type="range" min="0" max="100" value="${Math.round(v*100)}" oninput="F.weight_prefs['${k}']=this.value/100;this.nextElementSibling.textContent=this.value+'%'"><span class="wval">${Math.round(v*100)}%</span></div>`;
    }
    return h;
}

function renderReview(){
    let h=`<div class="q-text">Review your answers</div><div class="q-hint">Tap any category header to jump back and edit.</div>`;

    const cats={};
    for(let i=0;i<questions.length;i++){
        const q=questions[i];
        if(q.type==='review'||q.type==='weights')continue;
        if(!cats[q.cat])cats[q.cat]={items:[],startIdx:i};
        const a=getAnswer(q);
        let display='--';
        if(a!==undefined&&a!==''&&a!==null){
            if(Array.isArray(a)) display=a.length?a.join(', '):'None';
            else if(q.type==='likert') display=['SD','D','N','A','SA'][a-1]||a;
            else if(q.type==='likert_labeled'&&q.labels) display=q.labels[(a||1)-1]||a;
            else if(q.type==='scenario'&&q.options) display=q.options[a]||a;
            else display=String(a);
        }
        cats[q.cat].items.push({label:q.text.replace(/<[^>]*>/g,'').slice(0,60),value:display});
    }

    for(const [cat,data] of Object.entries(cats)){
        const answered=data.items.filter(i=>i.value!=='--').length;
        h+=`<div class="review-group"><div class="review-group-header" onclick="qi=${data.startIdx};renderQuestion()"><h3>${cat}</h3><span class="edit-link">${answered}/${data.items.length} answered - Edit</span></div>`;
        for(const item of data.items){
            h+=`<div class="review-item"><span class="rk">${item.label}</span><span class="rv">${item.value}</span></div>`;
        }
        h+=`</div>`;
    }
    return h;
}

function nextQ(){ if(qi<questions.length-1){ qi++; renderQuestion(); }}
function prevQ(){ if(qi>0){ qi--; renderQuestion(); }}
function jumpTo(idx){ qi=idx; renderQuestion(); }

function toggleMulti(val){
    const i=F.dealbreakers.indexOf(val);
    if(i>=0) F.dealbreakers.splice(i,1); else F.dealbreakers.push(val);
    renderQuestion();
}

function esc(s){ return s.replace(/'/g,"\\'"); }

function renderEmbed(url){
    // YouTube
    let m=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]+)/);
    if(m) return `<div class="ms-embed"><iframe width="100%" height="200" src="https://www.youtube.com/embed/${m[1]}" allowfullscreen></iframe></div>`;
    // Spotify track
    m=url.match(/open\.spotify\.com\/(track|album|playlist)\/([a-zA-Z0-9]+)/);
    if(m) return `<div class="ms-embed"><iframe src="https://open.spotify.com/embed/${m[1]}/${m[2]}?theme=0" width="100%" height="${m[1]==='track'?80:160}" allowfullscreen allow="encrypted-media"></iframe></div>`;
    // SoundCloud - use oEmbed
    if(url.includes('soundcloud.com')) return `<div class="ms-embed"><iframe width="100%" height="166" scrolling="no" src="https://w.soundcloud.com/player/?url=${encodeURIComponent(url)}&color=%23cba6f7&auto_play=false&hide_related=true&show_comments=false&show_user=true&show_reposts=false&show_teaser=false" allowfullscreen></iframe></div>`;
    // Bandcamp
    if(url.includes('bandcamp.com')) return `<div class="ms-embed"><a href="${url}" style="color:var(--mauve);font-size:13px" target="_blank">${url}</a></div>`;
    // Generic link
    return `<div class="ms-embed"><a href="${url}" style="color:var(--mauve);font-size:13px" target="_blank">${url}</a></div>`;
}

async function showMatchesFor(pid){
    const c=document.getElementById('mres')||document.getElementById('app');
    c.innerHTML='<div class="loading"><div class="spinner"></div>Computing compatibility...</div>';
    try{
        const r=await fetch(API+'/api/matches/'+pid);const d=await r.json();
        if(!d.matches||!d.matches.length){c.innerHTML='<div class="empty"><h3>No compatible matches found</h3><p>No profiles match the seeking criteria, or dealbreaker conflicts exist.</p></div>';return;}
        c.innerHTML=d.matches.map((m,i)=>{
            const s=m.compatibility.total;
            const sc=m.compatibility.dealbreaker_conflict?'score-fail':s>=70?'score-high':s>=45?'score-mid':'score-low';
            const photo=m.photo&&!m.photo_locked?`<img src="/uploads/${m.photo}" class="photo-thumb">`:'<div class="photo-locked">'+(m.photo_locked?'&#128274;':'?')+'</div>';
            const badges=[];
            if(m.verified) badges.push('<span class="badge-verified">V</span>');
            if(m.dating_energy) badges.push(`<span class="badge-energy">${m.dating_energy}</span>`);
            if(m.relationship_intent) badges.push(`<span class="badge-intent">${m.relationship_intent}</span>`);
            return `<div class="match-card" style="animation-delay:${i*.06}s" onclick="showDetail('${pid}','${m.profile_id}')">
                ${photo}<div class="match-score ${sc}">${m.compatibility.dealbreaker_conflict?'X':s+'%'}</div>
                <div class="match-info"><h3>${m.name}${badges.join('')}</h3><div class="meta">${m.age?m.age+' yrs':''}</div></div>
                <div class="match-tags">${Object.entries(m.compatibility.breakdown).map(([k,v])=>`<span class="match-tag">${k.slice(0,4)}: ${v}%</span>`).join('')}</div></div>`;
        }).join('');
    }catch(e){c.innerHTML='<div class="empty"><h3>Error</h3></div>';}
}

async function showDetail(a,b){
    const app=document.getElementById('app');
    app.innerHTML='<div class="loading"><div class="spinner"></div>Loading details...</div>';
    try{
        const [cr,ar,br]=await Promise.all([fetch(API+'/api/compatibility/'+a+'/'+b),fetch(API+'/api/profile/'+a),fetch(API+'/api/profile/'+b)]);
        const comp=await cr.json(),pa=await ar.json(),pb=await br.json();
        const s=comp.total,sc=comp.dealbreaker_conflict?'score-fail':s>=70?'score-high':s>=45?'score-mid':'score-low';
        const bc=(v)=>v>=70?'var(--green)':v>=45?'var(--yellow)':'var(--peach)';

        let html=`<div class="card">`;
        if(comp.dealbreaker_conflict){
            html+=`<div class="conflict-banner"><h3>Dealbreaker Conflict</h3><ul>${comp.conflicts.map(c=>`<li>${c}</li>`).join('')}</ul></div>`;
        }
        html+=`<div style="text-align:center;margin-bottom:20px"><div style="font-size:13px;color:var(--overlay0)">Compatibility</div><div style="font-size:48px;font-weight:800" class="${sc}">${comp.dealbreaker_conflict?'Incompatible':s+'%'}</div><div style="font-size:15px;color:var(--subtext1)">${pa.name} & ${pb.name}</div></div>`;

        // Photos
        if(comp.photo_a||comp.photo_b){
            html+=`<div style="display:flex;justify-content:center;gap:24px;margin-bottom:20px">`;
            if(comp.photo_a) html+=`<img src="/uploads/${comp.photo_a}" class="photo-thumb" style="width:64px;height:64px">`;
            if(comp.photo_b) html+=`<img src="/uploads/${comp.photo_b}" class="photo-thumb" style="width:64px;height:64px">`;
            html+=`</div>`;
        } else if(!comp.dealbreaker_conflict&&s<comp.photo_threshold){
            html+=`<p style="text-align:center;font-size:12px;color:var(--overlay0);margin-bottom:16px">Photos unlock at ${comp.photo_threshold}% compatibility</p>`;
        }

        // Breakdown grid
        html+=`<div class="breakdown">${Object.entries(comp.breakdown).map(([k,v])=>`<div class="bd-item"><div class="label">${k}</div><div class="bd-bar"><div class="bd-fill" style="width:${v}%;background:${bc(v)}"></div></div><div class="value" style="color:${bc(v)}">${v}%</div></div>`).join('')}</div></div>`;

        // Coaching tips
        if(comp.coaching_tips&&comp.coaching_tips.length){
            html+=`<div class="card" style="animation-delay:.08s"><h2>Relationship Coaching</h2><p class="subtitle">Tips based on your compatibility profile</p>${comp.coaching_tips.map(t=>`<div class="coaching-tip">${t}</div>`).join('')}</div>`;
        }

        // Narrative
        html+=`<div class="card" style="animation-delay:.12s"><h2>Compatibility Insight</h2><div class="narrative" id="narrative-text">${comp.narrative||'Generating AI insight...'}</div></div>`;

        // Icebreakers

        // Date suggestion / plans
        if(comp.suggest_date||comp.date_plans?.length){
            html+=`<div class="card" style="animation-delay:.28s"><h2>Date Plans</h2>`;
            if(comp.suggest_date&&(!comp.date_plans||!comp.date_plans.length)){

                        html+=`<div style="margin-top:8px;display:flex;gap:6px"><button class="btn-sm btn-match" onclick="updatePlan('${dp.id}','accepted')">Accept</button><button class="btn-sm btn-delete" onclick="updatePlan('${dp.id}','declined')">Decline</button></div>`;
                    }
                    if(dp.status==='accepted'){
                        html+=`<div style="margin-top:8px"><button class="btn-sm btn-match" onclick="updatePlan('${dp.id}','completed')">Mark Completed</button></div>`;

                }

        // Music Compatibility
        html+=`<div class="card" style="animation-delay:.32s"><h2>Music Compatibility</h2><p class="subtitle">How your music tastes align</p><div id="music-compat" data-a="${a}" data-b="${b}"><div class="loading"><div class="spinner"></div></div></div></div>`;

        if(pb.big_five)drawRadar('radar-b',pb.big_five,'rgba(245,194,231,');

// ─── Compatibility Games ───
async function loadCompatGame(a,b){
    const el=document.getElementById('compat-game');
    if(!el)return;
    try{
        const r=await fetch(API+'/api/games/'+a+'/'+b);const d=await r.json();
        const score=d.score||{total:0,matched:0,pct:0};
        let html='';
        if(score.total>0){
            const ringColor=score.pct>=70?'var(--green)':score.pct>=40?'var(--yellow)':'var(--peach)';
            html+=`<div class="game-score"><div class="score-ring" style="border-color:${ringColor};color:${ringColor}">${score.pct}%</div><div><div style="font-size:14px;font-weight:600">${score.matched}/${score.total} matched</div><div style="font-size:12px;color:var(--overlay0)">answers in common</div></div></div>`;
        }
        if(d.complete){
            html+=`<div style="text-align:center;padding:16px;color:var(--green)">All questions answered! You matched on ${score.pct}% of topics.</div>`;
            html+=`<button class="btn btn-secondary" onclick="showGameHistory('${a}','${b}')" style="display:block;margin:0 auto">View History</button>`;
        } else if(d.game){
            const g=d.game;
            const parts=g.question.split(' or ');
            const choiceA=parts[0]?.replace('?','').trim()||'Option A';
            const choiceB=parts[1]?.replace('?','').trim()||'Option B';
            // Check if user already answered
            const myAnswer=(a===g.profile_a)?g.answer_a:g.answer_b;
            if(myAnswer){
                html+=`<div class="game-question">${g.question}</div>`;
                html+=`<div style="text-align:center;color:var(--overlay0);padding:12px">You chose <strong style="color:var(--mauve)">${myAnswer}</strong>. Waiting for their answer...</div>`;
            } else {
                html+=`<div class="game-question">${g.question}</div>`;
                html+=`<div class="game-choices"><div class="game-choice" onclick="submitGameAnswer('${g.id}','${a}','${choiceA}',this)">${choiceA}</div><div class="game-choice" onclick="submitGameAnswer('${g.id}','${a}','${choiceB}',this)">${choiceB}</div></div>`;
            }
        }
        html+=`<div id="game-history"></div>`;
        el.innerHTML=html;
    }catch(e){el.innerHTML='<div style="color:var(--overlay0);text-align:center">Could not load game</div>';}
}

async function submitGameAnswer(gameId,profileId,answer,btn){
    btn.classList.add('selected');
    btn.parentElement.querySelectorAll('.game-choice').forEach(c=>{if(c!==btn)c.style.pointerEvents='none';c.style.opacity=c===btn?'1':'0.5';});
    try{
        const r=await fetch(API+'/api/games/'+gameId+'/answer/'+profileId,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({answer})});
        const d=await r.json();
        if(d.game&&d.game.answer_a&&d.game.answer_b){
            // Both answered - show result
            const matched=d.game.matched;
            btn.parentElement.querySelectorAll('.game-choice').forEach(c=>{
                c.style.opacity='1';c.style.pointerEvents='none';
                if(c.textContent===answer) c.className='game-choice '+(matched?'matched':'mismatched');
            });
            toast(matched?'You both chose the same!':'Different choices - variety is fun!',matched?'success':'');
            // Reload after a moment
            const el=document.getElementById('compat-game');
            const a=el?.dataset?.a;const b=el?.dataset?.b;
            if(a&&b) setTimeout(()=>loadCompatGame(a,b),2000);
        } else {
            toast('Answer submitted! Waiting for their turn...','success');
        }
    }catch(e){toast('Error submitting answer','error');}
}

async function showGameHistory(a,b){
    const el=document.getElementById('game-history');

    const r=await fetch(API+'/api/games/'+a+'/'+b+'/history');const d=await r.json();

}

// ─── Radar Chart ───
function drawRadar(canvasId,bf,colorBase){
    const c=document.getElementById(canvasId);if(!c)return;
    const ctx=c.getContext('2d'),cx=100,cy=100,r=75;
    const traits=Object.keys(bf),vals=Object.values(bf),n=traits.length;
    if(!n)return;
    ctx.clearRect(0,0,200,200);
    for(let ring=0.25;ring<=1;ring+=0.25){
        ctx.beginPath();
        for(let i=0;i<=n;i++){const a=(Math.PI*2/n)*i-Math.PI/2;ctx.lineTo(cx+r*ring*Math.cos(a),cy+r*ring*Math.sin(a));}
        ctx.closePath();ctx.strokeStyle='rgba(69,71,90,0.5)';ctx.stroke();
    }
    ctx.font='10px system-ui';ctx.fillStyle='#a6adc8';ctx.textAlign='center';
    for(let i=0;i<n;i++){const a=(Math.PI*2/n)*i-Math.PI/2;const lx=cx+(r+14)*Math.cos(a),ly=cy+(r+14)*Math.sin(a);ctx.fillText(traits[i].slice(0,4),lx,ly+3);}
    ctx.beginPath();
    for(let i=0;i<=n;i++){const idx=i%n;const a=(Math.PI*2/n)*idx-Math.PI/2;const v=vals[idx];ctx.lineTo(cx+r*v*Math.cos(a),cy+r*v*Math.sin(a));}
    ctx.closePath();ctx.fillStyle=colorBase+'0.2)';ctx.fill();ctx.strokeStyle=colorBase+'0.8)';ctx.lineWidth=2;ctx.stroke();
    for(let i=0;i<n;i++){const a=(Math.PI*2/n)*i-Math.PI/2;const v=vals[i];ctx.beginPath();ctx.arc(cx+r*v*Math.cos(a),cy+r*v*Math.sin(a),3,0,Math.PI*2);ctx.fillStyle=colorBase+'1)';ctx.fill();}
}

async function generateAINarrative(pa,pb,comp){
    const el=document.getElementById('narrative-text');
    if(!el||comp.dealbreaker_conflict)return;
    try{
        const prompt=`You are a relationship compatibility analyst. Based on the compatibility data below, write a warm, insightful 3-4 sentence narrative explaining why these two people are (or aren't) a good match. Be specific about their strengths and potential friction points. Do not use emojis. Do not use markdown formatting.

Profile A: ${pa.name}, age ${pa.age}
- Personality: ${JSON.stringify(pa.big_five||{})}
- Love Language: ${pa.love_language||'unknown'}
- Values: ${JSON.stringify(pa.values||{})}
- Communication: ${JSON.stringify(pa.communication_style||{})}

Profile B: ${pb.name}, age ${pb.age}
- Personality: ${JSON.stringify(pb.big_five||{})}
- Love Language: ${pb.love_language||'unknown'}
- Values: ${JSON.stringify(pb.values||{})}

async function renderInbox(){

    const [cr,olr]=await Promise.all([authFetch(API+'/api/messages/'+activeProfile),authFetch(API+'/api/ws-online')]);
    const cd=await cr.json();const onlineData=await olr.json();const onlineSet=new Set(onlineData.online||[]);
    const inbox=document.getElementById('inbox');
    if(!cd.conversations.length){showEmpty(inbox,'&#128172;','No messages yet','Match with someone and start a conversation!','Find Matches',"showView('matches')");return;}
    inbox.innerHTML=cd.conversations.map(c=>{

        const dot=onlineSet.has(c.partner_id)?'<span class="online-dot"></span>':'<span class="offline-dot"></span>';

async function openChat(meId,themId){
    window._chatPartner=themId;
    const app=document.getElementById('app');
    const [pr,md,olr]=await Promise.all([authFetch(API+'/api/profile/'+themId).then(r=>r.json()),authFetch(API+'/api/messages/'+meId+'/'+themId).then(r=>r.json()),authFetch(API+'/api/ws-online').then(r=>r.json())]);
    const isOnline=(olr.online||[]).includes(themId);
    let html=`<div class="card"><div style="display:flex;align-items:center;gap:12px;margin-bottom:16px"><button class="btn btn-secondary" onclick="renderInbox()" style="padding:6px 12px">Back</button>${isOnline?'<span class="online-dot"></span>':'<span class="offline-dot"></span>'}<h2 style="margin:0">${pr.name}</h2>`;
    if(md.your_turn) html+='<span class="badge-turn">Your Turn</span>';
    html+=`<button class="btn btn-secondary" style="margin-left:auto;padding:4px 10px;font-size:11px;color:var(--red)" onclick="blockUser('${meId}','${themId}')">Block</button>`;
    html+=`</div>`;

    // Date suggestion banner
    if(md.suggest_date){
        html+=`<div class="date-banner"><span class="db-text">You've been chatting a while! Ready to meet up?</span><button class="btn-sm btn-match" onclick="showDetail('${meId}','${themId}')">View Match</button></div>`;
    }

    // Load more button
    if(md.has_more){
        html+=`<div style="text-align:center;margin-bottom:8px"><button class="btn btn-secondary" style="padding:4px 16px;font-size:12px" onclick="loadMoreMessages('${meId}','${themId}','${md.messages.length?md.messages[0].id:''}')">Load older messages</button></div>`;
    }

    html+=`<div class="msg-list" id="msgs">${md.messages.map(m=>{
        let content=m.photo?`<img src="/uploads/${m.photo}" style="max-width:200px;border-radius:8px;cursor:pointer" onclick="openLightbox('/uploads/${m.photo}')">`:escHtml(m.content);
        let readTag=m.from_id===meId?(m.read_at?`<span style="color:var(--blue);font-size:10px"> Read</span>`:(m.read?`<span style="color:var(--overlay0);font-size:10px"> Delivered</span>`:``)):'';
        return `<div class="msg-bubble ${m.from_id===meId?'msg-mine':'msg-theirs'}">${content}<div class="msg-time">${new Date(m.created_at).toLocaleTimeString()}${readTag}</div></div>`;
    }).join('')}</div>
    <div><span id="typing-indicator" style="color:var(--overlay0);font-size:0.85em;min-height:1.2em;display:block"></span></div>
    <div class="msg-input-row"><input type="text" id="msg-in" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendMsg('${meId}','${themId}');else wsSendTyping('${themId}')" style="flex:1"><label style="cursor:pointer;padding:8px 12px;background:var(--surface0);border-radius:8px;color:var(--overlay0);font-size:18px" title="Send photo">&#128247;<input type="file" accept="image/*" style="display:none" onchange="sendPhotoMsg('${meId}','${themId}',this.files[0])"></label><button class="btn btn-primary" onclick="sendMsg('${meId}','${themId}')">Send</button></div></div>`;

    app.innerHTML=html;
    const ml=document.getElementById('msgs');ml.scrollTop=ml.scrollHeight;
    logEvent(meId,'message_view',themId);
}

function escHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

async function sendMsg(from,to){
    const inp=document.getElementById('msg-in');const txt=inp.value.trim();if(!txt)return;
    inp.value='';
    // Optimistic UI - show message immediately
    const ml=document.getElementById('msgs');
    if(ml){
        const bubble=document.createElement('div');bubble.className='msg-bubble msg-mine';bubble.style.opacity='0.6';
        bubble.innerHTML=escHtml(txt)+`<div class="msg-time">Sending...</div>`;
        ml.appendChild(bubble);ml.scrollTop=ml.scrollHeight;
    }
    const r=await authFetch(API+'/api/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({from_id:from,to_id:to,content:txt})});
    if(!r.ok){const d=await r.json();toast(d.detail||'Failed to send','error');return;}
    openChat(from,to);
}

async function sendPhotoMsg(from,to,file){
    if(!file)return;
    const fd=new FormData();fd.append('file',file);
    const r=await authFetch(API+'/api/messages/photo?from_id='+from+'&to_id='+to,{method:'POST',body:fd});
    if(!r.ok){const d=await r.json();toast(d.detail||'Failed to send photo','error');return;}
    toast('Photo sent!','success');
    openChat(from,to);
}

async function loadMoreMessages(meId,themId,beforeId){
    const r=await authFetch(API+'/api/messages/'+meId+'/'+themId+'?limit=50&before='+beforeId);

    try{
        const r=await fetch(API+'/api/feed/status?profile_id='+activeProfile);const d=await r.json();
        if(!d.feed.length){showEmpty(el,'&#128227;','No updates yet','Post a status or add friends to see their updates!','Explore Profiles',"showView('discover')");return;}
        let html='';
        for(const s of d.feed){
            const likeR=await fetch(API+'/api/likes/status/'+s.id+'?viewer='+activeProfile);
            const likeD=await likeR.json();
            html+=`<div class="status-card" style="animation-delay:${d.feed.indexOf(s)*.04}s">
                <div class="status-header">
                    ${s.photo?`<img src="/uploads/${s.photo}">`:'<div style="width:36px;height:36px;border-radius:50%;background:var(--surface0);display:flex;align-items:center;justify-content:center;color:var(--overlay0)">?</div>'}

                <div class="status-actions">

                    ${s.profile_id===activeProfile?`<span onclick="deleteStatus('${s.id}')">Delete</span>`:''}

    }catch(e){el.innerHTML='<div class="empty"><h3>Error loading feed</h3></div>';}

function timeAgo(ts){
    const d=new Date(ts),now=new Date(),diff=Math.floor((now-d)/1000);
    if(diff<60)return 'just now';
    if(diff<3600)return Math.floor(diff/60)+'m ago';
    if(diff<86400)return Math.floor(diff/3600)+'h ago';
    return Math.floor(diff/86400)+'d ago';
}

async function doSearch(){

    const params=new URLSearchParams();
    const q=document.getElementById('s-query')?.value?.trim();if(q)params.set('query',q);
    const g=document.getElementById('s-gender')?.value;if(g)params.set('gender',g);
    const sk=document.getElementById('s-seeking')?.value;if(sk)params.set('seeking',sk);
    const amin=document.getElementById('s-age-min')?.value;if(amin)params.set('age_min',amin);
    const amax=document.getElementById('s-age-max')?.value;if(amax)params.set('age_max',amax);
    const loc=document.getElementById('s-location')?.value?.trim();if(loc)params.set('location',loc);
    try{
        const r=await fetch(API+'/api/search?'+params.toString());const d=await r.json();
        if(!d.results.length){el.innerHTML='<div class="empty" style="padding:24px"><h3>No results found</h3><p>Try broadening your search criteria</p></div>';return;}
