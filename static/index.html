<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kindred v1.7.0 - Find Your Match</title>
<meta name="description" content="Kindred - Compatibility-first dating platform. Answer detailed questionnaires, get matched on 8 dimensions of compatibility.">
<meta property="og:title" content="Kindred - Find Your Match">
<meta property="og:description" content="Dating built around genuine compatibility, not swiping on photos. Open source and privacy-first.">
<meta property="og:type" content="website">
<meta property="og:image" content="/static/logo.svg">
<meta name="theme-color" content="#1e1e2e">
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<link rel="manifest" href="/static/manifest.json">
<script src="https://js.puter.com/v2/"></script>
<style>
:root {
    --base: #1e1e2e; --mantle: #181825; --crust: #11111b;
    --surface0: #313244; --surface1: #45475a; --surface2: #585b70;
    --overlay0: #6c7086; --overlay1: #7f849c;
    --text: #cdd6f4; --subtext0: #a6adc8; --subtext1: #bac2de;
    --lavender: #b4befe; --blue: #89b4fa; --sapphire: #74c7ec;
    --green: #a6e3a1; --peach: #fab387; --red: #f38ba8;
    --mauve: #cba6f7; --pink: #f5c2e7; --yellow: #f9e2af;
    --rosewater: #f5e0dc; --flamingo: #f2cdcd; --teal: #94e2d5;
    --radius: 12px; --shadow: 0 8px 32px rgba(0,0,0,0.4);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',system-ui,-apple-system,sans-serif; background:var(--crust); color:var(--text); min-height:100vh; }
::-webkit-scrollbar { width:8px; }
::-webkit-scrollbar-track { background:var(--mantle); }
::-webkit-scrollbar-thumb { background:var(--surface2); border-radius:4px; }

.header { background:var(--mantle); border-bottom:1px solid var(--surface0); padding:12px 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
.header h1 { font-size:22px; font-weight:700; background:linear-gradient(135deg,var(--mauve),var(--pink),var(--flamingo)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.header .ver { color:var(--overlay0); font-size:11px; margin-left:8px; }
.nav-tabs { display:flex; gap:4px; flex-wrap:wrap; }
.nav-tab { background:var(--surface0); border:1px solid var(--surface1); color:var(--subtext0); padding:7px 14px; border-radius:var(--radius); cursor:pointer; font-size:13px; transition:all .2s; position:relative; }
.nav-tab:hover { background:var(--surface1); color:var(--text); }
.nav-tab.active { background:var(--mauve); color:var(--crust); border-color:var(--mauve); font-weight:600; }
.nav-tab .badge { position:absolute; top:-4px; right:-4px; background:var(--red); color:var(--crust); font-size:10px; font-weight:700; padding:2px 5px; border-radius:10px; }

.container { max-width:760px; margin:0 auto; padding:24px 16px; }
.container.wide { max-width:960px; }
.card { background:var(--base); border:1px solid var(--surface0); border-radius:var(--radius); padding:28px; margin-bottom:20px; box-shadow:var(--shadow); animation:fadeUp .4s ease forwards; opacity:0; transform:translateY(16px); }
@keyframes fadeUp { to { opacity:1; transform:translateY(0); } }
.card h2 { font-size:18px; margin-bottom:6px; color:var(--lavender); }
.card .subtitle { color:var(--overlay0); font-size:13px; margin-bottom:20px; }

.progress-bar { width:100%; height:4px; background:var(--surface0); border-radius:2px; margin-bottom:8px; }
.progress-fill { height:100%; background:linear-gradient(90deg,var(--mauve),var(--pink)); border-radius:2px; transition:width .5s ease; }
.progress-label { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
.progress-label .cat { font-size:12px; color:var(--mauve); font-weight:600; text-transform:uppercase; letter-spacing:.5px; }
.progress-label .count { font-size:12px; color:var(--overlay0); }

.form-group { margin-bottom:16px; }
.form-group label { display:block; font-size:13px; font-weight:500; color:var(--subtext1); margin-bottom:6px; }
input[type="text"],input[type="number"],select { width:100%; padding:10px 14px; background:var(--mantle); border:1px solid var(--surface1); border-radius:8px; color:var(--text); font-size:14px; outline:none; transition:border-color .2s; }
input:focus,select:focus,textarea:focus { border-color:var(--mauve); }
select option { background:var(--mantle); color:var(--text); }

/* Question card - one per screen */
.q-card { min-height:200px; display:flex; flex-direction:column; }
.q-text { font-size:18px; color:var(--text); margin-bottom:20px; line-height:1.5; font-weight:500; }
.q-hint { font-size:13px; color:var(--overlay0); margin-bottom:16px; }

/* Likert - horizontal scale */
.likert-opts { display:flex; gap:6px; justify-content:space-between; }
.likert-opt { flex:1; text-align:center; }
.likert-opt input[type="radio"] { display:none; }
.likert-opt label { display:block; padding:12px 4px; border-radius:8px; cursor:pointer; font-size:12px; color:var(--subtext0); background:var(--surface0); border:2px solid transparent; transition:all .2s; }
.likert-opt label:hover { background:var(--surface1); }
.likert-opt input:checked+label { background:var(--mauve); color:var(--crust); font-weight:600; border-color:var(--lavender); transform:scale(1.05); }

/* Choice cards */
.choice-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.choice-card { padding:14px 16px; background:var(--surface0); border:2px solid transparent; border-radius:10px; cursor:pointer; font-size:14px; color:var(--subtext0); text-align:center; transition:all .2s; }
.choice-card:hover { background:var(--surface1); color:var(--text); }
.choice-card.selected { background:rgba(203,166,247,.15); border-color:var(--mauve); color:var(--mauve); font-weight:500; }

/* Multi-select */
.multi-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.multi-opt { padding:12px 14px; background:var(--surface0); border:2px solid transparent; border-radius:10px; cursor:pointer; font-size:13px; color:var(--subtext0); transition:all .2s; }
.multi-opt:hover { background:var(--surface1); }
.multi-opt.selected { background:rgba(243,139,168,.12); border-color:var(--red); color:var(--red); font-weight:500; }

textarea { width:100%; min-height:120px; padding:14px; background:var(--mantle); border:1px solid var(--surface1); border-radius:8px; color:var(--text); font-size:14px; font-family:inherit; resize:vertical; outline:none; line-height:1.5; }
textarea::placeholder { color:var(--surface2); }

/* Tradeoff cards - side by side */
.tradeoff-opts { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.tradeoff-card { padding:20px 16px; background:var(--surface0); border:2px solid transparent; border-radius:10px; cursor:pointer; font-size:14px; color:var(--subtext0); text-align:center; transition:all .2s; line-height:1.4; display:flex; align-items:center; justify-content:center; min-height:80px; }
.tradeoff-card:hover { background:var(--surface1); }
.tradeoff-card.selected { background:rgba(203,166,247,.15); border-color:var(--mauve); color:var(--mauve); }

/* Scenario options - stacked */
.scenario-opts { display:grid; gap:8px; }
.scenario-opt { padding:14px 16px; background:var(--surface0); border:2px solid transparent; border-radius:10px; cursor:pointer; font-size:14px; color:var(--subtext0); transition:all .2s; line-height:1.4; }
.scenario-opt:hover { background:var(--surface1); }
.scenario-opt.selected { background:rgba(203,166,247,.15); border-color:var(--mauve); color:var(--mauve); }

/* Navigation buttons */
.btn-row { display:flex; justify-content:space-between; gap:10px; margin-top:24px; }
.btn { padding:10px 28px; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; border:none; transition:all .2s; }
.btn:active { transform:scale(.97); }
.btn-primary { background:linear-gradient(135deg,var(--mauve),var(--pink)); color:var(--crust); }
.btn-primary:hover { filter:brightness(1.1); }
.btn-secondary { background:var(--surface0); color:var(--subtext1); border:1px solid var(--surface1); }
.btn-secondary:hover { background:var(--surface1); }
.btn:disabled { opacity:.4; cursor:not-allowed; }
.btn-danger { background:rgba(243,139,168,.15); color:var(--red); border:1px solid var(--red); }
.btn-danger:hover { background:rgba(243,139,168,.25); }

/* Weight sliders */
.weight-slider { display:flex; align-items:center; gap:12px; margin-bottom:14px; }
.weight-slider label { min-width:110px; font-size:13px; color:var(--subtext0); }
.weight-slider input[type="range"] { flex:1; accent-color:var(--mauve); }
.weight-slider .wval { min-width:40px; text-align:right; font-size:13px; color:var(--text); font-weight:500; }

/* Review screen */
.review-group { margin-bottom:16px; }
.review-group-header { display:flex; justify-content:space-between; align-items:center; padding:10px 14px; background:var(--mantle); border-radius:8px; margin-bottom:6px; cursor:pointer; }
.review-group-header h3 { font-size:14px; color:var(--lavender); }
.review-group-header .edit-link { font-size:12px; color:var(--mauve); }
.review-item { display:flex; justify-content:space-between; padding:8px 14px; font-size:13px; border-bottom:1px solid var(--surface0); }
.review-item .rk { color:var(--overlay0); }
.review-item .rv { color:var(--text); font-weight:500; text-align:right; max-width:60%; }

/* Match cards */
.match-card { background:var(--base); border:1px solid var(--surface0); border-radius:var(--radius); padding:16px 20px; margin-bottom:10px; display:flex; align-items:center; gap:16px; cursor:pointer; transition:all .25s; animation:fadeUp .4s ease forwards; opacity:0; }
.match-card:hover { border-color:var(--mauve); transform:translateY(-2px); box-shadow:0 4px 20px rgba(203,166,247,.1); }
.match-score { font-size:26px; font-weight:700; min-width:70px; text-align:center; }
.score-high { color:var(--green); } .score-mid { color:var(--yellow); } .score-low { color:var(--peach); } .score-fail { color:var(--red); }
.match-info h3 { font-size:15px; margin-bottom:2px; }
.match-info .meta { color:var(--overlay0); font-size:12px; }
.match-tags { margin-left:auto; display:flex; gap:4px; flex-wrap:wrap; }
.match-tag { background:var(--surface0); padding:3px 8px; border-radius:12px; font-size:11px; color:var(--subtext0); }

/* Badges */
.badge-verified { display:inline-block; background:var(--green); color:var(--crust); font-size:10px; font-weight:700; padding:2px 6px; border-radius:4px; margin-left:6px; vertical-align:middle; }
.badge-energy { display:inline-block; background:var(--surface0); color:var(--subtext0); font-size:10px; padding:2px 6px; border-radius:4px; margin-left:4px; }
.badge-intent { display:inline-block; background:rgba(203,166,247,.15); color:var(--mauve); font-size:10px; padding:2px 6px; border-radius:4px; margin-left:4px; }
.badge-turn { display:inline-block; background:var(--peach); color:var(--crust); font-size:10px; font-weight:700; padding:2px 6px; border-radius:4px; margin-left:6px; }

/* Photo */
.photo-thumb { width:48px; height:48px; border-radius:50%; object-fit:cover; border:2px solid var(--surface1); }
.photo-locked { width:48px; height:48px; border-radius:50%; background:var(--surface0); display:flex; align-items:center; justify-content:center; font-size:18px; color:var(--overlay0); border:2px solid var(--surface1); }

/* Breakdown */
.breakdown { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:16px; }
.bd-item { background:var(--mantle); border-radius:8px; padding:14px; }
.bd-item .label { font-size:11px; color:var(--overlay0); text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px; }
.bd-bar { width:100%; height:5px; background:var(--surface0); border-radius:3px; margin-bottom:4px; }
.bd-fill { height:100%; border-radius:3px; transition:width .8s ease; }
.bd-item .value { font-size:18px; font-weight:700; }

/* Radar chart */
.radar-container { display:flex; justify-content:center; margin:16px 0; }

/* Messages */
.msg-list { max-height:400px; overflow-y:auto; padding:8px 0; }
.msg-bubble { max-width:75%; padding:10px 14px; border-radius:12px; margin-bottom:6px; font-size:14px; line-height:1.4; }
.msg-mine { background:var(--mauve); color:var(--crust); margin-left:auto; border-bottom-right-radius:4px; }
.msg-theirs { background:var(--surface0); color:var(--text); border-bottom-left-radius:4px; }
.msg-time { font-size:10px; color:var(--overlay0); margin-top:2px; }
.msg-input-row { display:flex; gap:8px; margin-top:12px; }
.msg-input-row input { flex:1; }

/* Convo list */
.convo-item { display:flex; align-items:center; gap:12px; padding:12px 16px; background:var(--base); border:1px solid var(--surface0); border-radius:8px; margin-bottom:6px; cursor:pointer; transition:all .2s; }
.convo-item:hover { border-color:var(--surface2); }
.convo-unread { background:var(--red); color:var(--crust); font-size:11px; font-weight:700; padding:2px 7px; border-radius:10px; margin-left:auto; }
.online-dot { width:8px; height:8px; border-radius:50%; background:var(--green); display:inline-block; flex-shrink:0; box-shadow:0 0 6px var(--green); }
.offline-dot { width:8px; height:8px; border-radius:50%; background:var(--surface2); display:inline-block; flex-shrink:0; }
.profile-completeness { height:4px; background:var(--surface0); border-radius:2px; overflow:hidden; margin-top:8px; }
.profile-completeness-fill { height:100%; background:linear-gradient(90deg,var(--red),var(--peach),var(--green)); border-radius:2px; transition:width .5s ease; }
.game-question { font-size:18px; font-weight:600; text-align:center; color:var(--text); margin:16px 0; }
.game-choices { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:16px 0; }
.game-choice { padding:20px; background:var(--surface0); border:2px solid transparent; border-radius:var(--radius); cursor:pointer; text-align:center; font-size:15px; font-weight:500; color:var(--subtext1); transition:all .2s; }
.game-choice:hover { background:var(--surface1); color:var(--text); transform:translateY(-2px); }
.game-choice.selected { border-color:var(--mauve); background:rgba(203,166,247,.12); color:var(--mauve); }
.game-choice.matched { border-color:var(--green); background:rgba(166,227,161,.12); color:var(--green); }
.game-choice.mismatched { border-color:var(--peach); background:rgba(250,179,135,.12); color:var(--peach); }
.game-score { display:flex; align-items:center; justify-content:center; gap:12px; margin:12px 0; }
.game-score .score-ring { width:60px; height:60px; border-radius:50%; border:4px solid var(--surface1); display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:700; }
.game-history-item { display:flex; align-items:center; gap:12px; padding:8px 12px; background:var(--mantle); border-radius:8px; margin-bottom:4px; font-size:13px; }
.verify-badge { display:inline-flex; align-items:center; gap:4px; padding:4px 10px; border-radius:6px; font-size:12px; font-weight:600; }
.verify-pending { background:rgba(249,226,175,.15); color:var(--yellow); }
.verify-approved { background:rgba(166,227,161,.15); color:var(--green); }
.verify-none { background:var(--surface0); color:var(--subtext0); cursor:pointer; }
.video-intro-container { position:relative; border-radius:var(--radius); overflow:hidden; background:var(--mantle); margin-bottom:12px; }
.video-intro-container video { width:100%; max-height:300px; display:block; }
.music-list { display:flex; flex-direction:column; gap:6px; }
.music-item { display:flex; align-items:center; gap:12px; padding:10px 14px; background:var(--mantle); border-radius:8px; transition:all .2s; }
.music-item:hover { background:var(--surface0); }
.music-note { font-size:18px; color:var(--mauve); }
.music-info { flex:1; }
.music-info .title { font-size:14px; font-weight:500; color:var(--text); }
.music-info .artist { font-size:12px; color:var(--overlay0); }
.music-genre-tag { font-size:10px; padding:2px 8px; background:rgba(203,166,247,.12); color:var(--mauve); border-radius:4px; }
.music-compat { display:flex; align-items:center; gap:12px; padding:14px; background:var(--mantle); border-radius:8px; margin-top:12px; }
.music-compat-score { font-size:24px; font-weight:700; }
.music-add-form { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:8px; }
.music-add-form input { font-size:13px; padding:8px 10px; }

/* Coaching tips */
.coaching-tip { background:var(--mantle); border-left:3px solid var(--sapphire); padding:12px 16px; border-radius:0 8px 8px 0; margin-bottom:8px; font-size:13px; line-height:1.5; color:var(--subtext1); }

/* Narrative */
.narrative { background:var(--mantle); border-left:3px solid var(--mauve); padding:16px; border-radius:0 8px 8px 0; margin:16px 0; font-size:14px; line-height:1.6; color:var(--subtext1); font-style:italic; }

/* Icebreakers */
.icebreaker { background:var(--mantle); padding:10px 14px; border-radius:8px; margin-bottom:6px; font-size:13px; color:var(--subtext1); cursor:pointer; transition:all .2s; border:1px solid var(--surface0); }
.icebreaker:hover { border-color:var(--sapphire); color:var(--text); }

/* Date plan */
.date-plan { background:var(--mantle); border:1px solid var(--surface0); border-radius:8px; padding:14px; margin-bottom:8px; }
.date-plan .dp-status { font-size:11px; font-weight:600; text-transform:uppercase; padding:2px 8px; border-radius:4px; }
.dp-proposed { background:rgba(249,226,175,.15); color:var(--yellow); }
.dp-accepted { background:rgba(166,227,161,.15); color:var(--green); }
.dp-declined { background:rgba(243,139,168,.15); color:var(--red); }
.dp-completed { background:rgba(203,166,247,.15); color:var(--mauve); }

/* Conflict banner */
.conflict-banner { background:rgba(243,139,168,.1); border:1px solid var(--red); border-radius:8px; padding:16px; margin-bottom:16px; }
.conflict-banner h3 { color:var(--red); font-size:15px; margin-bottom:8px; }
.conflict-banner li { color:var(--subtext0); font-size:13px; margin-left:16px; margin-bottom:4px; }

/* Admin */
.stat-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
.stat-card { background:var(--mantle); border-radius:8px; padding:16px; text-align:center; }
.stat-card .num { font-size:28px; font-weight:700; color:var(--lavender); }
.stat-card .label { font-size:12px; color:var(--overlay0); margin-top:4px; }

/* Profile list */
.profile-item { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; background:var(--base); border:1px solid var(--surface0); border-radius:8px; margin-bottom:6px; transition:all .2s; }
.profile-item:hover { border-color:var(--surface2); }
.profile-item .actions { display:flex; gap:6px; }
.btn-sm { padding:5px 12px; font-size:12px; border-radius:6px; cursor:pointer; border:none; font-weight:500; transition:all .2s; }
.btn-match { background:var(--mauve); color:var(--crust); }
.btn-match:hover { filter:brightness(1.1); }
.btn-msg { background:var(--blue); color:var(--crust); }
.btn-delete { background:var(--surface0); color:var(--red); }
.btn-delete:hover { background:rgba(243,139,168,.15); }
.btn-report { background:var(--surface0); color:var(--peach); font-size:11px; }

.loading { text-align:center; padding:40px; color:var(--overlay0); }
.spinner { width:28px; height:28px; border:3px solid var(--surface1); border-top-color:var(--mauve); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 12px; }
@keyframes spin { to { transform:rotate(360deg); } }
.empty { text-align:center; padding:48px 24px; color:var(--overlay0); }
.empty h3 { color:var(--subtext0); margin-bottom:6px; }

.toast-container { position:fixed; bottom:20px; right:20px; z-index:1000; display:flex; flex-direction:column-reverse; gap:8px; }
.toast { padding:12px 20px; background:var(--surface0); border:1px solid var(--surface1); border-radius:8px; color:var(--text); font-size:13px; box-shadow:var(--shadow); transform:translateY(80px); opacity:0; transition:all .3s; pointer-events:auto; }
.toast.show { transform:translateY(0); opacity:1; }
.toast.success { border-color:var(--green); }
.toast.error { border-color:var(--red); }
.toast.info { border-color:var(--blue); }

/* Loading skeleton */
.skeleton { background:linear-gradient(90deg, var(--surface0) 25%, var(--surface1) 50%, var(--surface0) 75%); background-size:200% 100%; animation:shimmer 1.5s infinite; border-radius:8px; }
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
.skeleton-card { height:120px; margin-bottom:16px; border-radius:var(--radius); }
.skeleton-line { height:14px; margin-bottom:10px; border-radius:4px; }
.skeleton-line.short { width:60%; }
.skeleton-avatar { width:48px; height:48px; border-radius:50%; }

/* Empty state */
.empty-state { text-align:center; padding:48px 24px; color:var(--overlay0); }
.empty-state .empty-icon { font-size:48px; margin-bottom:16px; opacity:.5; }
.empty-state .empty-title { font-size:18px; color:var(--subtext0); margin-bottom:8px; }
.empty-state .empty-desc { font-size:14px; margin-bottom:20px; line-height:1.5; }
.empty-state .btn { display:inline-block; }

.section-head { font-size:14px; color:var(--subtext1); margin:20px 0 10px; font-weight:500; }

/* Date suggest banner */
.date-banner { background:linear-gradient(135deg,rgba(203,166,247,.1),rgba(245,194,231,.1)); border:1px solid var(--mauve); border-radius:8px; padding:14px 16px; margin:12px 0; display:flex; align-items:center; justify-content:space-between; }
.date-banner .db-text { font-size:13px; color:var(--subtext1); }

/* Safety report modal */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:500; display:flex; align-items:center; justify-content:center; }
.modal { background:var(--base); border:1px solid var(--surface0); border-radius:var(--radius); padding:28px; max-width:420px; width:90%; box-shadow:var(--shadow); }
.modal h2 { color:var(--red); margin-bottom:12px; }

/* Comparison section */
.comp-section { background:var(--mantle); border-radius:8px; padding:14px; margin-bottom:12px; }
.comp-section h4 { font-size:13px; color:var(--overlay0); text-transform:uppercase; letter-spacing:.5px; margin-bottom:8px; }
.comp-row { display:flex; justify-content:space-between; font-size:13px; margin-bottom:4px; }
.comp-row .cl { color:var(--mauve); } .comp-row .cr { color:var(--pink); }
.comp-row .cm { color:var(--overlay0); flex:1; text-align:center; }

/* ─── MySpace Profile Page ─── */
.ms-profile { display:grid; grid-template-columns:260px 1fr; gap:20px; }
.ms-left { display:flex; flex-direction:column; gap:16px; }
.ms-right { display:flex; flex-direction:column; gap:16px; }

.ms-photo-card { background:var(--base); border:1px solid var(--surface0); border-radius:var(--radius); padding:20px; text-align:center; box-shadow:var(--shadow); }
.ms-photo-card img { width:220px; height:220px; border-radius:8px; object-fit:cover; border:3px solid var(--mauve); }
.ms-photo-placeholder { width:220px; height:220px; border-radius:8px; background:var(--surface0); display:flex; align-items:center; justify-content:center; font-size:64px; color:var(--overlay0); margin:0 auto; border:3px solid var(--surface1); }
.ms-name { font-size:22px; font-weight:700; margin-top:12px; color:var(--text); }
.ms-name .ms-verified { display:inline-block; background:var(--green); color:var(--crust); font-size:10px; font-weight:700; padding:2px 6px; border-radius:4px; margin-left:6px; vertical-align:middle; }
.ms-headline { font-size:13px; color:var(--mauve); font-style:italic; margin-top:4px; }
.ms-mood { font-size:12px; color:var(--overlay0); margin-top:4px; }
.ms-meta { font-size:12px; color:var(--overlay0); margin-top:8px; line-height:1.8; }
.ms-meta strong { color:var(--subtext1); }

.ms-stats { display:flex; justify-content:space-around; margin-top:12px; padding-top:12px; border-top:1px solid var(--surface0); }
.ms-stat { text-align:center; }
.ms-stat .num { font-size:18px; font-weight:700; color:var(--lavender); }
.ms-stat .lbl { font-size:10px; color:var(--overlay0); text-transform:uppercase; }

.ms-actions { display:flex; flex-direction:column; gap:6px; margin-top:12px; }
.ms-actions .btn { width:100%; text-align:center; font-size:13px; padding:8px; }

.ms-section { background:var(--base); border:1px solid var(--surface0); border-radius:var(--radius); padding:20px; box-shadow:var(--shadow); }
.ms-section h2 { font-size:16px; color:var(--lavender); margin-bottom:12px; padding-bottom:8px; border-bottom:1px solid var(--surface0); }
.ms-section .content { font-size:14px; color:var(--subtext1); line-height:1.7; white-space:pre-wrap; }

/* Top Friends grid */
.ms-friends-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
.ms-friend { text-align:center; cursor:pointer; transition:transform .2s; }
.ms-friend:hover { transform:scale(1.05); }
.ms-friend img { width:52px; height:52px; border-radius:50%; object-fit:cover; border:2px solid var(--surface1); }
.ms-friend .ms-friend-placeholder { width:52px; height:52px; border-radius:50%; background:var(--surface0); display:flex; align-items:center; justify-content:center; font-size:20px; color:var(--overlay0); margin:0 auto; }
.ms-friend .name { font-size:11px; color:var(--subtext0); margin-top:4px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

/* Blog post */
.ms-blog-post { background:var(--mantle); border-radius:8px; padding:14px; margin-bottom:10px; }
.ms-blog-post .bp-title { font-size:15px; font-weight:600; color:var(--text); margin-bottom:4px; }
.ms-blog-post .bp-date { font-size:11px; color:var(--overlay0); margin-bottom:8px; }
.ms-blog-post .bp-content { font-size:13px; color:var(--subtext1); line-height:1.6; white-space:pre-wrap; }
.ms-blog-post .bp-delete { font-size:11px; color:var(--red); cursor:pointer; margin-top:6px; }
.ms-blog-post .bp-delete:hover { text-decoration:underline; }

/* Profile comments */
.ms-comment { display:flex; gap:10px; padding:12px 0; border-bottom:1px solid var(--surface0); }
.ms-comment:last-child { border-bottom:none; }
.ms-comment img { width:36px; height:36px; border-radius:50%; object-fit:cover; border:2px solid var(--surface1); flex-shrink:0; }
.ms-comment .cm-placeholder { width:36px; height:36px; border-radius:50%; background:var(--surface0); display:flex; align-items:center; justify-content:center; font-size:14px; color:var(--overlay0); flex-shrink:0; }
.ms-comment .cm-body { flex:1; }
.ms-comment .cm-author { font-size:13px; font-weight:600; color:var(--mauve); cursor:pointer; }
.ms-comment .cm-author:hover { text-decoration:underline; }
.ms-comment .cm-date { font-size:11px; color:var(--overlay0); margin-left:8px; }
.ms-comment .cm-text { font-size:13px; color:var(--subtext1); margin-top:4px; line-height:1.5; }
.ms-comment .cm-delete { font-size:11px; color:var(--red); cursor:pointer; margin-top:4px; }

/* Music/Video embeds */
.ms-embed { margin-bottom:12px; border-radius:8px; overflow:hidden; }
.ms-embed iframe { width:100%; border:none; border-radius:8px; }

/* Friend requests */
.ms-request { display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--surface0); }
.ms-request:last-child { border-bottom:none; }
.ms-request .name { font-size:13px; font-weight:500; color:var(--text); flex:1; }
.ms-request .req-actions { display:flex; gap:4px; }

/* Profile edit form */
.ms-edit-group { margin-bottom:12px; }
.ms-edit-group label { display:block; font-size:12px; color:var(--overlay0); margin-bottom:4px; font-weight:500; }
.ms-edit-group input, .ms-edit-group textarea { width:100%; }

/* Status updates */
.status-card { background:var(--base); border:1px solid var(--surface0); border-radius:var(--radius); padding:16px; margin-bottom:10px; animation:fadeUp .4s ease forwards; opacity:0; }
.status-header { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
.status-header img { width:36px; height:36px; border-radius:50%; object-fit:cover; border:2px solid var(--surface1); }
.status-header .name { font-size:14px; font-weight:600; color:var(--text); cursor:pointer; }
.status-header .name:hover { color:var(--mauve); }
.status-header .time { font-size:11px; color:var(--overlay0); margin-left:auto; }
.status-body { font-size:14px; color:var(--subtext1); line-height:1.6; margin-bottom:8px; white-space:pre-wrap; }
.status-actions { display:flex; gap:12px; font-size:12px; }
.status-actions span { cursor:pointer; color:var(--overlay0); transition:color .2s; }
.status-actions span:hover { color:var(--mauve); }
.status-actions span.liked { color:var(--red); }

/* Online indicator */
.online-dot { width:10px; height:10px; border-radius:50%; background:var(--green); display:inline-block; margin-right:4px; box-shadow:0 0 6px rgba(166,227,161,.4); }
.online-dot.offline { background:var(--surface2); box-shadow:none; }

/* Like button */
.like-btn { cursor:pointer; display:inline-flex; align-items:center; gap:4px; font-size:12px; color:var(--overlay0); transition:all .2s; padding:4px 8px; border-radius:6px; }
.like-btn:hover { color:var(--red); background:rgba(243,139,168,.1); }
.like-btn.liked { color:var(--red); }

/* Photo Gallery */
.photo-gallery { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:12px; }
.photo-gallery-item { position:relative; border-radius:8px; overflow:hidden; aspect-ratio:1; cursor:pointer; }
.photo-gallery-item img { width:100%; height:100%; object-fit:cover; transition:transform .3s; }
.photo-gallery-item:hover img { transform:scale(1.05); }
.photo-gallery-item .pg-badge { position:absolute; top:6px; left:6px; background:var(--mauve); color:var(--crust); font-size:9px; font-weight:700; padding:2px 6px; border-radius:4px; }
.photo-gallery-item .pg-delete { position:absolute; top:6px; right:6px; background:rgba(0,0,0,.6); color:var(--red); font-size:14px; width:22px; height:22px; border-radius:50%; display:none; align-items:center; justify-content:center; cursor:pointer; }
.photo-gallery-item:hover .pg-delete { display:flex; }

/* Search / Discover */
.search-bar { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
.search-bar input, .search-bar select { background:var(--mantle); border:1px solid var(--surface1); color:var(--text); padding:8px 12px; border-radius:8px; font-size:13px; outline:none; }
.search-bar input:focus, .search-bar select:focus { border-color:var(--mauve); }
.search-results { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:12px; }
.search-card { background:var(--base); border:1px solid var(--surface0); border-radius:var(--radius); padding:16px; text-align:center; cursor:pointer; transition:all .25s; animation:fadeUp .4s ease forwards; opacity:0; }
.search-card:hover { border-color:var(--mauve); transform:translateY(-2px); box-shadow:0 4px 20px rgba(203,166,247,.1); }
.search-card img { width:80px; height:80px; border-radius:50%; object-fit:cover; border:3px solid var(--surface1); margin-bottom:8px; }
.search-card .sc-placeholder { width:80px; height:80px; border-radius:50%; background:var(--surface0); display:flex; align-items:center; justify-content:center; font-size:28px; color:var(--overlay0); margin:0 auto 8px; border:3px solid var(--surface1); }
.search-card h3 { font-size:15px; margin-bottom:2px; }
.search-card .sc-meta { font-size:12px; color:var(--overlay0); margin-bottom:6px; }
.search-card .sc-headline { font-size:12px; color:var(--mauve); font-style:italic; }

/* Photo lightbox */
.lightbox { position:fixed; inset:0; background:rgba(0,0,0,.85); z-index:500; display:flex; align-items:center; justify-content:center; cursor:pointer; }
.lightbox img { max-width:90vw; max-height:90vh; border-radius:8px; box-shadow:0 0 40px rgba(0,0,0,.5); }

/* Groups */
.group-card { background:var(--base); border:1px solid var(--surface0); border-radius:var(--radius); padding:16px; cursor:pointer; transition:all .25s; animation:fadeUp .4s ease forwards; opacity:0; }
.group-card:hover { border-color:var(--mauve); transform:translateY(-2px); }
.group-card h3 { font-size:15px; color:var(--text); margin-bottom:4px; }
.group-card .gc-desc { font-size:12px; color:var(--overlay0); margin-bottom:6px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.group-card .gc-meta { font-size:11px; color:var(--subtext0); }
.group-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:12px; }

/* Events */
.event-card { background:var(--base); border:1px solid var(--surface0); border-radius:var(--radius); padding:16px; cursor:pointer; transition:all .25s; animation:fadeUp .4s ease forwards; opacity:0; }
.event-card:hover { border-color:var(--sapphire); transform:translateY(-2px); }
.event-card h3 { font-size:15px; color:var(--text); margin-bottom:4px; }
.event-card .ec-date { font-size:12px; color:var(--sapphire); font-weight:600; margin-bottom:4px; }
.event-card .ec-loc { font-size:12px; color:var(--overlay0); margin-bottom:6px; }
.event-card .ec-meta { font-size:11px; color:var(--subtext0); }
.event-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:12px; }

/* Activity item */
.activity-item { display:flex; gap:10px; padding:10px 0; border-bottom:1px solid var(--surface0); font-size:13px; align-items:center; }
.activity-item:last-child { border-bottom:none; }
.activity-item img { width:32px; height:32px; border-radius:50%; object-fit:cover; border:2px solid var(--surface1); }
.activity-item .ai-text { flex:1; color:var(--subtext1); }
.activity-item .ai-text strong { color:var(--text); }
.activity-item .ai-time { font-size:11px; color:var(--overlay0); white-space:nowrap; }

/* Profile themes */
.theme-cosmic { background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460) !important; }
.theme-forest { background:linear-gradient(135deg,#1b2d1b,#1e3a1e,#234523) !important; }
.theme-sunset { background:linear-gradient(135deg,#2d1b1b,#3a1e1e,#452323) !important; }
.theme-ocean { background:linear-gradient(135deg,#1b1b2d,#1e1e3a,#232345) !important; }
.theme-aurora { background:linear-gradient(135deg,#1a2e2e,#1e3a3a,#0f4545) !important; }

@media(max-width:768px) {
    .container{padding:12px 8px;}
    .card{padding:16px 12px;}
    .choice-grid,.multi-grid,.breakdown,.stat-grid{grid-template-columns:1fr;}
    .header{flex-wrap:wrap;gap:8px;padding:10px 12px;}
    .header h1{font-size:18px;}
    .nav-tabs{width:100%;justify-content:center;overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
    .nav-tabs::-webkit-scrollbar{display:none;}
    .nav-tab{padding:5px 10px;font-size:12px;white-space:nowrap;flex-shrink:0;}
    .tradeoff-opts{grid-template-columns:1fr;}
    .likert-opts{gap:3px;}
    .likert-opt label{padding:10px 2px;font-size:10px;}
    .ms-profile{grid-template-columns:1fr;}
    .ms-photo-card img,.ms-photo-placeholder{width:140px;height:140px;}
    .ms-friends-grid{grid-template-columns:repeat(4,1fr);}
    .msg-list{max-height:50vh;}
    .msg-bubble{max-width:85%;}
    .search-results{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));}
    .photo-gallery{grid-template-columns:repeat(2,1fr);}
    .group-grid,.event-grid{grid-template-columns:1fr;}
    .match-card{flex-wrap:wrap;gap:10px;}
    .match-tags{margin-left:0;margin-top:4px;}
    .q-text{font-size:16px;}
    .modal{width:95%;padding:20px;}
    .date-banner{flex-direction:column;gap:8px;text-align:center;}
    .music-add-form{grid-template-columns:1fr;}
    .comp-row{flex-direction:column;gap:2px;padding:6px 0;}
    .comp-row .cm{text-align:left;}
    .detail-grid{grid-template-columns:1fr;}
    .search-bar{flex-direction:column;}
    .search-bar input,.search-bar select{width:100%;}
    .btn-row{flex-direction:column;}
    .btn-row .btn{width:100%;text-align:center;}
    .convo-item{padding:10px 12px;}
    .game-choices{grid-template-columns:1fr;}
    .status-header{flex-wrap:wrap;}
    .ms-actions{flex-direction:row;flex-wrap:wrap;}
    .ms-actions .btn{width:auto;flex:1;min-width:0;}
}
@media(max-width:400px) {
    .nav-tab{padding:4px 8px;font-size:11px;}
    .ms-photo-card img,.ms-photo-placeholder{width:120px;height:120px;}
    .ms-friends-grid{grid-template-columns:repeat(3,1fr);}
    .match-score{font-size:22px;min-width:50px;}
    .card{padding:12px 10px;}
}

/* Accessibility */
.btn:focus-visible,.nav-tab:focus-visible,.choice-card:focus-visible,.tradeoff-card:focus-visible,.scenario-opt:focus-visible,.multi-opt:focus-visible,.game-choice:focus-visible,.convo-item:focus-visible,.match-card:focus-visible,.group-card:focus-visible,.event-card:focus-visible,.search-card:focus-visible{outline:2px solid var(--mauve);outline-offset:2px;}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}
*:focus:not(:focus-visible){outline:none;}

/* Top Picks horizontal scroll */
.top-picks { display:flex; gap:12px; overflow-x:auto; scroll-snap-type:x mandatory; padding:12px 0; scrollbar-width:thin; }
.top-picks::-webkit-scrollbar { height:6px; }
.top-picks::-webkit-scrollbar-thumb { background:var(--surface2); border-radius:3px; }
.top-picks .pick-card { scroll-snap-align:start; min-width:160px; max-width:180px; background:var(--mantle); border:1px solid var(--surface0); border-radius:var(--radius); padding:14px; text-align:center; cursor:pointer; transition:all .25s; flex-shrink:0; }
.top-picks .pick-card:hover { border-color:var(--mauve); transform:translateY(-2px); box-shadow:0 4px 20px rgba(203,166,247,.1); }
.top-picks .pick-card img { width:64px; height:64px; border-radius:50%; object-fit:cover; border:2px solid var(--surface1); margin-bottom:8px; }
.top-picks .pick-card .pick-placeholder { width:64px; height:64px; border-radius:50%; background:var(--surface0); display:flex; align-items:center; justify-content:center; font-size:24px; color:var(--overlay0); margin:0 auto 8px; }
.top-picks .pick-card .pick-name { font-size:14px; font-weight:600; color:var(--text); margin-bottom:2px; }
.top-picks .pick-card .pick-age { font-size:12px; color:var(--overlay0); margin-bottom:6px; }
.top-picks .pick-score { font-size:18px; font-weight:700; color:var(--green); }

/* Reaction picker & bar */
.reaction-bar { display:flex; gap:4px; font-size:14px; margin-top:4px; flex-wrap:wrap; }
.reaction-badge { display:inline-flex; align-items:center; gap:2px; background:var(--surface0); border:1px solid var(--surface1); border-radius:12px; padding:2px 6px; font-size:12px; cursor:pointer; transition:all .2s; }
.reaction-badge:hover { border-color:var(--mauve); }
.reaction-badge .r-count { font-size:10px; color:var(--subtext0); }
.reaction-trigger { opacity:0; cursor:pointer; font-size:14px; transition:opacity .2s; position:absolute; top:-8px; right:-4px; background:var(--surface0); border:1px solid var(--surface1); border-radius:10px; padding:1px 5px; }
.msg-bubble:hover .reaction-trigger { opacity:1; }
.reaction-picker { position:absolute; bottom:100%; right:0; background:var(--surface0); border:1px solid var(--surface1); border-radius:12px; padding:6px 10px; display:flex; gap:8px; box-shadow:var(--shadow); z-index:50; }
.reaction-picker span { cursor:pointer; font-size:18px; transition:transform .15s; }
.reaction-picker span:hover { transform:scale(1.3); }

/* GIF panel */
.gif-panel { background:var(--mantle); border:1px solid var(--surface0); border-radius:var(--radius); padding:12px; margin-top:8px; }
.gif-search-row { display:flex; gap:8px; margin-bottom:8px; }
.gif-search-row input { flex:1; padding:8px 12px; background:var(--base); border:1px solid var(--surface1); border-radius:8px; color:var(--text); font-size:13px; outline:none; }
.gif-search-row input:focus { border-color:var(--mauve); }
.gif-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; max-height:300px; overflow-y:auto; }
.gif-grid img { width:100%; border-radius:6px; cursor:pointer; transition:transform .15s; }
.gif-grid img:hover { transform:scale(1.03); }

/* Calendar */
.calendar-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.calendar-header h3 { font-size:16px; color:var(--text); }
.calendar-header button { background:var(--surface0); border:1px solid var(--surface1); color:var(--subtext0); padding:4px 10px; border-radius:6px; cursor:pointer; font-size:13px; }
.calendar-header button:hover { background:var(--surface1); color:var(--text); }
.calendar-day-labels { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; margin-bottom:4px; }
.calendar-day-labels span { text-align:center; font-size:11px; color:var(--overlay0); font-weight:600; text-transform:uppercase; padding:4px 0; }
.calendar-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; }
.calendar-day { aspect-ratio:1; display:flex; flex-direction:column; align-items:center; justify-content:center; background:var(--surface0); border-radius:6px; cursor:pointer; font-size:13px; color:var(--subtext0); transition:all .2s; position:relative; }
.calendar-day:hover { background:var(--surface1); color:var(--text); }
.calendar-day.has-event::after { content:''; width:6px; height:6px; border-radius:50%; background:var(--mauve); position:absolute; bottom:4px; }
.calendar-day.today { border:2px solid var(--mauve); color:var(--mauve); font-weight:700; }
.calendar-day.other-month { opacity:.3; }
.calendar-day.selected { background:var(--mauve); color:var(--crust); font-weight:600; }
.calendar-day.selected::after { background:var(--crust); }
.view-toggle { display:inline-flex; background:var(--surface0); border-radius:8px; overflow:hidden; border:1px solid var(--surface1); }
.view-toggle button { background:none; border:none; color:var(--subtext0); padding:6px 14px; font-size:12px; cursor:pointer; transition:all .2s; }
.view-toggle button.active { background:var(--mauve); color:var(--crust); font-weight:600; }

/* Onboarding */
.onboarding-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:9998; transition:opacity .3s; }
.onboarding-highlight { position:relative; z-index:9999; box-shadow:0 0 0 4px var(--mauve), 0 0 20px rgba(203,166,247,.4); border-radius:var(--radius); }
.onboarding-tooltip { position:fixed; z-index:10000; background:var(--surface0); color:var(--text); border:1px solid var(--surface1); border-radius:12px; padding:20px; max-width:320px; box-shadow:0 8px 32px rgba(0,0,0,0.5); }
.onboarding-tooltip h3 { font-size:16px; color:var(--mauve); margin-bottom:8px; }
.onboarding-tooltip p { font-size:14px; color:var(--subtext1); line-height:1.5; margin-bottom:16px; }
.onboarding-tooltip .ob-step { font-size:11px; color:var(--overlay0); margin-bottom:4px; }
.onboarding-tooltip .ob-actions { display:flex; gap:8px; justify-content:flex-end; }

/* Premium gate */
.premium-gate-wrapper { position:relative; }
.premium-gate-blur { filter:blur(8px); pointer-events:none; -webkit-user-select:none; user-select:none; }
.premium-gate-overlay { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:2; background:rgba(30,30,46,.5); border-radius:var(--radius); }
.premium-gate-overlay .gate-text { font-size:16px; font-weight:600; color:var(--mauve); margin-bottom:12px; }

/* Group chat messages */
.group-chat-messages { max-height:400px; overflow-y:auto; padding:8px 0; }
.group-tabs { display:flex; gap:4px; margin-bottom:12px; }
.group-tab { background:var(--surface0); border:1px solid var(--surface1); color:var(--subtext0); padding:6px 14px; border-radius:8px; cursor:pointer; font-size:13px; transition:all .2s; }
.group-tab:hover { background:var(--surface1); color:var(--text); }
.group-tab.active { background:var(--mauve); color:var(--crust); font-weight:600; border-color:var(--mauve); }

/* Viewers list */
.viewer-item { display:flex; align-items:center; gap:12px; padding:10px 14px; background:var(--mantle); border-radius:8px; margin-bottom:6px; cursor:pointer; transition:all .2s; }
.viewer-item:hover { background:var(--surface0); }
.viewer-item img { width:40px; height:40px; border-radius:50%; object-fit:cover; border:2px solid var(--surface1); }
.viewer-item .v-placeholder { width:40px; height:40px; border-radius:50%; background:var(--surface0); display:flex; align-items:center; justify-content:center; font-size:16px; color:var(--overlay0); }
.viewer-item .v-info { flex:1; }
.viewer-item .v-name { font-size:14px; font-weight:500; color:var(--text); }
.viewer-item .v-time { font-size:11px; color:var(--overlay0); }

/* Who Liked Me grid */
.liked-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:12px; }
.liked-card { background:var(--mantle); border:1px solid var(--surface0); border-radius:var(--radius); padding:16px; text-align:center; cursor:pointer; transition:all .25s; }
.liked-card:hover { border-color:var(--red); transform:translateY(-2px); box-shadow:0 4px 20px rgba(243,139,168,.1); }
.liked-card img { width:72px; height:72px; border-radius:50%; object-fit:cover; border:2px solid var(--surface1); margin-bottom:8px; }
.liked-card .lk-placeholder { width:72px; height:72px; border-radius:50%; background:var(--surface0); display:flex; align-items:center; justify-content:center; font-size:28px; color:var(--overlay0); margin:0 auto 8px; }
.liked-card .lk-name { font-size:14px; font-weight:600; color:var(--text); margin-bottom:2px; }
.liked-card .lk-age { font-size:12px; color:var(--overlay0); }

/* 2FA */
.twofa-section { padding:12px 0; }
.twofa-qr { text-align:center; margin:16px 0; }
.twofa-qr img { border-radius:8px; background:white; padding:8px; }
.twofa-code-input { display:flex; gap:8px; align-items:center; margin-top:12px; }
.twofa-code-input input { width:160px; text-align:center; font-size:18px; letter-spacing:4px; font-weight:700; }

/* ─── Voice Messages ─── */
.voice-record-btn { padding:8px 12px; background:var(--surface0); border:1px solid var(--surface1); border-radius:8px; color:var(--overlay0); font-size:18px; cursor:pointer; transition:all .2s; flex-shrink:0; }
.voice-record-btn:hover { background:var(--surface1); }
.voice-record-btn.recording { background:rgba(243,139,168,.2); border-color:var(--red); color:var(--red); animation:pulse-red .8s ease-in-out infinite; }
@keyframes pulse-red { 0%,100%{opacity:1} 50%{opacity:.5} }
.recording-indicator { display:flex; align-items:center; gap:8px; padding:6px 12px; background:rgba(243,139,168,.1); border:1px solid var(--red); border-radius:8px; font-size:13px; color:var(--red); }
.rec-dot { width:8px; height:8px; border-radius:50%; background:var(--red); animation:pulse-red .8s ease-in-out infinite; }
.voice-msg { display:flex; align-items:center; gap:8px; }
.voice-msg audio { max-width:180px; height:32px; }

/* ─── Profile Prompts ─── */
.prompt-card { background:var(--mantle); border:1px solid var(--surface0); border-radius:10px; padding:14px 16px; margin-bottom:10px; }
.prompt-card .prompt-q { font-size:11px; color:var(--mauve); font-weight:600; text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px; }
.prompt-card .prompt-a { font-size:14px; color:var(--text); line-height:1.5; }
.prompt-edit-row { display:grid; grid-template-columns:1fr auto; gap:8px; align-items:start; margin-bottom:8px; }

/* ─── Super Like ─── */
.super-like-btn { position:absolute; top:8px; right:8px; background:rgba(249,226,175,.15); border:1px solid var(--yellow); border-radius:50%; width:34px; height:34px; display:flex; align-items:center; justify-content:center; font-size:16px; cursor:pointer; transition:all .2s; z-index:2; }
.super-like-btn:hover { background:rgba(249,226,175,.3); transform:scale(1.1); }
.super-liked-badge { background:rgba(249,226,175,.15); border:1px solid var(--yellow); color:var(--yellow); font-size:10px; font-weight:700; padding:2px 7px; border-radius:8px; display:inline-block; margin-left:4px; }
@keyframes sparkle { 0%{transform:scale(1) rotate(0);opacity:1} 50%{transform:scale(1.6) rotate(180deg);opacity:.8} 100%{transform:scale(0) rotate(360deg);opacity:0} }
.sparkle-anim { animation:sparkle .6s ease forwards; }
.search-card { position:relative; }

/* ─── Match Expiry ─── */
.expiry-badge { font-size:11px; font-weight:600; padding:2px 8px; border-radius:6px; white-space:nowrap; }
.expiry-warn { background:rgba(249,226,175,.15); color:var(--yellow); border:1px solid var(--yellow); }
.expiry-danger { background:rgba(243,139,168,.15); color:var(--red); border:1px solid var(--red); }
.expiry-expired { background:var(--surface0); color:var(--overlay0); border:1px solid var(--surface1); }
.match-card.expired { opacity:.5; }

/* ─── Session Management ─── */
.session-item { background:var(--mantle); border-radius:8px; padding:12px 14px; margin-bottom:8px; display:flex; align-items:center; justify-content:space-between; gap:12px; }
.session-item .sess-info { flex:1; min-width:0; }
.session-item .sess-device { font-size:13px; color:var(--text); font-weight:500; }
.session-item .sess-meta { font-size:11px; color:var(--overlay0); margin-top:2px; }
.session-item.current-session { border:1px solid var(--green); }
.session-item.current-session .sess-device::after { content:' (this session)'; color:var(--green); font-size:11px; }

/* ─── Danger Zone (Account Deletion) ─── */
.danger-zone { border:1px solid var(--red); border-radius:8px; padding:16px; background:rgba(243,139,168,.05); margin-top:8px; }
.danger-zone h4 { color:var(--red); font-size:14px; margin-bottom:8px; }
.delete-confirm-modal input { text-align:center; letter-spacing:2px; font-weight:700; font-size:16px; }

/* ─── Recovery Codes ─── */
.recovery-codes-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin:12px 0; }
.recovery-code { background:var(--surface0); border:1px solid var(--surface1); border-radius:6px; padding:8px 10px; font-family:monospace; font-size:13px; color:var(--text); text-align:center; letter-spacing:1px; }

/* ─── Stories / Moments ─── */
.stories-bar { display:flex; gap:12px; overflow-x:auto; padding:4px 0 12px; scrollbar-width:none; -ms-overflow-style:none; }
.stories-bar::-webkit-scrollbar { display:none; }
.story-circle { display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; flex-shrink:0; }
.story-circle .story-avatar { width:56px; height:56px; border-radius:50%; object-fit:cover; border:3px solid var(--surface1); transition:transform .2s; }
.story-circle .story-avatar:hover { transform:scale(1.05); }
.story-circle.has-story .story-avatar { border:3px solid transparent; background:linear-gradient(var(--base),var(--base)) padding-box, linear-gradient(135deg,var(--mauve),var(--pink),var(--peach)) border-box; }
.story-circle.has-story.unread .story-avatar { background:linear-gradient(var(--base),var(--base)) padding-box, linear-gradient(135deg,var(--mauve),var(--flamingo)) border-box; }
.story-circle .story-name { font-size:10px; color:var(--subtext0); max-width:60px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; text-align:center; }
.story-add-circle .story-avatar { background:var(--surface0); border:2px dashed var(--surface2); display:flex; align-items:center; justify-content:center; font-size:22px; color:var(--overlay0); }
.story-overlay { position:fixed; inset:0; background:rgba(0,0,0,.95); z-index:600; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.story-timer-bar { position:absolute; top:0; left:0; right:0; height:3px; background:rgba(255,255,255,.2); }
.story-timer-fill { height:100%; background:var(--mauve); transition:width linear; }
.story-content { max-width:400px; width:90%; text-align:center; }
.story-content img { max-width:100%; max-height:70vh; border-radius:12px; }
.story-text-slide { background:linear-gradient(135deg,var(--mauve),var(--pink)); border-radius:12px; padding:40px 24px; font-size:20px; font-weight:600; color:var(--crust); line-height:1.4; min-height:200px; display:flex; align-items:center; justify-content:center; }
.story-author { position:absolute; top:16px; left:50%; transform:translateX(-50%); display:flex; align-items:center; gap:8px; color:white; font-size:14px; font-weight:600; }
.story-close { position:absolute; top:12px; right:12px; background:rgba(255,255,255,.1); border:none; color:white; font-size:20px; width:36px; height:36px; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.story-create-form { background:var(--mantle); border-radius:var(--radius); padding:20px; margin-top:12px; }

/* ─── Polls in Groups ─── */
.poll-card { background:var(--mantle); border:1px solid var(--surface0); border-radius:10px; padding:16px; margin-bottom:10px; }
.poll-card .poll-q { font-size:15px; font-weight:600; color:var(--text); margin-bottom:12px; }
.poll-option { display:flex; align-items:center; gap:8px; padding:8px 12px; background:var(--surface0); border:1px solid transparent; border-radius:8px; margin-bottom:6px; cursor:pointer; transition:all .2s; position:relative; overflow:hidden; }
.poll-option:hover { border-color:var(--mauve); }
.poll-option.voted { border-color:var(--mauve); }
.poll-option .poll-bar { position:absolute; left:0; top:0; bottom:0; background:rgba(203,166,247,.12); transition:width .5s ease; }
.poll-option .poll-text { flex:1; font-size:13px; color:var(--text); position:relative; z-index:1; }
.poll-option .poll-pct { font-size:12px; color:var(--overlay0); font-weight:600; position:relative; z-index:1; }
.poll-meta { font-size:11px; color:var(--overlay0); margin-top:8px; }
.poll-input-row { display:flex; gap:6px; align-items:center; margin-bottom:6px; }
.poll-input-row input { flex:1; }

/* ─── Mutual Friends ─── */
.mutual-badge { display:inline-flex; align-items:center; gap:3px; background:var(--surface0); border:1px solid var(--surface1); border-radius:8px; font-size:11px; color:var(--subtext0); padding:2px 7px; margin-top:4px; }

/* ─── Message Search ─── */
.msg-search-bar { display:flex; gap:8px; align-items:center; margin-bottom:12px; overflow:hidden; max-height:0; transition:max-height .3s ease; }
.msg-search-bar.open { max-height:60px; }
.msg-search-bar input { flex:1; padding:8px 12px; background:var(--mantle); border:1px solid var(--surface1); border-radius:8px; color:var(--text); font-size:13px; outline:none; }
.msg-search-bar input:focus { border-color:var(--mauve); }
.msg-search-result { padding:10px 14px; background:var(--mantle); border-radius:8px; margin-bottom:6px; cursor:pointer; transition:all .2s; border:1px solid transparent; }
.msg-search-result:hover { border-color:var(--mauve); }
.msg-search-result .sr-partner { font-size:12px; color:var(--mauve); font-weight:600; margin-bottom:2px; }
.msg-search-result .sr-snippet { font-size:13px; color:var(--subtext1); }
.msg-search-result .sr-snippet mark { background:rgba(203,166,247,.3); color:var(--text); border-radius:2px; }

/* ─── Compatibility Radar (Match Detail) ─── */
.compat-radar-container { display:flex; justify-content:center; margin:16px 0; }

/* ─── Notification Sounds ─── */
/* (toggle uses existing settings styles) */

/* ─── Image Crop ─── */
.crop-overlay { position:fixed; inset:0; background:rgba(0,0,0,.85); z-index:700; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; }
.crop-wrapper { position:relative; width:300px; height:300px; overflow:hidden; background:#000; border-radius:8px; }
.crop-wrapper img { position:absolute; transform-origin:center; cursor:move; -webkit-user-select:none; user-select:none; }
.crop-frame { position:absolute; inset:0; box-shadow:0 0 0 9999px rgba(0,0,0,.5); border:2px solid var(--mauve); border-radius:4px; pointer-events:none; }
.crop-controls { display:flex; gap:8px; align-items:center; }

/* ─── Location Settings ─── */
.location-section { padding:8px 0; }
.radius-display { font-size:14px; font-weight:600; color:var(--text); min-width:60px; }

/* ─── i18n ─── */
/* (language selector uses existing form styles) */

/* ─── Data Export ─── */
.export-section { padding:8px 0; }

@media(max-width:768px) {
    .top-picks .pick-card { min-width:140px; }
    .gif-grid { grid-template-columns:1fr 1fr; }
    .calendar-day { font-size:11px; }
    .liked-grid { grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); }
    .onboarding-tooltip { max-width:90vw; left:5vw !important; right:5vw !important; }
    .recovery-codes-grid { grid-template-columns:1fr; }
    .ms-profile.stories-visible { padding-top:80px; }
    .crop-wrapper { width:260px; height:260px; }
    .poll-option { flex-wrap:wrap; }
}
@media(max-width:400px) {
    .stories-bar { gap:8px; }
    .story-circle .story-avatar { width:48px; height:48px; }
}

/* ═══════════════════════════════════════════════════
   FEATURE 1: Dark/Light Theme Toggle
   ═══════════════════════════════════════════════════ */
body.theme-latte {
    --base: #eff1f5; --mantle: #e6e9ef; --crust: #dce0e8;
    --surface0: #ccd0da; --surface1: #bcc0cc; --surface2: #acb0be;
    --overlay0: #6c6f85; --overlay1: #7c7f93;
    --text: #4c4f69; --subtext0: #5c5f77; --subtext1: #6c6f85;
    --lavender: #7287fd; --blue: #1e66f5; --sapphire: #209fb5;
    --green: #40a02b; --peach: #fe640b; --red: #d20f39;
    --mauve: #8839ef; --pink: #ea76cb; --yellow: #df8e1d;
    --rosewater: #dc8a78; --flamingo: #dd7878; --teal: #179299;
    --shadow: 0 8px 32px rgba(0,0,0,0.12);
}
body.theme-latte ::-webkit-scrollbar-track { background: var(--mantle); }
body.theme-latte ::-webkit-scrollbar-thumb { background: var(--surface2); }
body.theme-latte .header h1 { background:linear-gradient(135deg,var(--mauve),var(--pink),var(--flamingo)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }

/* ═══════════════════════════════════════════════════
   FEATURE 2: Threaded Replies
   ═══════════════════════════════════════════════════ */
.msg-reply-preview { background:var(--surface0); border-left:3px solid var(--mauve); border-radius:0 8px 8px 0; padding:6px 10px; margin-bottom:6px; font-size:12px; color:var(--subtext0); display:flex; align-items:center; justify-content:space-between; gap:8px; }
.msg-reply-preview .rp-name { color:var(--mauve); font-weight:600; margin-bottom:2px; }
.msg-reply-preview .rp-text { color:var(--subtext1); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:280px; }
.msg-reply-cancel { cursor:pointer; color:var(--overlay0); font-size:16px; flex-shrink:0; }
.msg-reply-cancel:hover { color:var(--red); }
.msg-quote-block { background:var(--surface0); border-left:3px solid var(--mauve); border-radius:0 6px 6px 0; padding:4px 8px; margin-bottom:4px; font-size:11px; }
.msg-quote-block .qb-name { color:var(--mauve); font-weight:600; }
.msg-quote-block .qb-text { color:var(--subtext0); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:200px; }
.msg-reply-btn { opacity:0; cursor:pointer; font-size:11px; color:var(--overlay0); background:var(--surface0); border:1px solid var(--surface1); border-radius:6px; padding:2px 7px; transition:opacity .15s; white-space:nowrap; }
.msg-bubble:hover .msg-reply-btn { opacity:1; }
.msg-reply-btn:hover { color:var(--mauve); border-color:var(--mauve); }

/* ═══════════════════════════════════════════════════
   FEATURE 3: Pinned Messages
   ═══════════════════════════════════════════════════ */
.pinned-banner { background:linear-gradient(90deg,rgba(203,166,247,.08),rgba(245,194,231,.06)); border:1px solid var(--surface1); border-radius:8px; padding:8px 12px; margin-bottom:8px; }
.pinned-banner-header { display:flex; align-items:center; gap:6px; font-size:11px; color:var(--mauve); font-weight:600; margin-bottom:4px; text-transform:uppercase; letter-spacing:.5px; }
.pinned-item { display:flex; align-items:center; gap:8px; padding:3px 0; font-size:12px; color:var(--subtext1); cursor:pointer; border-bottom:1px solid var(--surface0); }
.pinned-item:last-child { border-bottom:none; }
.pinned-item:hover { color:var(--text); }
.pinned-item .pi-name { color:var(--mauve); font-size:11px; margin-right:4px; }
.pinned-item .pi-text { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.msg-pin-btn { opacity:0; cursor:pointer; font-size:11px; color:var(--overlay0); background:var(--surface0); border:1px solid var(--surface1); border-radius:6px; padding:2px 7px; transition:opacity .15s; white-space:nowrap; margin-left:2px; }
.msg-bubble:hover .msg-pin-btn { opacity:1; }
.msg-pin-btn:hover { color:var(--yellow); border-color:var(--yellow); }
.msg-bubble.is-pinned { border-left:2px solid var(--yellow); }

/* ═══════════════════════════════════════════════════
   FEATURE 4: Story Reactions
   ═══════════════════════════════════════════════════ */
.story-reactions-row { display:flex; gap:10px; justify-content:center; margin-top:16px; }
.story-react-btn { background:rgba(255,255,255,.12); border:none; border-radius:50%; width:44px; height:44px; font-size:20px; cursor:pointer; transition:all .2s; display:flex; align-items:center; justify-content:center; }
.story-react-btn:hover { background:rgba(255,255,255,.25); transform:scale(1.2); }
.story-react-btn.reacted { background:rgba(203,166,247,.35); transform:scale(1.15); }
.story-reaction-count { color:rgba(255,255,255,.7); font-size:11px; font-weight:600; text-align:center; margin-top:2px; }
.story-viewers-list { position:absolute; bottom:80px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,.75); border-radius:10px; padding:10px 14px; max-width:300px; }
.story-viewer-item { display:flex; align-items:center; gap:8px; padding:4px 0; font-size:13px; color:white; }
.story-viewer-item .sv-reaction { font-size:16px; }

/* ═══════════════════════════════════════════════════
   FEATURE 5: Profile Badges
   ═══════════════════════════════════════════════════ */
.profile-badge { display:inline-flex; align-items:center; justify-content:center; width:18px; height:18px; border-radius:4px; font-size:11px; margin-left:3px; vertical-align:middle; cursor:default; position:relative; }
.profile-badge[data-tooltip]:hover::after { content:attr(data-tooltip); position:absolute; bottom:110%; left:50%; transform:translateX(-50%); background:var(--surface0); color:var(--text); font-size:11px; padding:3px 8px; border-radius:6px; white-space:nowrap; border:1px solid var(--surface1); z-index:10; pointer-events:none; }
.pb-verified { background:rgba(166,227,161,.2); color:var(--green); }
.pb-early { background:rgba(249,226,175,.2); color:var(--yellow); }
.pb-starter { background:rgba(137,180,250,.2); color:var(--blue); }
.pb-matcher { background:rgba(243,139,168,.2); color:var(--red); }
.pb-host { background:rgba(203,166,247,.2); color:var(--mauve); }

/* ═══════════════════════════════════════════════════
   FEATURE 6: Shared Playlists
   ═══════════════════════════════════════════════════ */
.playlist-section { background:var(--mantle); border:1px solid var(--surface0); border-radius:var(--radius); padding:16px; margin-top:12px; }
.playlist-section h3 { font-size:15px; color:var(--lavender); margin-bottom:10px; display:flex; align-items:center; gap:8px; }
.playlist-song { display:flex; align-items:center; gap:10px; padding:7px 10px; background:var(--surface0); border-radius:8px; margin-bottom:5px; font-size:13px; }
.playlist-song .ps-icon { color:var(--mauve); font-size:16px; }
.playlist-song .ps-info { flex:1; }
.playlist-song .ps-title { color:var(--text); font-weight:500; }
.playlist-song .ps-artist { color:var(--overlay0); font-size:11px; }
.playlist-add-form { display:grid; grid-template-columns:1fr 1fr auto; gap:6px; margin-top:8px; }
.playlist-add-form input { font-size:13px; padding:7px 10px; }

/* ═══════════════════════════════════════════════════
   FEATURE 7: Event Photo Albums
   ═══════════════════════════════════════════════════ */
.event-album-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:10px; }
.event-album-item { position:relative; border-radius:8px; overflow:hidden; aspect-ratio:1; cursor:pointer; }
.event-album-item img { width:100%; height:100%; object-fit:cover; transition:transform .3s; }
.event-album-item:hover img { transform:scale(1.05); }
.event-album-del { position:absolute; top:4px; right:4px; background:rgba(0,0,0,.6); color:var(--red); font-size:14px; width:22px; height:22px; border-radius:50%; display:none; align-items:center; justify-content:center; cursor:pointer; border:none; }
.event-album-item:hover .event-album-del { display:flex; }

/* ═══════════════════════════════════════════════════
   FEATURE 8: Icebreaker Games
   ═══════════════════════════════════════════════════ */
.ig-panel { background:var(--mantle); border:1px solid var(--surface0); border-radius:var(--radius); padding:16px; margin-top:12px; }
.ig-panel h3 { font-size:15px; color:var(--lavender); margin-bottom:10px; }
.ig-game-types { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:12px; }
.ig-type-card { padding:12px 8px; background:var(--surface0); border:2px solid transparent; border-radius:10px; cursor:pointer; text-align:center; font-size:13px; color:var(--subtext0); transition:all .2s; }
.ig-type-card:hover { background:var(--surface1); color:var(--text); }
.ig-type-card.active { border-color:var(--mauve); color:var(--mauve); background:rgba(203,166,247,.1); }
.ig-type-card .ig-icon { font-size:22px; margin-bottom:4px; }

<body>
<script>try{if(localStorage.getItem('kindred_theme')==='latte')document.body.classList.add('theme-latte')}catch(e){}</script>
<div class="header" role="banner">
    <div style="display:flex;align-items:baseline"><h1>Kindred</h1><span class="ver">v1.7.0</span><span id="incognito-indicator" style="display:none;margin-left:8px;font-size:16px;color:var(--overlay0)" title="Incognito Mode On">&#128123;</span></div>
    <div style="display:flex;align-items:center;gap:8px">
        <button id="theme-toggle-btn" onclick="toggleTheme()" title="Toggle light/dark theme" style="background:var(--surface0);border:1px solid var(--surface1);color:var(--subtext0);width:34px;height:34px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0" aria-label="Toggle theme">&#9790;</button>
        <div id="ws-status-dot" title="Connected" style="width:10px;height:10px;border-radius:50%;background:var(--green);flex-shrink:0;transition:background .3s" aria-label="Connection status"></div>
        <div id="notif-bell" style="display:none;position:relative;cursor:pointer" onclick="toggleNotifications()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--subtext0)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            <span id="notif-count" style="display:none;position:absolute;top:-6px;right:-6px;background:var(--red);color:var(--crust);font-size:10px;font-weight:700;padding:1px 5px;border-radius:10px"></span>
