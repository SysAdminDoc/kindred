    const privacy=document.getElementById('cg-privacy')?.value||'public';
    if(!name){toast('Group name required','error');return;}
    await authFetch(API+'/api/groups',{method:'POST',headers:authHeaders(),body:JSON.stringify({name,description:desc,privacy})});
    toast('Group created!','success');
    renderGroups();
}

async function viewGroup(gid){
    const app=document.getElementById('app');
    app.innerHTML='<div class="loading"><div class="spinner"></div>Loading group...</div>';
    try{
        const r=await fetch(API+'/api/groups/'+gid+'?viewer='+activeProfile);const g=await r.json();
        let html=`<div class="card"><button class="btn btn-secondary" onclick="renderGroups()" style="margin-bottom:12px;font-size:12px;padding:6px 12px">Back to Groups</button>
        <h2>${escHtml(g.name)}</h2><p class="subtitle">${escHtml(g.description||'')}</p>
        <div style="margin-bottom:12px;font-size:12px;color:var(--overlay0)">${g.member_count} members &bull; ${g.privacy}</div>`;
        if(!g.is_member) html+=`<button class="btn btn-primary" onclick="joinGroupAction('${gid}')" style="margin-bottom:16px">Join Group</button>`;
        else html+=`<button class="btn btn-secondary" onclick="leaveGroupAction('${gid}')" style="margin-bottom:16px;font-size:12px;padding:6px 12px">Leave Group</button>`;

        // Post form for members
        if(g.is_member){
            html+=`<div style="display:flex;gap:8px;margin-bottom:16px"><input type="text" id="gp-input" placeholder="Write something to the group..." style="flex:1" onkeydown="if(event.key==='Enter')postToGroup('${gid}')"><button class="btn btn-primary" onclick="postToGroup('${gid}')" style="padding:8px 16px">Post</button></div>`;
        }

        // Posts
        if(g.posts&&g.posts.length){
            for(const p of g.posts){
                html+=`<div class="status-card"><div class="status-header">${p.photo?`<img src="/uploads/${p.photo}">`:'<div style="width:36px;height:36px;border-radius:50%;background:var(--surface0);display:flex;align-items:center;justify-content:center;color:var(--overlay0)">?</div>'}<span class="name" onclick="viewProfilePage('${p.profile_id}')">${escHtml(p.name)}</span><span class="time">${timeAgo(p.created_at)}</span></div><div class="status-body">${escHtml(p.content)}</div>${p.profile_id===activeProfile?`<div class="status-actions"><span onclick="deleteGroupPostAction('${gid}','${p.id}')">Delete</span></div>`:''}</div>`;
            }
        } else {
            html+=`<div style="color:var(--overlay0);font-size:13px;padding:12px">No posts yet. Start the conversation!</div>`;
        }

        // Members
        html+=`<h3 style="font-size:14px;color:var(--subtext1);margin:16px 0 8px">Members (${g.member_count})</h3><div class="ms-friends-grid">`;
        for(const m of g.members.slice(0,12)){
            html+=`<div class="ms-friend" onclick="viewProfilePage('${m.profile_id}')">${m.photo?`<img src="/uploads/${m.photo}">`:'<div class="ms-friend-placeholder">?</div>'}<div class="name">${m.name}${m.role==='admin'?' (Admin)':''}</div></div>`;
        }
        html+=`</div></div>`;
        app.innerHTML=html;
    }catch(e){app.innerHTML='<div class="empty"><h3>Error loading group</h3></div>';}
}

async function joinGroupAction(gid){await authFetch(API+'/api/groups/'+gid+'/join',{method:'POST',headers:authHeaders()});toast('Joined!','success');viewGroup(gid);}
async function leaveGroupAction(gid){await authFetch(API+'/api/groups/'+gid+'/leave',{method:'POST',headers:authHeaders()});toast('Left group','success');renderGroups();}
async function postToGroup(gid){
    const inp=document.getElementById('gp-input');const txt=inp?.value?.trim();if(!txt)return;
    inp.value='';
    await authFetch(API+'/api/groups/'+gid+'/posts',{method:'POST',headers:authHeaders(),body:JSON.stringify({content:txt})});
    viewGroup(gid);
}
async function deleteGroupPostAction(gid,pid){
    await authFetch(API+'/api/groups/'+gid+'/posts/'+pid,{method:'DELETE',headers:authHeaders()});
    toast('Post deleted','success');viewGroup(gid);
}

// ─── Events ───
async function renderEvents(){
    if(!activeProfile){showView('welcome');return;}
    const app=document.getElementById('app');
    app.innerHTML=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><div><h2>Events</h2><p class="subtitle">Find and create meetups</p></div><button class="btn btn-primary" onclick="showCreateEventForm()" style="padding:8px 16px;font-size:13px">Create Event</button></div><div id="create-event-area"></div>
    <h3 style="font-size:14px;color:var(--subtext1);margin-bottom:10px">My Events</h3><div id="my-events"><div class="loading"><div class="spinner"></div></div></div>
    <h3 style="font-size:14px;color:var(--subtext1);margin:16px 0 10px">Upcoming Events</h3><div id="all-events"><div class="loading"><div class="spinner"></div></div></div></div>`;
    loadEvents();
}

async function loadEvents(){
    try{
        const [mr,ar]=await Promise.all([authFetch(API+'/api/events/mine'),fetch(API+'/api/events')]);
        const myD=await mr.json(),allD=await ar.json();
        const myEl=document.getElementById('my-events');
        const allEl=document.getElementById('all-events');
        if(myEl){
            if(myD.events.length) myEl.innerHTML='<div class="event-grid">'+myD.events.map((e,i)=>`<div class="event-card" style="animation-delay:${i*.04}s" onclick="viewEvent('${e.id}')"><h3>${escHtml(e.title)}</h3>${e.event_date?`<div class="ec-date">${e.event_date}${e.event_time?' at '+e.event_time:''}</div>`:''}<div class="ec-loc">${escHtml(e.location||'No location set')}</div><div class="ec-meta">${e.attendee_count||0} attending &bull; ${e.my_status||'going'}</div></div>`).join('')+'</div>';
            else myEl.innerHTML='<div style="color:var(--overlay0);font-size:13px">No events yet</div>';
        }
        if(allEl){
            if(allD.events.length) allEl.innerHTML='<div class="event-grid">'+allD.events.map((e,i)=>`<div class="event-card" style="animation-delay:${i*.04}s" onclick="viewEvent('${e.id}')"><h3>${escHtml(e.title)}</h3>${e.event_date?`<div class="ec-date">${e.event_date}${e.event_time?' at '+e.event_time:''}</div>`:''}<div class="ec-loc">${escHtml(e.location||'No location set')}</div><div class="ec-meta">${e.attendee_count||0} attending &bull; by ${escHtml(e.creator_name||'')}</div></div>`).join('')+'</div>';
            else allEl.innerHTML='<div style="color:var(--overlay0);font-size:13px">No upcoming events. Create the first one!</div>';
        }
    }catch(e){}
}

function showCreateEventForm(){
    const el=document.getElementById('create-event-area');if(!el)return;
    el.innerHTML=`<div style="background:var(--mantle);padding:14px;border-radius:8px;margin-bottom:16px">
        <div class="form-group"><label>Event Title</label><input type="text" id="ce-title" placeholder="e.g., Coffee Meetup, Speed Dating Night"></div>
        <div class="form-group"><label>Description</label><textarea id="ce-desc" placeholder="What's happening?" style="min-height:60px"></textarea></div>
        <div class="form-group"><label>Location</label><input type="text" id="ce-loc" placeholder="Where?"></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
            <div class="form-group"><label>Date</label><input type="text" id="ce-date" placeholder="e.g., 2026-04-15"></div>
            <div class="form-group"><label>Time</label><input type="text" id="ce-time" placeholder="e.g., 7:00 PM"></div>
        </div>
        <div class="form-group"><label>Max Attendees (0 = unlimited)</label><input type="number" id="ce-max" value="0" min="0"></div>
        <div class="btn-row"><button class="btn btn-secondary" onclick="document.getElementById('create-event-area').innerHTML=''">Cancel</button><button class="btn btn-primary" onclick="submitCreateEvent()">Create Event</button></div></div>`;
}

async function submitCreateEvent(){
    const title=document.getElementById('ce-title')?.value?.trim();
    if(!title){toast('Event title required','error');return;}
    const body={title,description:document.getElementById('ce-desc')?.value?.trim()||'',location:document.getElementById('ce-loc')?.value?.trim()||'',event_date:document.getElementById('ce-date')?.value?.trim()||'',event_time:document.getElementById('ce-time')?.value?.trim()||'',max_attendees:parseInt(document.getElementById('ce-max')?.value)||0};
    await authFetch(API+'/api/events',{method:'POST',headers:authHeaders(),body:JSON.stringify(body)});
    toast('Event created!','success');
    renderEvents();
}

async function viewEvent(eid){
    const app=document.getElementById('app');
    app.innerHTML='<div class="loading"><div class="spinner"></div>Loading event...</div>';
    try{
        const r=await fetch(API+'/api/events/'+eid);const e=await r.json();
        let html=`<div class="card"><button class="btn btn-secondary" onclick="renderEvents()" style="margin-bottom:12px;font-size:12px;padding:6px 12px">Back to Events</button>
        <h2>${escHtml(e.title)}</h2>
        ${e.event_date?`<div style="font-size:14px;color:var(--sapphire);font-weight:600;margin-bottom:4px">${e.event_date}${e.event_time?' at '+e.event_time:''}</div>`:''}
        ${e.location?`<div style="font-size:13px;color:var(--overlay0);margin-bottom:8px">${escHtml(e.location)}</div>`:''}
        ${e.description?`<div style="font-size:14px;color:var(--subtext1);line-height:1.6;margin-bottom:12px;white-space:pre-wrap">${escHtml(e.description)}</div>`:''}
        <div style="font-size:12px;color:var(--overlay0);margin-bottom:16px">${e.attendee_count} attending${e.max_attendees?' / '+e.max_attendees+' max':''}</div>`;

        // RSVP buttons
        const myRSVP=e.rsvps.find(r=>r.profile_id===activeProfile);
        html+=`<div style="display:flex;gap:8px;margin-bottom:16px">
            <button class="btn ${myRSVP?.status==='going'?'btn-primary':'btn-secondary'}" onclick="rsvpAction('${eid}','going')" style="font-size:12px;padding:6px 14px">Going</button>
            <button class="btn ${myRSVP?.status==='interested'?'btn-primary':'btn-secondary'}" onclick="rsvpAction('${eid}','interested')" style="font-size:12px;padding:6px 14px">Interested</button>
            <button class="btn ${myRSVP?.status==='not_going'?'btn-danger':'btn-secondary'}" onclick="rsvpAction('${eid}','not_going')" style="font-size:12px;padding:6px 14px">Not Going</button>
        </div>`;

        // Attendees
        const going=e.rsvps.filter(r=>r.status==='going');
        if(going.length){
            html+=`<h3 style="font-size:14px;color:var(--subtext1);margin-bottom:8px">Attending (${going.length})</h3><div class="ms-friends-grid">`;
            for(const a of going){
                html+=`<div class="ms-friend" onclick="viewProfilePage('${a.profile_id}')">${a.photo?`<img src="/uploads/${a.photo}">`:'<div class="ms-friend-placeholder">?</div>'}<div class="name">${a.name}</div></div>`;
            }
            html+=`</div>`;
        }
        html+=`</div>`;
        app.innerHTML=html;
    }catch(e){app.innerHTML='<div class="empty"><h3>Error loading event</h3></div>';}
}

async function rsvpAction(eid,status){
    await authFetch(API+'/api/events/'+eid+'/rsvp',{method:'POST',headers:authHeaders(),body:JSON.stringify({status})});
    toast('RSVP updated!','success');viewEvent(eid);
}

// ─── Heartbeat ───
setInterval(()=>{if(activeProfile)fetch(API+'/api/heartbeat/'+activeProfile,{method:'POST'}).catch(()=>{});},60000);

// ─── Toast ───
function toast(m,t=''){const c=document.getElementById('toastContainer');const e=document.createElement('div');e.className='toast '+t;e.textContent=m;c.appendChild(e);requestAnimationFrame(()=>e.classList.add('show'));setTimeout(()=>{e.classList.remove('show');setTimeout(()=>e.remove(),300);},3500);}
function showSkeleton(el,count=3){el.innerHTML=Array(count).fill('<div class="skeleton skeleton-card"></div>').join('');}
function showEmpty(el,icon,title,desc,btnText,btnAction){el.innerHTML=`<div class="empty-state"><div class="empty-icon">${icon}</div><div class="empty-title">${title}</div><div class="empty-desc">${desc}</div>${btnText?`<button class="btn btn-primary" onclick="${btnAction}">${btnText}</button>`:''}</div>`;}


// ─── Notification Preferences ───
async function loadNotifPrefs(){
    const el=document.getElementById('notif-prefs');if(!el)return;
    try{
        const r=await authFetch(API+'/api/notifications/preferences');const d=await r.json();
        const fields=['messages','friend_requests','likes','comments','group_posts','events'];
        el.innerHTML=fields.map(f=>`<label style="display:flex;align-items:center;gap:8px;margin-bottom:6px;cursor:pointer;font-size:13px;color:var(--subtext0)"><input type="checkbox" ${d[f]?'checked':''} onchange="saveNotifPrefs()" data-pref="${f}" style="accent-color:var(--mauve)"> ${f.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase())}</label>`).join('');
    }catch(e){el.innerHTML='<div style="color:var(--red);font-size:13px">Failed to load preferences</div>';}
}
async function saveNotifPrefs(){
    const prefs={};document.querySelectorAll('[data-pref]').forEach(el=>{prefs[el.dataset.pref]=el.checked?1:0;});
    await authFetch(API+'/api/notifications/preferences',{method:'PUT',headers:authHeaders(),body:JSON.stringify(prefs)});
    toast('Preferences saved','success');
}

// ─── Change Password ───
async function changePassword(){
    const cur=document.getElementById('pw-current')?.value;
    const nw=document.getElementById('pw-new')?.value;
    if(!cur||!nw){toast('Both fields required','error');return;}
    if(nw.length<6){toast('Password must be at least 6 characters','error');return;}
    const r=await authFetch(API+'/api/auth/change-password',{method:'POST',headers:authHeaders(),body:JSON.stringify({current_password:cur,new_password:nw})});
    const d=await r.json();
    if(r.ok){toast('Password changed!','success');document.getElementById('pw-current').value='';document.getElementById('pw-new').value='';}
    else{toast(d.detail||'Failed','error');}
}

// ─── Blocked Users ───
async function loadBlockedUsers(pid){
    const el=document.getElementById('blocked-list');if(!el)return;
    try{
        const r=await authFetch(API+'/api/blocks/'+pid);const d=await r.json();
        if(!d.blocks||!d.blocks.length){el.innerHTML='<div style="color:var(--overlay0);font-size:13px">No blocked users.</div>';return;}
        el.innerHTML=d.blocks.map(b=>`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--surface0)"><span style="flex:1;font-size:13px">${escHtml(b.name)}</span><button class="btn btn-secondary" style="padding:3px 10px;font-size:11px" onclick="unblockUser('${pid}','${b.blocked_id}')">Unblock</button></div>`).join('');
    }catch(e){el.innerHTML='<div style="color:var(--red);font-size:13px">Failed to load</div>';}
}
async function unblockUser(meId,targetId){
    await authFetch(API+'/api/block/'+meId+'/'+targetId,{method:'DELETE'});
    toast('User unblocked','success');
    loadBlockedUsers(meId);
}

// ─── Deactivation ───
async function deactivateMyProfile(pid){
    if(!confirm('Deactivate your profile? It will be hidden from others.'))return;
    await authFetch(API+'/api/profile/'+pid+'/deactivate',{method:'POST'});
    toast('Profile deactivated','success');
    showView('myprofile');
}

init();
</script>
</body>
