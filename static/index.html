async function voteOnPoll(pollId,optionIdx,gid){
    try{
        const r=await authFetch(API+'/api/polls/'+pollId+'/vote',{method:'POST',headers:authHeaders(),body:JSON.stringify({option_index:optionIdx})});
        if(r.ok){toast('Vote recorded!','success');viewGroup(gid);}
        else{const d=await r.json();toast(d.detail||'Could not vote','error');}
    }catch(e){toast('Error','error');}
}

function renderPollHtml(poll,gid){
    const totalVotes=poll.votes?.reduce((a,b)=>a+b,0)||0;
    const userVote=poll.user_vote;
    const hasVoted=userVote!==undefined&&userVote!==null;
    let html=`<div class="poll-card"><div class="poll-q">${escHtml(poll.question)}</div>`;
    (poll.options||[]).forEach((opt,i)=>{
        const votes=poll.votes?.[i]||0;
        const pct=totalVotes>0?Math.round(votes/totalVotes*100):0;
        html+=`<div class="poll-option${userVote===i?' voted':''}" onclick="${!hasVoted?`voteOnPoll('${poll.id}',${i},'${gid}')`:''}" style="${!hasVoted?'':'cursor:default'}">
            <div class="poll-bar" style="width:${hasVoted?pct:0}%"></div>
            <span class="poll-text">${escHtml(opt)}</span>
            ${hasVoted?`<span class="poll-pct">${pct}%</span>`:''}
        </div>`;
    });
    html+=`<div class="poll-meta">${totalVotes} vote${totalVotes!==1?'s':''}</div></div>`;
    return html;
}

async function loadLocationSettings(){
    const el=document.getElementById('location-settings-area');if(!el)return;
    try{
        const r=await authFetch(API+'/api/settings/location');
        const d=r.ok?await r.json():{enabled:false,radius:50,city:''};
        el.innerHTML=`<label style="display:flex;align-items:center;gap:8px;margin-bottom:12px;cursor:pointer;font-size:13px;color:var(--subtext0)">
            <input type="checkbox" id="loc-enabled" ${d.enabled?'checked':''} onchange="onLocToggle(this.checked)" style="accent-color:var(--mauve)"> Enable Location Matching
        </label>
        <div id="loc-fields" style="display:${d.enabled?'block':'none'}">
            <div class="form-group"><label style="font-size:12px;color:var(--overlay0)">Distance Radius: <span id="loc-radius-val">${d.radius||50}</span>km</label>
            <input type="range" id="loc-radius" min="10" max="500" value="${d.radius||50}" style="width:100%;accent-color:var(--mauve)" oninput="document.getElementById('loc-radius-val').textContent=this.value"></div>
            <div class="form-group"><label style="font-size:12px;color:var(--overlay0)">City / Region (fallback)</label><input type="text" id="loc-city" value="${escHtml(d.city||'')}" placeholder="e.g., Austin, TX"></div>
            <button class="btn btn-secondary" style="font-size:12px;padding:6px 14px;margin-right:6px" onclick="detectLocation()">&#127758; Use My Location</button>
            <button class="btn btn-primary" style="font-size:12px;padding:6px 14px" onclick="saveLocationSettings()">Save</button>
        </div>`;
    }catch(e){if(el)el.innerHTML='<div style="color:var(--overlay0);font-size:13px">Could not load location settings</div>';}
}

function onLocToggle(checked){
    const fields=document.getElementById('loc-fields');
    if(fields)fields.style.display=checked?'block':'none';
    if(!checked)saveLocationSettings();
}

async function detectLocation(){
    if(!navigator.geolocation){toast('Geolocation not supported','error');return;}
    toast('Detecting location...','info');
    navigator.geolocation.getCurrentPosition(async pos=>{
        const btn=document.querySelector('button[onclick="detectLocation()"]');
        try{
            const r=await authFetch(API+'/api/settings/location',{method:'POST',headers:authHeaders(),body:JSON.stringify({lat:pos.coords.latitude,lng:pos.coords.longitude,radius:parseInt(document.getElementById('loc-radius')?.value||50),enabled:true})});
            if(r.ok){toast('Location saved!','success');loadLocationSettings();}
            else toast('Could not save location','error');
        }catch(e){toast('Error','error');}
    },()=>toast('Location access denied','error'));
}

async function saveLocationSettings(){
    const enabled=document.getElementById('loc-enabled')?.checked||false;
    const radius=parseInt(document.getElementById('loc-radius')?.value||50);
    const city=document.getElementById('loc-city')?.value?.trim()||'';
    try{

// ─── FEATURE 17: WebSocket Reconnection (enhanced) ───
// ══════════════════════════════════════════════════════
let _wsBackoff=1000, _wsReconnecting=false, _wsMsgQueue=[], _wsMaxBackoff=30000;
function setWsStatus(state){
    const dot=document.getElementById('ws-status-dot');
    const banner=document.getElementById('ws-reconnect-banner');
    if(dot){dot.dataset.state=state;dot.title=state==='connected'?'Connected':state==='reconnecting'?'Reconnecting...':'Disconnected';}
    if(banner){
        if(state==='reconnecting'){banner.textContent='Reconnecting...';banner.classList.add('visible');}
        else if(state==='disconnected'){banner.textContent='Disconnected — check your connection';banner.classList.add('visible');}
        else{banner.classList.remove('visible');}
    }
}
function connectWSEnhanced(){
    if(!activeProfile)return;
    if(ws&&ws.readyState===WebSocket.OPEN)return;
    _wsReconnecting=true;
    setWsStatus('reconnecting');
    const proto=location.protocol==='https:'?'wss:':'ws:';
    ws=new WebSocket(proto+'//'+location.host+'/ws/'+activeProfile+'?token='+(safeGet('kindred_token','')));
    ws.onopen=()=>{
        _wsBackoff=1000;_wsReconnecting=false;
        setWsStatus('connected');
        // Flush queued messages
        while(_wsMsgQueue.length){
            const m=_wsMsgQueue.shift();
            if(ws.readyState===WebSocket.OPEN)ws.send(m);
        }
    };
    ws.onmessage=(e)=>{
        try{
            const msg=JSON.parse(e.data);
            if(msg.type==='message'){
                playNotifSound();
                toast(msg.from_name+': '+msg.content.slice(0,60),'success');
                const chatOpen=document.getElementById('msgs');
                if(chatOpen&&window._chatPartner===msg.from)openChat(activeProfile,msg.from);
                pollNotifications();
            } else if(msg.type==='group_message'){
                toast('New message in '+msg.group_name,'info');
                const gcEl=document.getElementById('group-msgs');
                if(gcEl&&window._activeGroupChat===msg.group_id)loadGroupChat(msg.group_id);
            } else if(msg.type==='typing'){
                const ti=document.getElementById('typing-indicator');
                if(ti&&window._chatPartner===msg.from){
                    ti.textContent='typing...';
                    clearTimeout(window._typingTimeout);
                    window._typingTimeout=setTimeout(()=>{if(ti)ti.textContent='';},3000);
                }
            } else if(msg.type==='typing_preview'){
                handleTypingPreview(msg);
            }
        }catch(err){}
    };
    ws.onclose=()=>{
        ws=null;
        if(!_wsReconnecting)setWsStatus('disconnected');
        setWsStatus('reconnecting');
        if(wsReconnectTimer)clearTimeout(wsReconnectTimer);
        wsReconnectTimer=setTimeout(()=>{
            _wsBackoff=Math.min(_wsBackoff*2,_wsMaxBackoff);
            connectWSEnhanced();
        },_wsBackoff);
        window._wsReconnectTimeout=wsReconnectTimer;
    };
    ws.onerror=()=>{ws?.close();};
    const wsHB=setInterval(()=>{
        if(ws&&ws.readyState===WebSocket.OPEN)ws.send(JSON.stringify({type:'heartbeat'}));
        else clearInterval(wsHB);
    },30000);
}
function wsSendQueued(payload){
    const str=JSON.stringify(payload);
    if(ws&&ws.readyState===WebSocket.OPEN)ws.send(str);
    else _wsMsgQueue.push(str);
}

// ══════════════════════════════════════════════════════
// ─── FEATURE 18: Link Preview Scanning ───
// ══════════════════════════════════════════════════════
const LINK_SHORTENED=['bit.ly','tinyurl.com','t.co','ow.ly','buff.ly','goo.gl','short.io','rb.gy','cutt.ly','v.gd'];
const LINK_SAFE=['youtube.com','youtu.be','spotify.com','wikipedia.org','github.com','reddit.com','twitter.com','x.com','instagram.com'];
const URL_REGEX=/https?:\/\/[^\s<>"']+/g;

function scanLinksInMessage(html){
    const rawContent=html;
    const urls=[...rawContent.matchAll(URL_REGEX)].map(m=>m[0]);
    if(!urls.length)return html;
    let result=rawContent;
    for(const url of urls){
        try{
            const host=new URL(url).hostname.replace(/^www\./,'');
            const isShortened=LINK_SHORTENED.some(s=>host===s||host.endsWith('.'+s));
            const isSafe=LINK_SAFE.some(s=>host===s||host.endsWith('.'+s));
            const safeUrl=escHtml(url);
            if(isShortened){
                const badge=`<span class="link-warn" data-tooltip="Shortened link — exercise caution">&#9888; ${safeUrl}</span>`;
                result=result.replace(url,badge);
            } else if(isSafe){
                const badge=`<span class="link-safe">&#10003; <a href="${safeUrl}" target="_blank" rel="noopener noreferrer" style="color:inherit;text-decoration:underline">${safeUrl}</a></span>`;
                result=result.replace(url,badge);
            }
        }catch(e){}
    }
    return result;
}

    const ml=document.getElementById('msgs');ml.scrollTop=ml.scrollHeight;
    logEvent(meId,'message_view',themId);
    // Load async extras
    loadPinnedMessages(meId,themId);
    loadProfileBadges(themId,'chat-badges-'+themId);
}

        <div style="display:flex;flex-direction:column;gap:10px;margin-top:12px">

        </div>
        <div class="btn-row" style="margin-top:12px"><button class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">Close</button></div>

}

// ── Patch viewEvent to include photo albums ──
const _origViewEvent=viewEvent;
async function viewEvent(eid){
    await _origViewEvent(eid);
    // Inject photo album section after original content loads
    const app=document.getElementById('app');
    if(!app)return;
    const photoDiv=document.createElement('div');
    photoDiv.id='event-photo-section';
    photoDiv.innerHTML=`<div class="card" style="margin-top:8px">
        <h2 style="font-size:16px;color:var(--lavender);margin-bottom:6px">Event Photos</h2>
        <div id="event-photos-${eid}"><div class="loading"><div class="spinner"></div></div></div>
    </div>`;
    app.appendChild(photoDiv);
    loadEventPhotos(eid,'event-photos-'+eid,!!activeProfile);
}

// ── Patch renderDiscover to include blind date toggle + second look ──
const _origRenderDiscover=renderDiscover;
async function renderDiscover(){
    await _origRenderDiscover();
    const app=document.getElementById('app');
    if(!app)return;
    // Blind date toggle at top
    const blindDiv=document.createElement('div');
    blindDiv.innerHTML=renderBlindDateToggle();
    const firstCard=app.querySelector('.card');
    if(firstCard)firstCard.insertAdjacentElement('beforebegin',blindDiv);
    // Second Look section at bottom
    const slDiv=document.createElement('div');
    slDiv.className='second-look-section';
    slDiv.innerHTML=`<h2>&#128260; Second Look</h2><p class="subtitle">Profiles you previously passed on</p><div id="second-look-area"></div>`;
    app.appendChild(slDiv);
    loadSecondLook('second-look-area');
}

// ── Patch viewProfilePage to show badges + dealbreaker warnings + completeness ──
const _origViewProfilePage=viewProfilePage;
async function viewProfilePage(pid,viewer){
    await _origViewProfilePage(pid,viewer);
    const v=viewer||activeProfile||'';
    const isOwner=v===pid;
    // Badges under name — inject into ms-name if present
    const nameEl=document.querySelector('.ms-name');
    if(nameEl&&!nameEl.querySelector('.profile-badges-area')){
        const badgesSpan=document.createElement('span');
        badgesSpan.id='profile-badges-area-'+pid;
        badgesSpan.className='profile-badges-area';
        nameEl.appendChild(badgesSpan);
        loadProfileBadges(pid,'profile-badges-area-'+pid);
    }
    // Dealbreaker warnings for non-owner
    if(!isOwner&&v){
        const actionsEl=document.querySelector('.ms-actions');
        if(actionsEl){
            const warnDiv=document.createElement('div');
            warnDiv.id='dealbreaker-warn-'+pid;
            actionsEl.insertAdjacentElement('beforebegin',warnDiv);
            loadDealbreakerWarnings(pid,'dealbreaker-warn-'+pid);
        }
    }
    // Profile completeness coaching for owner
    if(isOwner){
        const settingsSection=document.querySelector('.ms-section h2');
        // Find right column last section
        const rightCol=document.querySelector('.ms-right');
        if(rightCol){
            const complDiv=document.createElement('div');
            complDiv.id='completeness-area-'+pid;
            rightCol.insertAdjacentElement('afterbegin',complDiv);
            loadProfileCompleteness('completeness-area-'+pid);
        }
    }
}

// ── Patch showStoryOverlay to include reactions ──
const _origShowStoryOverlay=showStoryOverlay;
function showStoryOverlay(stories,idx,profileId,profileName,profilePhoto){
    _origShowStoryOverlay(stories,idx,profileId,profileName,profilePhoto);
    // Inject reactions row into story overlay
    const overlay=document.getElementById('story-overlay-el');
    if(!overlay)return;
    const story=stories[idx];
    if(!story)return;
    const isOwner=profileId===activeProfile;
    const reactDiv=document.createElement('div');
    reactDiv.style.cssText='position:absolute;bottom:20px;left:50%;transform:translateX(-50%);width:100%;text-align:center';
    reactDiv.innerHTML=renderStoryReactions(story.id,isOwner);
    overlay.appendChild(reactDiv);
    if(isOwner)loadStoryViewers(story.id);
}

// ── Use connectWSEnhanced in init ──
const _origInit=init;
async function init(){
    await _origInit.call(this);
    // Replace ws handlers post-init
    if(activeProfile){
        disconnectWS();
        connectWSEnhanced();
    }
}

init();
// Trigger onboarding after init for new users
if(safeGet('kindred_token','')&&!safeGet('kindred_onboarded','')){
    setTimeout(startOnboarding,1500);
}
// Load locale from storage
const _savedLocale=safeGet('kindred_locale','');
if(_savedLocale&&_savedLocale!=='en')loadTranslations(_savedLocale);
</script>
