<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kindred Admin</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<style>
:root {
    --base: #1e1e2e; --mantle: #181825; --crust: #11111b;
    --surface0: #313244; --surface1: #45475a; --surface2: #585b70;
    --overlay0: #6c7086; --overlay1: #7f849c;
    --text: #cdd6f4; --subtext0: #a6adc8; --subtext1: #bac2de;
    --lavender: #b4befe; --blue: #89b4fa; --sapphire: #74c7ec;
    --green: #a6e3a1; --peach: #fab387; --red: #f38ba8;
    --mauve: #cba6f7; --pink: #f5c2e7; --yellow: #f9e2af;
    --rosewater: #f5e0dc; --flamingo: #f2cdcd; --teal: #94e2d5;
    --radius: 12px; --shadow: 0 8px 32px rgba(0,0,0,0.4);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',system-ui,-apple-system,sans-serif; background:var(--crust); color:var(--text); min-height:100vh; }
::-webkit-scrollbar { width:8px; }
::-webkit-scrollbar-track { background:var(--mantle); }
::-webkit-scrollbar-thumb { background:var(--surface2); border-radius:4px; }

.header { background:var(--mantle); border-bottom:1px solid var(--surface0); padding:12px 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
.header h1 { font-size:22px; font-weight:700; background:linear-gradient(135deg,var(--red),var(--peach),var(--yellow)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.header .ver { color:var(--overlay0); font-size:11px; margin-left:8px; }
.header .admin-badge { background:var(--red); color:var(--crust); font-size:10px; font-weight:700; padding:3px 8px; border-radius:4px; margin-left:10px; text-transform:uppercase; letter-spacing:.5px; }
.nav-tabs { display:flex; gap:4px; flex-wrap:wrap; }
.nav-tab { background:var(--surface0); border:1px solid var(--surface1); color:var(--subtext0); padding:7px 14px; border-radius:var(--radius); cursor:pointer; font-size:13px; transition:all .2s; }
.nav-tab:hover { background:var(--surface1); color:var(--text); }
.nav-tab.active { background:var(--red); color:var(--crust); border-color:var(--red); font-weight:600; }

.container { max-width:960px; margin:0 auto; padding:24px 16px; }
.card { background:var(--base); border:1px solid var(--surface0); border-radius:var(--radius); padding:28px; margin-bottom:20px; box-shadow:var(--shadow); animation:fadeUp .4s ease forwards; opacity:0; transform:translateY(16px); }
@keyframes fadeUp { to { opacity:1; transform:translateY(0); } }
.card h2 { font-size:18px; margin-bottom:6px; color:var(--lavender); }
.card .subtitle { color:var(--overlay0); font-size:13px; margin-bottom:20px; }

.form-group { margin-bottom:16px; }
.form-group label { display:block; font-size:13px; font-weight:500; color:var(--subtext1); margin-bottom:6px; }
input[type="text"],input[type="number"],select { width:100%; padding:10px 14px; background:var(--mantle); border:1px solid var(--surface1); border-radius:8px; color:var(--text); font-size:14px; outline:none; transition:border-color .2s; }
input:focus,select:focus,textarea:focus { border-color:var(--red); }
select option { background:var(--mantle); color:var(--text); }
textarea { width:100%; min-height:80px; padding:14px; background:var(--mantle); border:1px solid var(--surface1); border-radius:8px; color:var(--text); font-size:14px; font-family:inherit; resize:vertical; outline:none; line-height:1.5; }

.btn { padding:10px 28px; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; border:none; transition:all .2s; }
.btn:active { transform:scale(.97); }
.btn-primary { background:linear-gradient(135deg,var(--red),var(--peach)); color:var(--crust); }
.btn-primary:hover { filter:brightness(1.1); }
.btn-secondary { background:var(--surface0); color:var(--subtext1); border:1px solid var(--surface1); }
.btn-secondary:hover { background:var(--surface1); }
.btn-danger { background:rgba(243,139,168,.15); color:var(--red); border:1px solid var(--red); }
.btn-danger:hover { background:rgba(243,139,168,.25); }
.btn-sm { padding:5px 12px; font-size:12px; border-radius:6px; cursor:pointer; border:none; font-weight:500; transition:all .2s; }
.btn-delete { background:var(--surface0); color:var(--red); }
.btn-delete:hover { background:rgba(243,139,168,.15); }
.btn-view { background:var(--surface0); color:var(--lavender); }
.btn-view:hover { background:var(--surface1); }
.btn-row { display:flex; gap:8px; margin-top:16px; }

/* Stats */
.stat-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
.stat-card { background:var(--mantle); border-radius:8px; padding:16px; text-align:center; }
.stat-card .num { font-size:28px; font-weight:700; color:var(--lavender); }
.stat-card .label { font-size:12px; color:var(--overlay0); margin-top:4px; }

/* Profile list */
.profile-item { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; background:var(--base); border:1px solid var(--surface0); border-radius:8px; margin-bottom:6px; transition:all .2s; }
.profile-item:hover { border-color:var(--surface2); }
.profile-item .actions { display:flex; gap:6px; }
.photo-thumb { width:36px; height:36px; border-radius:50%; object-fit:cover; border:2px solid var(--surface1); }

/* Safety reports */
.report-item { background:var(--mantle); border:1px solid var(--surface0); border-radius:8px; padding:14px; margin-bottom:8px; }
.report-item .report-type { font-size:11px; font-weight:600; text-transform:uppercase; padding:2px 8px; border-radius:4px; }
.rt-harassment { background:rgba(243,139,168,.15); color:var(--red); }
.rt-fake_profile { background:rgba(249,226,175,.15); color:var(--yellow); }
.rt-inappropriate { background:rgba(250,179,135,.15); color:var(--peach); }
.rt-other { background:var(--surface0); color:var(--overlay0); }

/* Choice cards (for feedback form) */
.choice-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.choice-card { padding:14px 16px; background:var(--surface0); border:2px solid transparent; border-radius:10px; cursor:pointer; font-size:14px; color:var(--subtext0); text-align:center; transition:all .2s; }
.choice-card:hover { background:var(--surface1); color:var(--text); }
.choice-card.selected { background:rgba(243,139,168,.12); border-color:var(--red); color:var(--red); font-weight:500; }

/* Badges */
.badge-verified { display:inline-block; background:var(--green); color:var(--crust); font-size:10px; font-weight:700; padding:2px 6px; border-radius:4px; margin-left:6px; }
.badge-energy { display:inline-block; background:var(--surface0); color:var(--subtext0); font-size:10px; padding:2px 6px; border-radius:4px; margin-left:4px; }
.badge-intent { display:inline-block; background:rgba(203,166,247,.15); color:var(--mauve); font-size:10px; padding:2px 6px; border-radius:4px; margin-left:4px; }

.section-head { font-size:14px; color:var(--subtext1); margin:20px 0 10px; font-weight:500; }
.loading { text-align:center; padding:40px; color:var(--overlay0); }
.spinner { width:28px; height:28px; border:3px solid var(--surface1); border-top-color:var(--red); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 12px; }
@keyframes spin { to { transform:rotate(360deg); } }
.empty { text-align:center; padding:48px 24px; color:var(--overlay0); }
.empty h3 { color:var(--subtext0); margin-bottom:6px; }

.toast { position:fixed; bottom:20px; right:20px; padding:12px 20px; background:var(--surface0); border:1px solid var(--surface1); border-radius:8px; color:var(--text); font-size:13px; box-shadow:var(--shadow); transform:translateY(80px); opacity:0; transition:all .3s; z-index:1000; }
.toast.show { transform:translateY(0); opacity:1; }
.toast.success { border-color:var(--green); }
.toast.error { border-color:var(--red); }

/* Profile detail modal */
.detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:12px; }
.detail-item { background:var(--mantle); border-radius:8px; padding:12px; }
.detail-item .dk { font-size:11px; color:var(--overlay0); text-transform:uppercase; letter-spacing:.5px; margin-bottom:4px; }
.detail-item .dv { font-size:14px; color:var(--text); font-weight:500; }

/* Analytics */
.analytics-cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:16px; margin-bottom:24px; }
.analytics-card { background:#313244; border-radius:12px; padding:20px; text-align:center; }
.analytics-card .value { font-size:2em; font-weight:bold; color:#cba6f7; }
.analytics-card .label { color:#a6adc8; font-size:0.85em; margin-top:4px; }
.chart-bar-container { display:flex; align-items:flex-end; gap:4px; height:200px; padding:12px 0; }
.chart-bar { flex:1; background:linear-gradient(to top,#cba6f7,#89b4fa); border-radius:4px 4px 0 0; min-width:8px; position:relative; transition:all .2s; }
.chart-bar:hover { filter:brightness(1.2); }
.chart-bar:hover::after { content:attr(data-value); position:absolute; top:-24px; left:50%; transform:translateX(-50%); background:#45475a; padding:2px 8px; border-radius:4px; font-size:12px; white-space:nowrap; }
.chart-label-row { display:flex; gap:4px; }
.chart-label-row span { flex:1; text-align:center; font-size:9px; color:var(--overlay0); min-width:8px; overflow:hidden; }

/* Content Filter */
.filter-table { width:100%; border-collapse:separate; border-spacing:0 4px; }
.filter-table th { text-align:left; font-size:11px; color:var(--overlay0); text-transform:uppercase; letter-spacing:.5px; padding:8px 12px; }
.filter-table td { padding:10px 12px; background:var(--mantle); font-size:13px; color:var(--subtext1); }
.filter-table tr td:first-child { border-radius:8px 0 0 8px; }
.filter-table tr td:last-child { border-radius:0 8px 8px 0; }
.filter-type-profanity { background:rgba(243,139,168,.15); color:var(--red); padding:2px 8px; border-radius:4px; font-size:11px; font-weight:600; }
.filter-type-spam { background:rgba(249,226,175,.15); color:var(--yellow); padding:2px 8px; border-radius:4px; font-size:11px; font-weight:600; }
.filter-type-other { background:var(--surface0); color:var(--overlay0); padding:2px 8px; border-radius:4px; font-size:11px; font-weight:600; }
.matched-highlight { background:rgba(243,139,168,.2); color:var(--red); padding:1px 4px; border-radius:3px; font-weight:500; }

/* Health status */
.health-dot { width:10px; height:10px; border-radius:50%; display:inline-block; margin-right:8px; flex-shrink:0; }
.health-dot.ok { background:var(--green); box-shadow:0 0 6px var(--green); }
.health-dot.err { background:var(--red); box-shadow:0 0 6px var(--red); }
.health-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px; margin-top:12px; }
.health-item { background:var(--mantle); border-radius:8px; padding:12px 14px; display:flex; flex-direction:column; gap:2px; }
.health-item .hk { font-size:11px; color:var(--overlay0); text-transform:uppercase; letter-spacing:.5px; }
.health-item .hv { font-size:14px; color:var(--text); font-weight:500; }

/* Generic admin table */
.admin-table { width:100%; border-collapse:separate; border-spacing:0 4px; }
.admin-table th { text-align:left; font-size:11px; color:var(--overlay0); text-transform:uppercase; letter-spacing:.5px; padding:8px 12px; }
.admin-table td { padding:10px 12px; background:var(--mantle); font-size:13px; color:var(--subtext1); vertical-align:middle; }
.admin-table tr td:first-child { border-radius:8px 0 0 8px; }
.admin-table tr td:last-child { border-radius:0 8px 8px 0; }
.admin-table tr:hover td { background:var(--surface0); }

/* Story thumb */
.story-thumb { width:48px; height:48px; border-radius:6px; object-fit:cover; border:2px solid var(--surface1); }

/* Confirmation modal */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.65); z-index:500; display:flex; align-items:center; justify-content:center; }
.modal-box { background:var(--base); border:1px solid var(--surface0); border-radius:var(--radius); padding:28px; max-width:420px; width:90%; box-shadow:var(--shadow); }
.modal-box h3 { color:var(--lavender); margin-bottom:10px; }
.modal-box p { color:var(--subtext1); font-size:14px; margin-bottom:20px; line-height:1.5; }
.modal-actions { display:flex; gap:10px; justify-content:flex-end; }

/* i18n locale list */
.locale-item { display:flex; align-items:center; justify-content:space-between; padding:10px 14px; background:var(--mantle); border-radius:8px; margin-bottom:6px; font-size:14px; }
.locale-default { background:rgba(166,227,161,.12); border:1px solid var(--green); color:var(--green); font-size:10px; font-weight:700; padding:2px 8px; border-radius:4px; text-transform:uppercase; }

@media(max-width:600px) {
    .container{padding:12px;}
    .card{padding:16px;}
    .stat-grid{grid-template-columns:1fr;}
    .detail-grid{grid-template-columns:1fr;}
    .header{flex-wrap:wrap;gap:8px;padding:10px 12px;}
    .nav-tabs{width:100%;justify-content:center;}
    .health-grid{grid-template-columns:1fr 1fr;}
}

/* Rate Limits */
.rate-table { width:100%; border-collapse:separate; border-spacing:0 4px; }
.rate-table th { text-align:left; font-size:11px; color:var(--overlay0); text-transform:uppercase; letter-spacing:.5px; padding:8px 12px; }
.rate-table td { padding:10px 12px; background:var(--mantle); font-size:13px; color:var(--subtext1); vertical-align:middle; }
.rate-table tr td:first-child { border-radius:8px 0 0 8px; }
.rate-table tr td:last-child { border-radius:0 8px 8px 0; }
.rate-table tr:hover td { background:var(--surface0); }
.rate-bar-wrap { width:120px; background:var(--surface0); border-radius:4px; height:8px; overflow:hidden; }
.rate-bar { height:8px; border-radius:4px; transition:width .4s; }
.rate-green { background:var(--green); }
.rate-yellow { background:var(--yellow); }
.rate-red { background:var(--red); }
.rate-badge-green { background:rgba(166,227,161,.15); color:var(--green); padding:2px 8px; border-radius:4px; font-size:11px; font-weight:600; }
.rate-badge-yellow { background:rgba(249,226,175,.15); color:var(--yellow); padding:2px 8px; border-radius:4px; font-size:11px; font-weight:600; }
.rate-badge-red { background:rgba(243,139,168,.15); color:var(--red); padding:2px 8px; border-radius:4px; font-size:11px; font-weight:600; }

/* Vacuum / DB Maintenance */
.vacuum-row { display:flex; align-items:center; justify-content:space-between; background:var(--mantle); border-radius:8px; padding:14px 16px; margin-bottom:8px; }
.vacuum-row .vk { font-size:11px; color:var(--overlay0); text-transform:uppercase; letter-spacing:.5px; margin-bottom:3px; }
.vacuum-row .vv { font-size:14px; color:var(--text); font-weight:500; }

/* Audit Log */
.audit-table { width:100%; border-collapse:separate; border-spacing:0 4px; }
.audit-table th { text-align:left; font-size:11px; color:var(--overlay0); text-transform:uppercase; letter-spacing:.5px; padding:8px 12px; }
.audit-table td { padding:10px 12px; background:var(--mantle); font-size:13px; color:var(--subtext1); vertical-align:middle; }
.audit-table tr td:first-child { border-radius:8px 0 0 8px; }
.audit-table tr td:last-child { border-radius:0 8px 8px 0; }
.audit-table tr:hover td { background:var(--surface0); }
.audit-action { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:600; text-transform:uppercase; }
.audit-action-delete { background:rgba(243,139,168,.15); color:var(--red); }
.audit-action-create { background:rgba(166,227,161,.15); color:var(--green); }
.audit-action-update { background:rgba(137,180,250,.15); color:var(--blue); }
.audit-action-login { background:rgba(203,166,247,.15); color:var(--mauve); }
.audit-action-other { background:var(--surface0); color:var(--overlay0); }
.audit-pagination { display:flex; align-items:center; gap:8px; margin-top:16px; justify-content:flex-end; }

/* Webhooks */
.webhook-item { background:var(--mantle); border:1px solid var(--surface0); border-radius:8px; padding:14px 16px; margin-bottom:8px; }
.webhook-item.disabled { opacity:.55; }
.webhook-url { font-family:monospace; font-size:12px; color:var(--yellow); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:360px; }
.webhook-events { display:flex; gap:4px; flex-wrap:wrap; margin-top:6px; }
.webhook-event-tag { background:var(--surface0); color:var(--subtext0); font-size:10px; padding:2px 7px; border-radius:4px; }
.toggle-switch { position:relative; display:inline-block; width:36px; height:20px; cursor:pointer; }
.toggle-switch input { opacity:0; width:0; height:0; }
.toggle-slider { position:absolute; inset:0; background:var(--surface1); border-radius:20px; transition:.2s; }
.toggle-slider::before { content:''; position:absolute; width:14px; height:14px; left:3px; top:3px; background:var(--overlay0); border-radius:50%; transition:.2s; }
.toggle-switch input:checked+.toggle-slider { background:var(--green); }
.toggle-switch input:checked+.toggle-slider::before { transform:translateX(16px); background:var(--crust); }
.wh-form { background:var(--mantle); border-radius:8px; padding:18px; margin-top:16px; }
.wh-form h3 { font-size:15px; color:var(--lavender); margin-bottom:14px; }
.cb-group { display:flex; flex-wrap:wrap; gap:10px; }
.cb-label { display:flex; align-items:center; gap:6px; font-size:13px; color:var(--subtext1); cursor:pointer; }
.cb-label input[type=checkbox] { accent-color:var(--red); width:14px; height:14px; cursor:pointer; }

/* Email Templates */
.tpl-item { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; background:var(--mantle); border-radius:8px; margin-bottom:6px; cursor:pointer; transition:background .2s; }
.tpl-item:hover { background:var(--surface0); }
.tpl-item .tpl-name { font-size:14px; font-weight:500; color:var(--text); }
.tpl-item .tpl-desc { font-size:12px; color:var(--overlay0); margin-top:2px; }
.tpl-preview-modal { position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:600; display:flex; align-items:center; justify-content:center; padding:20px; }
.tpl-preview-box { background:var(--base); border:1px solid var(--surface0); border-radius:var(--radius); width:100%; max-width:680px; max-height:90vh; display:flex; flex-direction:column; box-shadow:var(--shadow); }
.tpl-preview-header { display:flex; align-items:center; justify-content:space-between; padding:16px 20px; border-bottom:1px solid var(--surface0); }
.tpl-preview-header h3 { color:var(--lavender); font-size:15px; }
.tpl-preview-iframe { flex:1; border:none; border-radius:0 0 var(--radius) var(--radius); min-height:400px; background:#fff; }
.user-search-bar{display:flex;gap:8px;margin-bottom:16px}
.user-search-bar input{flex:1;padding:10px 14px;border-radius:var(--radius);border:1px solid var(--surface2);background:var(--surface0);color:var(--text);font-size:14px}
.user-search-bar button{padding:10px 20px;border-radius:var(--radius);background:var(--accent);color:var(--base);border:none;cursor:pointer;font-weight:600}
.user-table{width:100%;border-collapse:collapse}
.user-table th,.user-table td{padding:8px 12px;text-align:left;border-bottom:1px solid var(--surface1)}
.user-table th{color:var(--subtext0);font-size:12px;text-transform:uppercase}
.user-table tr:hover{background:var(--surface0)}
.user-table .clickable{cursor:pointer;color:var(--accent);text-decoration:underline}
.user-detail-card{background:var(--surface0);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.user-detail-card h3{margin:0 0 12px;color:var(--accent)}
.user-detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.user-detail-grid .stat-item{background:var(--base);padding:12px;border-radius:8px}
.user-detail-grid .stat-item label{display:block;font-size:11px;color:var(--subtext0);text-transform:uppercase;margin-bottom:4px}
.user-detail-grid .stat-item span{font-size:18px;font-weight:700;color:var(--text)}
.user-sessions-table{width:100%;border-collapse:collapse;margin-top:8px}
.user-sessions-table th,.user-sessions-table td{padding:6px 10px;text-align:left;border-bottom:1px solid var(--surface1);font-size:13px}
.ann-form{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;background:var(--surface0);padding:16px;border-radius:var(--radius)}
.ann-form input,.ann-form textarea,.ann-form select{padding:8px 12px;border-radius:8px;border:1px solid var(--surface2);background:var(--base);color:var(--text)}
.ann-form textarea{min-height:60px;resize:vertical}
.ann-form button{align-self:flex-start;padding:8px 20px;border-radius:8px;background:var(--accent);color:var(--base);border:none;cursor:pointer;font-weight:600}
.ann-item{background:var(--surface0);border-radius:var(--radius);padding:14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.ann-item .ann-content{flex:1}
.ann-item .ann-title{font-weight:600;color:var(--text)}
.ann-item .ann-body{font-size:13px;color:var(--subtext0);margin-top:4px}
.ann-item .ann-meta{font-size:11px;color:var(--overlay0);margin-top:4px}
.ann-type{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.ann-type-info{background:var(--blue);color:var(--base)}
.ann-type-warning{background:var(--yellow);color:var(--base)}
.ann-type-maintenance{background:var(--peach);color:var(--base)}
</style>
</head>
<body>
<div class="header">
    <div style="display:flex;align-items:baseline"><h1>Kindred</h1><span class="ver">v2.0.0</span><span class="admin-badge">Admin</span></div>
    <div class="nav-tabs" id="nav"></div>
</div>
<div class="container" id="app"></div>
<div class="toast" id="toast"></div>

<script>
const API='';
let adminToken=null;

const TABS=[
    {id:'dashboard',label:'Dashboard'},
    {id:'profiles',label:'Profiles'},
    {id:'groups',label:'Groups'},
    {id:'events',label:'Events'},
    {id:'verify',label:'Verifications'},
    {id:'safety',label:'Safety Reports'},
    {id:'stories',label:'Stories'},
    {id:'sessions',label:'Sessions'},
    {id:'backups',label:'Backups'},
    {id:'invites',label:'Invites'},
    {id:'feedback',label:'Feedback'},
    {id:'analytics',label:'Analytics'},
    {id:'contentfilter',label:'Content Filter'},
    {id:'i18n',label:'i18n'},
    {id:'ratelimits',label:'Rate Limits'},
    {id:'auditlog',label:'Audit Log'},
    {id:'webhooks',label:'Webhooks'},
    {id:'emailtemplates',label:'Email Templates'},
    {id:'users',label:'Users'},
    {id:'announcements',label:'Announcements'},
];

function adminHeaders(){
    const h={'Content-Type':'application/json'};
    if(adminToken) h['Authorization']='Bearer '+adminToken;
    return h;
}
async function adminFetch(url,opts={}){
    if(!opts.headers) opts.headers=adminHeaders();
    else if(adminToken) opts.headers={...opts.headers,'Authorization':'Bearer '+adminToken};
    const r=await fetch(url,opts);
    if(r.status===401||r.status===403){adminToken=null;localStorage.removeItem('kindred_admin_token');showLoginScreen();throw new Error('Auth required');}
    return r;
}

function renderNav(){
    let navHtml=TABS.map(t=>`<button class="nav-tab" data-v="${t.id}" onclick="showView('${t.id}')">${t.label}</button>`).join('');
    navHtml+=`<button class="nav-tab" onclick="adminLogout()" style="color:var(--red)">Log Out</button>`;
    document.getElementById('nav').innerHTML=navHtml;
}

function showView(v){
    if(window._rateLimitTimer) clearInterval(window._rateLimitTimer);
    if(!adminToken){showLoginScreen();return;}
    document.querySelectorAll('.nav-tab').forEach(t=>t.classList.toggle('active',t.dataset.v===v));
    if(v==='dashboard')renderDashboard();
    else if(v==='profiles')renderProfiles();
    else if(v==='groups')renderGroups();
    else if(v==='events')renderEvents();
    else if(v==='verify')renderVerifications();
    else if(v==='safety')renderSafety();
    else if(v==='invites')renderInvites();
    else if(v==='feedback')renderFeedback();
    else if(v==='analytics')renderAnalytics();
    else if(v==='contentfilter')renderContentFilter();
    else if(v==='stories')renderStories();
    else if(v==='sessions')renderSessions();
    else if(v==='backups')renderBackups();
    else if(v==='i18n')renderI18n();
    else if(v==='ratelimits')renderRateLimits();
    else if(v==='auditlog')renderAuditLog();
    else if(v==='webhooks')renderWebhooks();
    else if(v==='emailtemplates')renderEmailTemplates();
    else if(v==='users') renderUsers();
    else if(v==='announcements') renderAnnouncements();
}

function showLoginScreen(){
    document.getElementById('nav').innerHTML='';
    document.getElementById('app').innerHTML=`<div class="card" style="max-width:400px;margin:60px auto;text-align:center">
        <h2 style="background:linear-gradient(135deg,var(--red),var(--peach));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-size:24px">Admin Login</h2>
        <p class="subtitle">Kindred Administration Portal</p>
        <div style="text-align:left">
            <div class="form-group"><label>Email</label><input type="text" id="admin-email" placeholder="admin@kindred.local" value="admin@kindred.local" onkeydown="if(event.key==='Enter')doAdminLogin()"></div>
            <div class="form-group"><label>Password</label><input type="password" id="admin-pass" placeholder="Password" onkeydown="if(event.key==='Enter')doAdminLogin()"></div>
            <button class="btn btn-primary" onclick="doAdminLogin()" style="width:100%;margin-top:8px">Sign In</button>
            <div id="admin-error" style="color:var(--red);font-size:13px;margin-top:10px;text-align:center"></div>
        </div>
    </div>`;
    setTimeout(()=>{const el=document.getElementById('admin-pass');if(el)el.focus();},50);
}

async function doAdminLogin(){
    const email=document.getElementById('admin-email')?.value?.trim();
    const pass=document.getElementById('admin-pass')?.value;
    const errEl=document.getElementById('admin-error');
    if(!email||!pass){errEl.textContent='Email and password required';return;}
    try{
        const r=await fetch(API+'/api/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pass})});
        const d=await r.json();
        if(!r.ok){errEl.textContent=d.detail||'Login failed';return;}
        adminToken=d.token;
        localStorage.setItem('kindred_admin_token',adminToken);
        toast('Welcome, '+d.display_name,'success');
        renderNav();
        showView('dashboard');
    }catch(e){errEl.textContent='Connection error';}
}

function adminLogout(){
    adminToken=null;
    localStorage.removeItem('kindred_admin_token');
    showLoginScreen();
}

// ─── Dashboard ───
let _healthTimer=null;
async function renderDashboard(){
    const app=document.getElementById('app');
    app.innerHTML='<div class="loading"><div class="spinner"></div>Loading stats...</div>';
    try{
        const [r,pmr]=await Promise.all([adminFetch(API+'/api/admin/stats'),adminFetch(API+'/api/admin/photo-moderation').then(r=>r.json()).catch(()=>({pending:[]}))]); const s=await r.json(); const pendingPhotos=(pmr.pending||pmr.photos||[]).length||0;
        let html=`<div id="health-card"></div>`;
        html+=`<div class="card"><h2>Platform Overview</h2><p class="subtitle">Real-time platform statistics</p>
        <div class="stat-grid">
            <div class="stat-card"><div class="num">${s.profiles}</div><div class="label">Profiles</div></div>
            <div class="stat-card"><div class="num">${s.messages}</div><div class="label">Messages</div></div>
            <div class="stat-card"><div class="num">${s.dates_reported||0}</div><div class="label">Dates Reported</div></div>
            <div class="stat-card"><div class="num">${s.feedback||0}</div><div class="label">Feedback</div></div>
            <div class="stat-card"><div class="num">${s.avg_rating||'--'}</div><div class="label">Avg Rating</div></div>
            <div class="stat-card"><div class="num">${s.date_plans||0}</div><div class="label">Date Plans</div></div>
            <div class="stat-card"><div class="num">${s.dates_completed||0}</div><div class="label">Dates Done</div></div>
            <div class="stat-card"><div class="num">${s.safety_reports||0}</div><div class="label">Safety Reports</div></div>
            <div class="stat-card"><div class="num">${s.groups||0}</div><div class="label">Groups</div></div>
            <div class="stat-card"><div class="num">${s.events||0}</div><div class="label">Events</div></div>
            <div class="stat-card"><div class="num" style="color:${pendingPhotos>0?'var(--yellow)':'var(--green)'}">${pendingPhotos}</div><div class="label">Photos Pending</div></div>
            <div class="stat-card" id="dash-sessions-stat"><div class="num">--</div><div class="label">Active Sessions</div></div>
            <div class="stat-card"><div class="num" style="color:var(--green);font-size:16px">Puter.js</div><div class="label">Narratives</div></div>
        </div>`;

        if(Object.keys(s.gender_distribution||{}).length){
            html+=`<div class="section-head">Gender Distribution</div><div style="display:flex;gap:12px;flex-wrap:wrap">${Object.entries(s.gender_distribution).map(([g,c])=>`<div class="stat-card" style="flex:1;min-width:100px"><div class="num">${c}</div><div class="label">${g}</div></div>`).join('')}</div>`;
        }
        if(Object.keys(s.age_distribution||{}).length){
            html+=`<div class="section-head">Age Distribution</div><div style="display:flex;gap:12px;flex-wrap:wrap">${Object.entries(s.age_distribution).map(([a,c])=>`<div class="stat-card" style="flex:1;min-width:80px"><div class="num">${c}</div><div class="label">${a}</div></div>`).join('')}</div>`;
        }

        html+=`<div class="section-head">Quick Actions</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
            <button class="btn btn-primary" onclick="showView('profiles')">Manage Profiles</button>
            <button class="btn btn-secondary" onclick="showView('safety')">View Safety Reports</button>
            <button class="btn btn-secondary" onclick="showView('sessions')">Active Sessions</button>
            <button class="btn btn-secondary" onclick="showView('invites')">Manage Invites</button>
            <button class="btn btn-secondary" onclick="showView('feedback')">Submit Feedback</button>
        </div>`;

        html+=`</div>`;
        app.innerHTML=html;
        // Load health card and session count in parallel, non-blocking
        loadHealthCard();
        adminFetch(API+'/api/admin/sessions').then(r=>r.json()).then(d=>{
            const el=document.getElementById('dash-sessions-stat');
            if(el) el.innerHTML=`<div class="num" style="color:var(--teal)">${(d.sessions||[]).length}</div><div class="label">Active Sessions</div>`;
        }).catch(()=>{});
        // Auto-refresh health every 60s while on dashboard
        if(_healthTimer) clearInterval(_healthTimer);
        _healthTimer=setInterval(()=>{if(document.getElementById('health-card')) loadHealthCard(); else clearInterval(_healthTimer);},60000);
    }catch(e){app.innerHTML='<div class="empty"><h3>Error loading dashboard</h3><p>Make sure the admin server is running on port 8001</p></div>';}
}

async function loadHealthCard(){
    const slot=document.getElementById('health-card');
    if(!slot) return;
    try{
        const h=await adminFetch(API+'/api/health').then(r=>r.json());
        const ok=h.status==='ok'||h.status==='healthy'||h.status==='up';
        slot.innerHTML=`<div class="card" style="margin-bottom:20px">
            <h2 style="display:flex;align-items:center"><span class="health-dot ${ok?'ok':'err'}"></span>Server Health</h2>
            <p class="subtitle">Auto-refreshes every 60 seconds</p>
            <div class="health-grid">
                <div class="health-item"><div class="hk">Status</div><div class="hv" style="color:${ok?'var(--green)':'var(--red)'}">${escHtml(h.status||'unknown')}</div></div>
                <div class="health-item"><div class="hk">Uptime</div><div class="hv">${escHtml(h.uptime!=null?fmtUptime(h.uptime):(h.uptime_str||'--'))}</div></div>
                <div class="health-item"><div class="hk">Database Size</div><div class="hv">${escHtml(h.db_size_mb!=null?h.db_size_mb.toFixed(2)+' MB':(h.db_size||'--'))}</div></div>
                <div class="health-item"><div class="hk">Connections</div><div class="hv">${escHtml(String(h.active_connections!=null?h.active_connections:(h.connections||'--')))}</div></div>
                <div class="health-item"><div class="hk">Python</div><div class="hv">${escHtml(h.python_version||h.python||'--')}</div></div>
            </div>
        </div>`;
    }catch(e){
        slot.innerHTML=`<div class="card" style="margin-bottom:20px"><h2 style="display:flex;align-items:center"><span class="health-dot err"></span>Server Health</h2><p style="color:var(--overlay0);font-size:13px">Health endpoint unavailable</p></div>`;
    }
}

function fmtUptime(sec){
    if(typeof sec!=='number') return String(sec);
    const d=Math.floor(sec/86400),h=Math.floor((sec%86400)/3600),m=Math.floor((sec%3600)/60),s=Math.floor(sec%60);
    if(d>0) return `${d}d ${h}h ${m}m`;
    if(h>0) return `${h}h ${m}m`;
    return `${m}m ${s}s`;
}

// ─── Profiles ───
async function renderProfiles(){
    const app=document.getElementById('app');
    app.innerHTML='<div class="loading"><div class="spinner"></div>Loading profiles...</div>';
    try{
        const r=await adminFetch(API+'/api/profiles');const ps=await r.json();
        if(!ps.length){app.innerHTML='<div class="empty"><h3>No profiles yet</h3><p>Users need to register on the user portal (port 8000).</p></div>';return;}
        let html=`<div class="card"><h2>All Profiles</h2><p class="subtitle">${ps.length} registered profile${ps.length!==1?'s':''}</p>`;
        html+=ps.map(p=>{
            const badges=[];
            if(p.verified) badges.push('<span class="badge-verified">Verified</span>');
            if(p.dating_energy) badges.push(`<span class="badge-energy">${p.dating_energy}</span>`);
            if(p.relationship_intent) badges.push(`<span class="badge-intent">${p.relationship_intent}</span>`);
            return `<div class="profile-item">
                <div style="display:flex;align-items:center;gap:10px">
                    ${p.photo?`<img src="/uploads/${p.photo}" class="photo-thumb">`:'<div style="width:36px;height:36px;border-radius:50%;background:var(--surface0);display:flex;align-items:center;justify-content:center;color:var(--overlay0)">?</div>'}
                    <div><strong>${escHtml(p.name)}</strong>${badges.join('')}<br>
                    <span style="color:var(--overlay0);font-size:12px">${p.age} - ${p.gender} seeking ${p.seeking} - ${new Date(p.created_at).toLocaleDateString()}</span></div>
                </div>
                <div class="actions">
                    <button class="btn-sm btn-view" onclick="viewProfile('${p.id}')">Inspect</button>
                    <button class="btn-sm btn-delete" onclick="delProfile('${p.id}','${escHtml(p.name)}')">Delete</button>
                </div>
            </div>`;
        }).join('');
        html+=`</div>`;
        app.innerHTML=html;
    }catch(e){app.innerHTML='<div class="empty"><h3>Error loading profiles</h3></div>';}
}

async function viewProfile(id){
    const app=document.getElementById('app');
    app.innerHTML='<div class="loading"><div class="spinner"></div>Loading profile...</div>';
    try{
        const [pr,br,fr,cr]=await Promise.all([
            adminFetch(API+'/api/profile/'+id).then(r=>r.json()),
            adminFetch(API+'/api/profile/'+id+'/blog').then(r=>r.json()),
            adminFetch(API+'/api/profile/'+id+'/friends').then(r=>r.json()),
            adminFetch(API+'/api/profile/'+id+'/comments').then(r=>r.json()),
        ]);
        let html=`<div class="card"><button class="btn btn-secondary" onclick="renderProfiles()" style="margin-bottom:16px;font-size:12px;padding:6px 12px">Back to Profiles</button>
        <h2>${escHtml(pr.name)}</h2><p class="subtitle">Profile ID: ${pr.id}</p>`;

        // Photo
        if(pr.photo) html+=`<div style="margin-bottom:16px"><img src="/uploads/${pr.photo}" style="width:120px;height:120px;border-radius:8px;object-fit:cover;border:3px solid var(--surface1)"></div>`;

        // Basic info
        html+=`<div class="detail-grid">
            <div class="detail-item"><div class="dk">Age</div><div class="dv">${pr.age}</div></div>
            <div class="detail-item"><div class="dk">Gender</div><div class="dv">${pr.gender}</div></div>
            <div class="detail-item"><div class="dk">Seeking</div><div class="dv">${pr.seeking}</div></div>
            <div class="detail-item"><div class="dk">Attachment</div><div class="dv">${typeof pr.attachment==='string'?pr.attachment:JSON.stringify(pr.attachment||{})}</div></div>
            <div class="detail-item"><div class="dk">Love Language</div><div class="dv">${pr.love_language||'--'}</div></div>
            <div class="detail-item"><div class="dk">Dating Energy</div><div class="dv">${pr.dating_energy||'--'}</div></div>
            <div class="detail-item"><div class="dk">Relationship Intent</div><div class="dv">${pr.relationship_intent||'--'}</div></div>
            <div class="detail-item"><div class="dk">Dating Pace</div><div class="dv">${pr.dating_pace||'--'}</div></div>
            <div class="detail-item"><div class="dk">Created</div><div class="dv">${new Date(pr.created_at).toLocaleString()}</div></div>
            <div class="detail-item"><div class="dk">Verified</div><div class="dv">${pr.verified?'Yes':'No'}</div></div>
        </div>`;

        // Big Five
        if(pr.big_five&&Object.keys(pr.big_five).length){
            html+=`<div class="section-head">Big Five Personality</div><div class="detail-grid">${Object.entries(pr.big_five).map(([t,v])=>`<div class="detail-item"><div class="dk">${t}</div><div class="dv">${Math.round(v*100)}%</div></div>`).join('')}</div>`;
        }

        // Values
        if(pr.values&&Object.keys(pr.values).length){
            html+=`<div class="section-head">Values</div><div class="detail-grid">${Object.entries(pr.values).map(([k,v])=>`<div class="detail-item"><div class="dk">${k}</div><div class="dv">${v}</div></div>`).join('')}</div>`;
        }

        // Communication
        if(pr.communication_style&&Object.keys(pr.communication_style).length){
            html+=`<div class="section-head">Communication Style</div><div class="detail-grid">${Object.entries(pr.communication_style).map(([k,v])=>`<div class="detail-item"><div class="dk">${k.replace(/_/g,' ')}</div><div class="dv">${v}</div></div>`).join('')}</div>`;
        }

        // Financial
        if(pr.financial_values&&Object.keys(pr.financial_values).length){
            html+=`<div class="section-head">Financial Values</div><div class="detail-grid">${Object.entries(pr.financial_values).map(([k,v])=>`<div class="detail-item"><div class="dk">${k.replace(/_/g,' ')}</div><div class="dv">${v}</div></div>`).join('')}</div>`;
        }

        // Dealbreakers
        if(pr.dealbreakers&&pr.dealbreakers.length){
            html+=`<div class="section-head">Dealbreakers</div><div style="display:flex;gap:6px;flex-wrap:wrap">${pr.dealbreakers.map(d=>`<span style="background:rgba(243,139,168,.12);color:var(--red);padding:4px 10px;border-radius:6px;font-size:12px">${d}</span>`).join('')}</div>`;
        }

        // Self-disclosure
        if(pr.self_disclosure&&Object.keys(pr.self_disclosure).length){
            html+=`<div class="section-head">Self-Disclosure</div><div class="detail-grid">${Object.entries(pr.self_disclosure).map(([k,v])=>`<div class="detail-item"><div class="dk">${k}</div><div class="dv">${v}</div></div>`).join('')}</div>`;
        }

        // Open-ended
        if(pr.open_ended&&Object.keys(pr.open_ended).length){
            html+=`<div class="section-head">Open-Ended Responses</div>`;
            for(const [k,v] of Object.entries(pr.open_ended)){
                html+=`<div style="background:var(--mantle);padding:12px;border-radius:8px;margin-bottom:8px"><div style="font-size:11px;color:var(--overlay0);text-transform:uppercase;margin-bottom:4px">${k}</div><div style="font-size:13px;color:var(--subtext1);line-height:1.5;white-space:pre-wrap">${escHtml(String(v))}</div></div>`;
            }
        }

        // Friends
        html+=`<div class="section-head">Friends (${fr.friends?.length||0})</div>`;
        if(fr.friends&&fr.friends.length){
            html+=fr.friends.map(f=>`<span style="display:inline-block;background:var(--mantle);padding:4px 10px;border-radius:6px;font-size:12px;margin:2px">${f.name}</span>`).join('');
        } else { html+=`<span style="color:var(--overlay0);font-size:13px">No friends</span>`; }

        // Blog posts
        html+=`<div class="section-head">Blog Posts (${br.posts?.length||0})</div>`;
        if(br.posts&&br.posts.length){
            for(const p of br.posts){
                html+=`<div style="background:var(--mantle);padding:12px;border-radius:8px;margin-bottom:8px"><strong>${escHtml(p.title)}</strong><div style="font-size:11px;color:var(--overlay0)">${new Date(p.created_at).toLocaleString()}</div><div style="font-size:13px;color:var(--subtext1);margin-top:4px;white-space:pre-wrap">${escHtml(p.content)}</div></div>`;
            }
        } else { html+=`<span style="color:var(--overlay0);font-size:13px">No posts</span>`; }

        // Comments
        html+=`<div class="section-head">Profile Comments (${cr.comments?.length||0})</div>`;
        if(cr.comments&&cr.comments.length){
            for(const c of cr.comments){
                html+=`<div style="background:var(--mantle);padding:10px;border-radius:8px;margin-bottom:6px"><strong style="color:var(--mauve);font-size:13px">${escHtml(c.from_name)}</strong> <span style="font-size:11px;color:var(--overlay0)">${new Date(c.created_at).toLocaleString()}</span><div style="font-size:13px;color:var(--subtext1);margin-top:4px">${escHtml(c.content)}</div></div>`;
            }
        } else { html+=`<span style="color:var(--overlay0);font-size:13px">No comments</span>`; }

        html+=`<div class="btn-row" style="margin-top:20px"><button class="btn btn-danger" onclick="delProfile('${pr.id}','${escHtml(pr.name)}')">Delete This Profile</button></div>`;
        html+=`</div>`;
        app.innerHTML=html;
    }catch(e){app.innerHTML='<div class="empty"><h3>Error loading profile</h3></div>';console.error(e);}
}

async function delProfile(id,name){
    if(!confirm('Delete profile "'+name+'"? This cannot be undone.'))return;
    await adminFetch(API+'/api/profile/'+id,{method:'DELETE'});
    toast('Profile deleted','success');
    renderProfiles();
}

// ─── Safety Reports ───
async function renderSafety(){
    const app=document.getElementById('app');
    app.innerHTML='<div class="loading"><div class="spinner"></div>Loading safety reports...</div>';
    try{
        const r=await adminFetch(API+'/api/admin/safety-reports');const d=await r.json();
        if(!d.reports||!d.reports.length){app.innerHTML='<div class="card"><h2>Safety Reports</h2><div class="empty"><h3>No safety reports</h3><p>No users have filed any reports yet.</p></div></div>';return;}
        let html=`<div class="card"><h2>Safety Reports</h2><p class="subtitle">${d.reports.length} report${d.reports.length!==1?'s':''} filed</p>`;
        for(const rp of d.reports){
            const rtClass='rt-'+(rp.report_type||'other');
            html+=`<div class="report-item">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
                    <div><strong style="color:var(--text)">${escHtml(rp.reporter_name)}</strong> <span style="color:var(--overlay0);font-size:12px">reported</span> <strong style="color:var(--red)">${escHtml(rp.reported_name)}</strong></div>
                    <span class="report-type ${rtClass}">${rp.report_type||'unknown'}</span>
                </div>
                ${rp.notes?`<div style="font-size:13px;color:var(--subtext1);line-height:1.5">${escHtml(rp.notes)}</div>`:''}
                <div style="font-size:11px;color:var(--overlay0);margin-top:6px">${new Date(rp.created_at).toLocaleString()}</div>
                <div style="margin-top:8px;display:flex;gap:6px">
                    <button class="btn-sm btn-view" onclick="viewProfile('${rp.reporter_id}')">View Reporter</button>
                    <button class="btn-sm btn-view" onclick="viewProfile('${rp.reported_id}')">View Reported</button>
                    <button class="btn-sm btn-delete" onclick="delProfile('${rp.reported_id}','${escHtml(rp.reported_name)}')">Delete Reported</button>
                </div>
            </div>`;
        }
        html+=`</div>`;
        app.innerHTML=html;
    }catch(e){app.innerHTML='<div class="empty"><h3>Error loading safety reports</h3></div>';console.error(e);}
}

// ─── Invites ───
async function renderInvites(){
    const app=document.getElementById('app');
    app.innerHTML='<div class="loading"><div class="spinner"></div>Loading invites...</div>';
    try{
        const r=await adminFetch(API+'/api/invites');const d=await r.json();
        let html=`<div class="card"><h2>Invite Codes</h2><p class="subtitle">Generate and track invite codes</p>
        <div style="margin-bottom:16px"><button class="btn btn-primary" onclick="genInvite()">Generate New Invite Code</button></div>`;

        if(d.invites&&d.invites.length){
            const available=d.invites.filter(i=>!i.used_by).length;
            const used=d.invites.filter(i=>i.used_by).length;

async function submitFeedback(){
    const a=document.getElementById('fb-a')?.value;
    const b=document.getElementById('fb-b')?.value;
    if(!a||!b){toast('Select both profiles','error');return;}
    const wentOnDate=document.getElementById('fb-date-yes')?.classList.contains('selected')||false;
    const rating=parseInt(document.getElementById('fb-rating')?.value)||null;
    const safetyRating=parseInt(document.getElementById('fb-safety')?.value)||null;
    const wouldMeetAgain=document.getElementById('fb-again-yes')?.classList.contains('selected')?true:document.getElementById('fb-again-no')?.classList.contains('selected')?false:null;
    const notes=document.getElementById('fb-notes')?.value||null;
    await adminFetch(API+'/api/feedback',{method:'POST',headers:adminHeaders(),body:JSON.stringify({profile_a:a,profile_b:b,went_on_date:wentOnDate,rating,safety_rating:safetyRating,would_meet_again:wouldMeetAgain,notes})});
    toast('Feedback submitted','success');

    try{
        const r=await adminFetch(API+'/api/admin/content-filter-log');const d=await r.json();
        const logs=d.logs||d.entries||[];
        if(!logs.length){app.innerHTML='<div class="card"><h2>Content Filter Log</h2><div class="empty"><h3>No flagged content</h3><p>No content has been flagged by the filter yet.</p></div></div>';return;}
        let html=`<div class="card"><h2>Content Filter Log</h2><p class="subtitle">${logs.length} flagged item${logs.length!==1?'s':''}</p>
        <div style="overflow-x:auto"><table class="filter-table"><thead><tr>
            <th>Time</th><th>User</th><th>Type</th><th>Matched Text</th><th>Action</th>
        </tr></thead><tbody>`;
        for(const entry of logs){
            const typeClass=entry.type==='profanity'?'filter-type-profanity':entry.type==='spam'?'filter-type-spam':'filter-type-other';
            const matched=entry.matched||entry.matched_text||'';
            const originalText=entry.text||entry.original_text||'';
            let displayText=escHtml(originalText);
            if(matched){
                const safeMatched=escHtml(matched);
                displayText=displayText.replace(new RegExp(safeMatched.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),m=>`<span class="matched-highlight">${m}</span>`);
            }
            html+=`<tr>
                <td style="white-space:nowrap;font-size:12px;color:var(--overlay0)">${entry.time||entry.created_at?new Date(entry.time||entry.created_at).toLocaleString():'--'}</td>
                <td><strong>${escHtml(entry.user||entry.user_name||'Unknown')}</strong></td>
                <td><span class="${typeClass}">${entry.type||'unknown'}</span></td>
                <td style="max-width:300px;overflow:hidden;text-overflow:ellipsis">${displayText||'--'}</td>
                <td style="font-size:12px">${escHtml(entry.action||entry.action_taken||'--')}</td>
            </tr>`;
        }
        html+=`</tbody></table></div></div>`;
        app.innerHTML=html;
    }catch(e){app.innerHTML='<div class="empty"><h3>Error loading content filter log</h3><p>The content filter endpoint may not be available yet.</p></div>';console.error(e);}

// ─── Sessions ───
async function renderSessions(){
    const app=document.getElementById('app');
    app.innerHTML='<div class="loading"><div class="spinner"></div>Loading sessions...</div>';
    try{
        const r=await adminFetch(API+'/api/admin/sessions');const d=await r.json();
        const sessions=d.sessions||d||[];
        if(!sessions.length){app.innerHTML='<div class="card"><h2>Active Sessions</h2><div class="empty"><h3>No active sessions</h3><p>No users are currently logged in.</p></div></div>';return;}

        // Group by user for "Revoke All for User" capability
        const byUser={};
        for(const s of sessions){const key=s.user_email||s.email||s.user_id||'?';if(!byUser[key]) byUser[key]=[];byUser[key].push(s);}

        let html=`<div class="card"><h2>Active Sessions</h2><p class="subtitle">${sessions.length} active session${sessions.length!==1?'s':''}</p>
        <div style="overflow-x:auto"><table class="admin-table"><thead><tr>
            <th>User</th><th>Device / Browser</th><th>IP Address</th><th>Created</th><th>Last Active</th><th></th>
        </tr></thead><tbody>`;
        for(const s of sessions){
            const email=escHtml(s.user_email||s.email||s.user_id||'?');
            const device=escHtml(s.device||s.user_agent||s.browser||'--');
            const ip=escHtml(s.ip_address||s.ip||'--');
            const multiUser=byUser[s.user_email||s.email||s.user_id||'?'].length>1;
            html+=`<tr>
                <td><strong style="color:var(--lavender)">${email}</strong></td>
                <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${device}">${device}</td>
                <td style="font-family:monospace;font-size:12px">${ip}</td>
                <td style="white-space:nowrap;font-size:12px;color:var(--overlay0)">${s.created_at?new Date(s.created_at).toLocaleString():'--'}</td>
                <td style="white-space:nowrap;font-size:12px;color:var(--overlay0)">${s.last_active||s.last_seen?new Date(s.last_active||s.last_seen).toLocaleString():'--'}</td>

                    <div style="display:flex;gap:6px">

                        ${multiUser?`<button class="btn-sm btn-secondary" style="background:var(--surface0);color:var(--peach);border:1px solid var(--peach)" onclick="revokeAllForUser('${escHtml(s.user_email||s.email||s.user_id||'')}')">Revoke All</button>`:''}

                </td>

        app.innerHTML=html;

        const dbSize=d.db_size_mb!=null?d.db_size_mb.toFixed(2)+' MB':(d.db_size||'--');
        const interval=d.vacuum_interval||d.interval||'--';
        slot.innerHTML=`

async function runVacuum(){

function confirmRestore(filename){
    // Remove any existing modal
    const old=document.getElementById('restore-modal');

    const modal=document.createElement('div');
    modal.id='restore-modal';
    modal.className='modal-overlay';
    modal.innerHTML=`<div class="modal-box">
        <h3>Restore Backup?</h3>
        <p>Restore <strong style="color:var(--yellow)">${escHtml(filename)}</strong>?<br>This will overwrite the current database. This action cannot be undone.</p>

            <button class="btn btn-danger" onclick="doRestore('${escHtml(filename)}')">Restore</button>

let _rateLimitTimer=null;
async function renderRateLimits(){
    const app=document.getElementById('app');
    app.innerHTML='<div class="loading"><div class="spinner"></div>Loading rate limit data...</div>';
    if(_rateLimitTimer) clearInterval(_rateLimitTimer);

async function _loadRateLimits(){
    const app=document.getElementById('app');
    try{
        const d=await adminFetch(API+'/api/admin/rate-limits').then(r=>r.json());
        const entries=d.rate_limits||d.entries||d||[];
        let html=`<div class="card" data-view="ratelimits"><h2>API Rate Limits</h2><p class="subtitle">Live rate limit statistics — auto-refreshes every 30s</p>`;
        if(!entries.length){
            html+=`<div class="empty"><h3>No rate limit data</h3><p>No API rate limit events recorded yet.</p></div>`;
        } else {
            html+=`<div style="overflow-x:auto"><table class="rate-table"><thead><tr>
                <th>Endpoint</th><th>Hits (24h)</th><th>Blocked (24h)</th><th>Current Rate</th><th>Usage</th>
            </tr></thead><tbody>`;
            for(const e of entries){
                const limit=e.limit||100;
                const current=e.current_rate||e.rate||0;
                const pct=Math.min((current/limit)*100,100);
                const barClass=pct<50?'rate-green':pct<80?'rate-yellow':'rate-red';
                const badgeClass=pct<50?'rate-badge-green':pct<80?'rate-badge-yellow':'rate-badge-red';
                html+=`<tr>
                    <td><code style="color:var(--sapphire);font-size:12px">${escHtml(e.endpoint||'?')}</code></td>
                    <td style="color:var(--text);font-weight:500">${e.hits_24h!=null?e.hits_24h:'--'}</td>
                    <td style="color:var(--red)">${e.blocked_24h!=null?e.blocked_24h:'--'}</td>
                    <td><span class="${badgeClass}">${current}/s</span></td>
                    <td>
                        <div style="display:flex;align-items:center;gap:8px">
                            <div class="rate-bar-wrap"><div class="rate-bar ${barClass}" style="width:${pct.toFixed(1)}%"></div></div>
                            <span style="font-size:11px;color:var(--overlay0);min-width:36px">${pct.toFixed(0)}%</span>
                        </div>
                    </td>
                </tr>`;
            }
            html+=`</tbody></table></div>`;
        }
        html+=`<div style="margin-top:12px;text-align:right;font-size:11px;color:var(--overlay0)">Last updated: ${new Date().toLocaleTimeString()}</div>`;
        html+=`</div>`;
        app.innerHTML=html;
    }catch(e){app.innerHTML='<div class="empty"><h3>Error loading rate limits</h3><p>The rate limits endpoint may not be available yet.</p></div>';console.error(e);}
}

// ─── Audit Log ───
let _auditPage=0;
let _auditFilter='';
async function renderAuditLog(){
    _auditPage=0;
    _auditFilter='';
    const app=document.getElementById('app');
    app.innerHTML='<div class="loading"><div class="spinner"></div>Loading audit log...</div>';
    await _loadAuditLog();
}

async function _loadAuditLog(){
    const app=document.getElementById('app');
    try{
        const params=new URLSearchParams({limit:50,offset:_auditPage*50});
        if(_auditFilter) params.set('action',_auditFilter);
        const d=await adminFetch(API+'/api/admin/audit-log?'+params).then(r=>r.json());
        const entries=d.entries||d.logs||d||[];
        const total=d.total||entries.length;

        // Build action-type options from data or known defaults
        const knownActions=['','delete','create','update','login','ban','restore'];
        let actionOpts=knownActions.map(a=>`<option value="${a}" ${_auditFilter===a?'selected':''}>${a===''?'All Actions':a.charAt(0).toUpperCase()+a.slice(1)}</option>`).join('');

        let html=`<div class="card"><h2>Audit Log</h2><p class="subtitle">Admin action history — ${total} total records</p>
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
            <div class="form-group" style="margin:0;flex:0 0 200px"><select onchange="_auditFilter=this.value;_auditPage=0;_loadAuditLog()">${actionOpts}</select></div>
        </div>`;

        if(!entries.length){
            html+=`<div class="empty"><h3>No audit log entries</h3><p>No admin actions recorded${_auditFilter?' for this filter':''}.</p></div>`;
        } else {
            html+=`<div style="overflow-x:auto"><table class="audit-table"><thead><tr>
                <th>Timestamp</th><th>Admin</th><th>Action</th><th>Target</th><th>Details</th>
            </tr></thead><tbody>`;
            for(const e of entries){
                const ac=e.action||'other';
                const acClass=ac==='delete'?'audit-action-delete':ac==='create'?'audit-action-create':ac==='update'?'audit-action-update':ac==='login'?'audit-action-login':'audit-action-other';
                html+=`<tr>
                    <td style="white-space:nowrap;font-size:12px;color:var(--overlay0)">${e.timestamp||e.created_at?new Date(e.timestamp||e.created_at).toLocaleString():'--'}</td>
                    <td style="color:var(--lavender);font-size:13px">${escHtml(e.admin_email||e.admin||'?')}</td>
                    <td><span class="audit-action ${acClass}">${escHtml(ac)}</span></td>
                    <td style="font-size:13px;color:var(--subtext1)">${escHtml(e.target||'--')}</td>
                    <td style="font-size:12px;color:var(--overlay0);max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${escHtml(e.details||'')}">${escHtml(e.details||'--')}</td>
                </tr>`;
            }
            html+=`</tbody></table></div>`;
        }

        // Pagination
        const totalPages=Math.max(1,Math.ceil(total/50));
        html+=`<div class="audit-pagination">
            <button class="btn btn-secondary" style="padding:6px 14px;font-size:12px" ${_auditPage===0?'disabled':''} onclick="_auditPage--;_loadAuditLog()">Prev</button>
            <span style="font-size:13px;color:var(--overlay0)">Page ${_auditPage+1} / ${totalPages}</span>
            <button class="btn btn-secondary" style="padding:6px 14px;font-size:12px" ${(_auditPage+1)>=totalPages?'disabled':''} onclick="_auditPage++;_loadAuditLog()">Next</button>
        </div>`;
        html+=`</div>`;
        app.innerHTML=html;
    }catch(e){app.innerHTML='<div class="empty"><h3>Error loading audit log</h3><p>The audit log endpoint may not be available yet.</p></div>';console.error(e);}
}

            </div>
            <div class="form-group"><label>Secret (optional)</label><input type="text" id="wh-secret" placeholder="Signing secret"></div>
            <button class="btn btn-primary" onclick="createWebhook()">Create Webhook</button>
        </div>`;
        html+=`</div>`;
        app.innerHTML=html;
    }catch(e){app.innerHTML='<div class="empty"><h3>Error loading webhooks</h3><p>The webhooks endpoint may not be available yet.</p></div>';console.error(e);}
}

async function createWebhook(){
    const name=document.getElementById('wh-name')?.value?.trim();
    const url=document.getElementById('wh-url')?.value?.trim();
    if(!name||!url){toast('Name and URL are required','error');return;}
    const eventIds=['wh-ev-match','wh-ev-message','wh-ev-signup','wh-ev-report','wh-ev-all'];
    const events=eventIds.map(id=>document.getElementById(id)).filter(el=>el&&el.checked).map(el=>el.value);
    const secret=document.getElementById('wh-secret')?.value?.trim()||null;
    try{
        const r=await adminFetch(API+'/api/admin/webhooks',{method:'POST',body:JSON.stringify({name,url,events,secret})});
        if(!r.ok){const err=await r.json().catch(()=>({}));toast(err.detail||'Create failed','error');return;}
        toast('Webhook created','success');
        _loadWebhooks();
    }catch(e){toast('Create failed','error');}
}

async function toggleWebhook(id,enabled){
    try{
        await adminFetch(API+'/api/admin/webhooks/'+id,{method:'PUT',body:JSON.stringify({enabled})});
        toast(enabled?'Webhook enabled':'Webhook disabled','success');
        _loadWebhooks();
    }catch(e){toast('Update failed','error');_loadWebhooks();}
}

async function deleteWebhook(id,name){
    const old=document.getElementById('wh-del-modal');
    if(old) old.remove();
    const modal=document.createElement('div');
    modal.id='wh-del-modal';
    modal.className='modal-overlay';
    modal.innerHTML=`<div class="modal-box">
        <h3>Delete Webhook?</h3>
        <p>Delete webhook <strong style="color:var(--yellow)">${escHtml(name||id)}</strong>?<br>This cannot be undone.</p>
        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="document.getElementById('wh-del-modal').remove()">Cancel</button>
            <button class="btn btn-danger" onclick="confirmDeleteWebhook('${escHtml(id)}')">Delete</button>
        </div>
    </div>`;
    document.body.appendChild(modal);
}

async function confirmDeleteWebhook(id){
    const modal=document.getElementById('wh-del-modal');
    if(modal) modal.remove();
    try{
        await adminFetch(API+'/api/admin/webhooks/'+id,{method:'DELETE'});
        toast('Webhook deleted','success');
        _loadWebhooks();
    }catch(e){toast('Delete failed','error');}
}

// ─── Email Templates ───
async function renderEmailTemplates(){
    const app=document.getElementById('app');
    app.innerHTML='<div class="loading"><div class="spinner"></div>Loading email templates...</div>';
    try{
        const d=await adminFetch(API+'/api/admin/email-templates').then(r=>r.json());
        const templates=d.templates||d||[];
        let html=`<div class="card"><h2>Email Templates</h2><p class="subtitle">${templates.length} template${templates.length!==1?'s':''} available — click to preview</p>`;
        if(!templates.length){
            html+=`<div class="empty"><h3>No email templates</h3><p>No email templates are configured on the server.</p></div>`;
        } else {
            for(const t of templates){
                html+=`<div class="tpl-item" onclick="previewEmailTemplate('${escHtml(t.id||t.name||'')}','${escHtml(t.name||t.id||'')}')">
                    <div>
                        <div class="tpl-name">${escHtml(t.name||t.id||'Unnamed')}</div>
                        ${t.description?`<div class="tpl-desc">${escHtml(t.description)}</div>`:''}
                    </div>
                    <button class="btn-sm btn-view" style="flex-shrink:0">Preview</button>
                </div>`;
            }
        }
        html+=`</div>`;
        app.innerHTML=html;
    }catch(e){app.innerHTML='<div class="empty"><h3>Error loading email templates</h3><p>The email templates endpoint may not be available yet.</p></div>';console.error(e);}
}

async function previewEmailTemplate(id,name){
    const old=document.getElementById('tpl-preview-modal');
    if(old) old.remove();
    const modal=document.createElement('div');
    modal.id='tpl-preview-modal';
    modal.className='tpl-preview-modal';
    modal.innerHTML=`<div class="tpl-preview-box">
        <div class="tpl-preview-header">
            <h3>${escHtml(name||id)}</h3>
            <button class="btn-sm btn-secondary" onclick="document.getElementById('tpl-preview-modal').remove()">Close</button>
        </div>
        <div style="padding:12px 20px;border-bottom:1px solid var(--surface0);display:flex;align-items:center;gap:8px">
            <div class="spinner" style="width:16px;height:16px;border-width:2px;margin:0"></div>
            <span style="font-size:13px;color:var(--overlay0)">Loading preview...</span>
        </div>
        <iframe id="tpl-preview-frame" class="tpl-preview-iframe" sandbox="allow-same-origin"></iframe>
    </div>`;
    document.body.appendChild(modal);
    modal.addEventListener('click',e=>{if(e.target===modal) modal.remove();});
    try{
        const r=await adminFetch(API+'/api/admin/email-templates/'+encodeURIComponent(id)+'/preview');
        const html=await r.text();
        const frame=document.getElementById('tpl-preview-frame');
        if(frame){
            const loadingBar=modal.querySelector('.tpl-preview-box>div:nth-child(2)');
            if(loadingBar) loadingBar.remove();
            frame.srcdoc=html;
        }
    }catch(e){
        const frame=document.getElementById('tpl-preview-frame');
        if(frame) frame.srcdoc=`<body style="font-family:sans-serif;padding:20px;color:#666"><p>Failed to load preview.</p></body>`;
    }
}

// ─── Users ───
function renderUsers(){
  const app=document.getElementById('app');
  app.innerHTML=`<div class="card"><h2>User Management</h2>
    <div class="user-search-bar">
      <input type="text" id="user-search-input" placeholder="Search by email, name, or ID..." onkeydown="if(event.key==='Enter')searchUsers()">
      <button onclick="searchUsers()">Search</button>
    </div>
    <div id="user-search-results"></div>
    <div id="user-detail-view" style="display:none"></div>
  </div>`;
}

async function searchUsers(){
  const q=document.getElementById('user-search-input').value.trim();
  if(q.length<2){toast('Enter at least 2 characters','error');return}
  const r=await adminFetch(API+`/api/admin/users/search?q=${encodeURIComponent(q)}`);
  if(!r.ok) return;
  const users=await r.json();
  const el=document.getElementById('user-search-results');
  if(!users.length){el.innerHTML='<p style="color:var(--subtext0)">No users found.</p>';return}
  el.innerHTML=`<table class="user-table"><thead><tr>
    <th>Email</th><th>Name</th><th>Status</th><th>Verified</th><th>Tier</th><th>Joined</th>
  </tr></thead><tbody>${users.map(u=>`<tr>
    <td class="clickable" onclick="viewUserDetail('${u.id}')">${escHtml(u.email)}</td>
    <td>${escHtml(u.display_name||u.profile_name||'—')}</td>
    <td>${u.deactivated?'<span style="color:var(--red)">Deactivated</span>':'Active'}</td>
    <td>${u.email_verified?'✓':'—'}</td>
    <td>${escHtml(u.subscription_tier||'free')}</td>
    <td>${u.created_at?new Date(u.created_at).toLocaleDateString():''}</td>
  </tr>`).join('')}</tbody></table>`;
  document.getElementById('user-detail-view').style.display='none';
}

async function viewUserDetail(userId){
  const r=await adminFetch(API+`/api/admin/users/${userId}`);
  if(!r.ok) return;
  const u=await r.json();
  const el=document.getElementById('user-detail-view');
  el.style.display='block';
  el.innerHTML=`
    <div class="user-detail-card">
      <h3>${escHtml(u.display_name||u.profile_name||u.email)}</h3>
      <div class="user-detail-grid">
        <div class="stat-item"><label>Email</label><span style="font-size:14px">${escHtml(u.email)}</span></div>
        <div class="stat-item"><label>User ID</label><span style="font-size:11px;word-break:break-all">${u.id}</span></div>
        <div class="stat-item"><label>Profile ID</label><span style="font-size:11px;word-break:break-all">${u.profile_id||'—'}</span></div>
        <div class="stat-item"><label>Age</label><span>${u.age||'—'}</span></div>
        <div class="stat-item"><label>Gender</label><span>${escHtml(u.gender||'—')}</span></div>
        <div class="stat-item"><label>Location</label><span>${escHtml(u.location||'—')}</span></div>
        <div class="stat-item"><label>Tier</label><span>${escHtml(u.subscription_tier||'free')}</span></div>
        <div class="stat-item"><label>Verified</label><span>${u.verified?'Yes':'No'}</span></div>
        <div class="stat-item"><label>Email Verified</label><span>${u.email_verified?'Yes':'No'}</span></div>
        <div class="stat-item"><label>Admin</label><span>${u.is_admin?'Yes':'No'}</span></div>
        <div class="stat-item"><label>Deactivated</label><span>${u.deactivated?'Yes':'No'}</span></div>
        <div class="stat-item"><label>Onboarding</label><span>${u.onboarding_completed?'Complete':'Incomplete'}</span></div>
      </div>
    </div>
    <div class="user-detail-card">
      <h3>Activity Stats</h3>
      <div class="user-detail-grid">
        <div class="stat-item"><label>Messages Sent</label><span>${u.messages_sent||0}</span></div>
        <div class="stat-item"><label>Messages Received</label><span>${u.messages_received||0}</span></div>
        <div class="stat-item"><label>Matches</label><span>${u.matches_count||0}</span></div>
        <div class="stat-item"><label>Profile Views</label><span>${u.profile_views||0}</span></div>
        <div class="stat-item"><label>Photos</label><span>${u.photos_count||0}</span></div>
        <div class="stat-item"><label>Reports Filed</label><span>${u.reports_filed||0}</span></div>
        <div class="stat-item"><label>Reports Received</label><span style="color:${u.reports_received>0?'var(--red)':'inherit'}">${u.reports_received||0}</span></div>
        <div class="stat-item"><label>Blocks Made</label><span>${u.blocks_made||0}</span></div>
        <div class="stat-item"><label>Active Sessions</label><span>${u.active_sessions||0}</span></div>
      </div>
    </div>
    ${u.recent_sessions&&u.recent_sessions.length?`<div class="user-detail-card">
      <h3>Recent Sessions</h3>
      <table class="user-sessions-table"><thead><tr><th>Device</th><th>IP</th><th>Last Active</th><th>Created</th></tr></thead>
      <tbody>${u.recent_sessions.map(s=>`<tr>
        <td>${escHtml(s.device||'Unknown')}</td>
        <td>${escHtml(s.ip_address||'—')}</td>
        <td>${s.last_active?new Date(s.last_active).toLocaleString():''}</td>
        <td>${s.created_at?new Date(s.created_at).toLocaleString():''}</td>
      </tr>`).join('')}</tbody></table>
    </div>`:''}
    <button class="btn" onclick="document.getElementById('user-detail-view').style.display='none'" style="margin-top:8px">← Back to Results</button>
  `;
  el.scrollIntoView({behavior:'smooth'});
}

// ─── Announcements ───
function renderAnnouncements(){
  const app=document.getElementById('app');
  app.innerHTML=`<div class="card"><h2>Announcements</h2>
    <div class="ann-form">
      <input type="text" id="ann-title" placeholder="Title">
      <textarea id="ann-body" placeholder="Announcement body..."></textarea>
      <div style="display:flex;gap:8px;align-items:center">
        <select id="ann-type"><option value="info">Info</option><option value="warning">Warning</option><option value="maintenance">Maintenance</option></select>
        <button onclick="createAnnouncement()">Post Announcement</button>
      </div>
    </div>
    <div id="ann-list">Loading...</div>
  </div>`;
  loadAnnouncements();
}

async function loadAnnouncements(){
  const r=await adminFetch(API+'/api/admin/announcements');
  if(!r.ok)return;
  const anns=await r.json();
  const el=document.getElementById('ann-list');
  if(!anns.length){el.innerHTML='<p style="color:var(--subtext0)">No active announcements.</p>';return}
  el.innerHTML=anns.map(a=>`<div class="ann-item">
    <div class="ann-content">
      <span class="ann-type ann-type-${a.type}">${a.type}</span>
      <div class="ann-title" style="margin-top:6px">${escHtml(a.title)}</div>
      <div class="ann-body">${escHtml(a.body)}</div>
      <div class="ann-meta">Created: ${new Date(a.created_at).toLocaleString()}${a.expires_at?' · Expires: '+new Date(a.expires_at).toLocaleString():''}</div>
    </div>
    <button class="btn btn-sm" style="background:var(--red);color:var(--base)" onclick="deleteAnnouncement('${a.id}')">Remove</button>
  </div>`).join('');
}

async function createAnnouncement(){
  const title=document.getElementById('ann-title').value.trim();
  const body=document.getElementById('ann-body').value.trim();
  const type=document.getElementById('ann-type').value;
  if(!title||!body){toast('Title and body required','error');return}
  const r=await adminFetch(API+'/api/admin/announcements',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title,body,type})});
  if(r.ok){toast('Announcement posted','success');loadAnnouncements();document.getElementById('ann-title').value='';document.getElementById('ann-body').value=''}
  else toast('Failed to post','error');
}

async function deleteAnnouncement(id){
  const r=await adminFetch(API+`/api/admin/announcements/${id}`,{method:'DELETE'});
  if(r.ok){toast('Removed','success');loadAnnouncements()}
}

// ─── Utils ───
function escHtml(s){if(!s)return '';const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function toast(m,t=''){const e=document.getElementById('toast');e.textContent=m;e.className='toast show '+t;setTimeout(()=>e.className='toast',3500);}

// ─── Init ───
const savedAdminToken=localStorage.getItem('kindred_admin_token');
if(savedAdminToken){
    adminToken=savedAdminToken;
    renderNav();
    showView('dashboard');
} else {
    showLoginScreen();
}
</script>
