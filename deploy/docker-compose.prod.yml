services:
  kindred:
    build: ..
    container_name: kindred-app
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      - KINDRED_HOST=0.0.0.0
    volumes:
      - ../kindred.db:/app/kindred.db
      - ../uploads:/app/uploads
      - ../backups:/app/backups
      - ../.jwt_secret:/app/.jwt_secret
    ports:
      - "127.0.0.1:8000:8000"
      - "127.0.0.1:8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  caddy:
    image: caddy:2-alpine
    container_name: kindred-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      kindred:
        condition: service_healthy

volumes:
  caddy_data:
  caddy_config:
